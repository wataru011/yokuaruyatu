<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GATE SHOOTER - よくある広告のやつ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a12;
    overflow: hidden;
    touch-action: none;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #game-container {
    position: relative;
    width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
  }
  canvas {
    display: block;
    background: #12121e;
    box-shadow: 0 0 40px rgba(0,0,0,.8);
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(5,5,12,.82);
    color: #fff;
    text-align: center;
    z-index: 10;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: clamp(28px, 7vw, 56px);
    letter-spacing: .1em;
    color: #ff4757;
    text-shadow: 0 0 24px rgba(255,71,87,.6);
    margin-bottom: 12px;
  }
  .overlay p { font-size: clamp(13px, 3.4vw, 19px); color: #ccc; margin: 5px 0; }
  .overlay .score-big { font-size: clamp(24px, 6vw, 44px); color: #ffd32a; margin: 10px 0; }
  .overlay button {
    margin-top: 24px;
    padding: 14px 48px;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: bold;
    color: #fff;
    background: linear-gradient(180deg, #ff6b81, #e8304a);
    border: none; border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 6px 0 #a3122a, 0 10px 20px rgba(0,0,0,.5);
    transition: transform .08s;
  }
  .overlay button:active { transform: translateY(4px); box-shadow: 0 2px 0 #a3122a; }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>

  <div id="start-screen" class="overlay">
    <h1>🧟 GATE SHOOTER</h1>
    <p>迫りくるゾンビの大群を撃ちまくれ！</p>
    <p>🚪 <b>×2 / ×3 / +10</b> のゲートをくぐると自軍が増殖！</p>
    <p>🔫 マイナスゲートは撃ちまくればプラスに変わる！</p>
    <p>📦 宝箱を撃って壊すとパワーアップ！</p>
    <p>操作：マウス / タッチ / ←→キー（射撃は自動）</p>
    <button id="start-btn">▶ ゲームスタート</button>
  </div>

  <div id="gameover-screen" class="overlay hidden">
    <h1>GAME OVER</h1>
    <p>全滅…！スコア</p>
    <div class="score-big" id="final-score">0</div>
    <p id="best-score-label"></p>
    <button id="retry-btn">🔄 もう一度</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // ---- 論理解像度（縦長・スマホ広告風） ----
  const W = 480, H = 800;

  function resize() {
    const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = `${W * scale}px`;
    canvas.style.height = `${H * scale}px`;
  }
  window.addEventListener("resize", resize);
  resize();

  // ---- 定数 ----
  const MAX_SQUAD = 60;      // 兵士数の上限
  const FIRE_STREAMS = 22;   // 同時発射ストリーム上限（超過分はダメージに換算）
  const MAX_BULLETS = 350;
  const MAX_ENEMIES = 130;
  const SQUAD_Y = H - 150;   // 隊列の先頭位置

  // ---- 状態 ----
  const STATE = { TITLE: 0, PLAYING: 1, GAMEOVER: 2 };
  let state = STATE.TITLE;

  let leaderX, targetX, squadCount, bulletDmg, fireRate, spreadTime, rapidTime;
  let bullets, enemies, gates, crates, particles, floatTexts;
  let gunnerPos = [];        // 毎フレーム再計算する隊列の座標
  let score, wave, killCount;
  let fireAcc, fireIdx, muzzles;
  let spawnTimer, hordeTimer, gateTimer, crateTimer, waveTimer, shake, flash, lastTime;
  let best = Number(localStorage.getItem("gs_best") || 0);

  // ---- 隊列オフセット（先頭1人 + 後ろに広がる隊形）----
  const OFFSETS = [{ x: 0, y: 0 }];
  {
    const widths = [4, 6, 8, 9];
    let row = 1;
    while (OFFSETS.length < MAX_SQUAD) {
      const k = widths[Math.min(row - 1, widths.length - 1)];
      for (let i = 0; i < k && OFFSETS.length < MAX_SQUAD; i++) {
        const jx = Math.sin((OFFSETS.length + 1) * 999) * 5;   // 決定的なゆらぎ
        const jy = Math.sin((OFFSETS.length + 1) * 777) * 4;
        OFFSETS.push({ x: (i - (k - 1) / 2) * 26 + jx, y: row * 27 + jy });
      }
      row++;
    }
  }

  function reset() {
    leaderX = W / 2; targetX = W / 2;
    squadCount = 3;
    bulletDmg = 1;
    fireRate = 0.5;          // 1人あたり 秒/発
    spreadTime = 0; rapidTime = 0;
    bullets = []; enemies = []; gates = []; crates = []; particles = []; floatTexts = [];
    score = 0; wave = 1; killCount = 0;
    fireAcc = 0; fireIdx = 0; muzzles = [];
    spawnTimer = 0.6; hordeTimer = 6; gateTimer = 3.5; crateTimer = 6; waveTimer = 0;
    shake = 0; flash = 0;
  }

  // ---- 入力 ----
  const keys = {};
  window.addEventListener("keydown", e => { keys[e.key] = true; });
  window.addEventListener("keyup",   e => { keys[e.key] = false; });

  function pointerX(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    return cx / rect.width * W;
  }
  canvas.addEventListener("mousemove", e => { targetX = pointerX(e); });
  canvas.addEventListener("touchstart", e => { e.preventDefault(); targetX = pointerX(e); }, { passive: false });
  canvas.addEventListener("touchmove",  e => { e.preventDefault(); targetX = pointerX(e); }, { passive: false });

  // ---- サウンド（WebAudioでピコピコ） ----
  let audioCtx = null;
  function beep(freq, dur, type = "square", vol = 0.06) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    } catch (_) { /* 音が出なくてもゲームは続行 */ }
  }

  // ---- 敵 ----
  function spawnEnemy(x, y) {
    if (enemies.length >= MAX_ENEMIES) return;
    const r = Math.random();
    let e;
    if (r < 0.06 + wave * 0.008 && wave >= 3) {
      e = { type: "tank", w: 76, h: 84, hp: 20 + wave * 6, speed: 26 + wave * 1.5, score: 500, cost: 10, color: "#8e44ad" };
    } else if (r < 0.35 && wave >= 2) {
      e = { type: "fast", w: 32, h: 40, hp: 2 + Math.floor(wave * 0.5), speed: 100 + wave * 6, score: 150, cost: 1, color: "#e67e22" };
    } else {
      e = { type: "normal", w: 40, h: 48, hp: 3 + wave, speed: 50 + wave * 4, score: 100, cost: 2, color: "#2ecc71" };
    }
    e.speed *= 0.9 + Math.random() * 0.25;
    e.maxHp = e.hp;
    e.x = x !== undefined ? x : 30 + Math.random() * (W - 60);
    e.y = y !== undefined ? y : -e.h;
    e.wobblePhase = Math.random() * Math.PI * 2;
    e.wobbleAmp = e.type === "tank" ? 6 : 16;
    e.hitFlash = 0;
    enemies.push(e);
  }

  function spawnHorde() {
    const n = Math.min(6 + wave * 2, 26);
    const cx = 80 + Math.random() * (W - 160);
    for (let i = 0; i < n; i++) {
      spawnEnemy(
        Math.max(20, Math.min(W - 20, cx + (Math.random() - 0.5) * 200)),
        -50 - Math.random() * 220
      );
    }
    addFloatText(W / 2, 130, "⚠ 大群接近！", "#ff6b81", 26);
    beep(220, 0.25, "sawtooth", 0.07);
  }

  // ---- ゲート ----
  // kind: mult(×N) / plus(+N, マイナスも同じkindで負値) / div2(÷2) / dmg(武器強化)
  function gateSpec(kind, value) {
    return { kind, value, hits: 0 };
  }
  function randomGoodGate(strong) {
    const r = Math.random();
    if (strong && r < 0.25) return gateSpec("mult", 3);
    if (r < 0.45) return gateSpec("mult", 2);
    if (r < 0.85) return gateSpec("plus", 5 + Math.floor(Math.random() * 10));
    return gateSpec("dmg", 1);
  }
  function randomBadGate() {
    return Math.random() < 0.5
      ? gateSpec("plus", -(10 + Math.floor(Math.random() * 20)))   // マイナスゲート
      : gateSpec("div2", 2);
  }
  let gatePairSeq = 0;
  function spawnGatePair() {
    const pairId = ++gatePairSeq;
    // 7割で「良い vs 悪い」、3割で「良い vs もっと良い」
    let a, b;
    if (Math.random() < 0.7) { a = randomGoodGate(false); b = randomBadGate(); }
    else { a = randomGoodGate(true); b = randomGoodGate(false); }
    if (Math.random() < 0.5) [a, b] = [b, a];
    const h = 62, speed = 100 + wave * 3;
    const gw = W / 2 - 14;
    gates.push({ ...a, pairId, x: 8,           w: gw, y: -h, h, vy: speed });
    gates.push({ ...b, pairId, x: W / 2 + 6,   w: gw, y: -h, h, vy: speed });
  }

  function gateIsGood(g) {
    if (g.kind === "div2") return false;
    if (g.kind === "plus") return g.value > 0;
    return true;
  }
  function gateLabel(g) {
    if (g.kind === "mult") return `×${g.value}`;
    if (g.kind === "plus") return g.value > 0 ? `+${g.value}` : `${g.value}`;
    if (g.kind === "div2") return "÷2";
    return "DMG +1";
  }
  // ゲートを撃つと育つ
  function upgradeGate(g) {
    g.hits++;
    if (g.kind === "plus") {
      const step = g.value < 0 ? 2 : 4;   // マイナスは速めに回復
      if (g.hits % step === 0) {
        g.value++;
        if (g.hits % (step * 3) === 0) beep(700 + g.value * 10, 0.05, "triangle", 0.04);
      }
    } else if (g.kind === "mult" && g.value === 2 && g.hits >= 30) {
      g.value = 3; g.hits = 0;
      addFloatText(g.x + g.w / 2, g.y + g.h / 2, "×3にパワーアップ！", "#48dbfb", 20);
      beep(1000, 0.2, "triangle", 0.08);
    } else if (g.kind === "div2" && g.hits >= 26) {
      g.kind = "plus"; g.value = 3; g.hits = 0;
      addFloatText(g.x + g.w / 2, g.y + g.h / 2, "プラスに変化！", "#48dbfb", 20);
      beep(1000, 0.2, "triangle", 0.08);
    }
  }
  function applyGate(g) {
    if (g.kind === "mult") {
      const before = squadCount;
      squadCount = Math.min(MAX_SQUAD, squadCount * g.value);
      addFloatText(leaderX, SQUAD_Y - 60, `×${g.value}！ ${before}→${squadCount}人`, "#48dbfb", 26);
      beep(880, 0.25, "triangle", 0.09);
    } else if (g.kind === "plus") {
      squadCount = Math.max(1, Math.min(MAX_SQUAD, squadCount + g.value));
      const good = g.value > 0;
      addFloatText(leaderX, SQUAD_Y - 60, `${good ? "+" : ""}${g.value}人！`, good ? "#48dbfb" : "#ff4757", 26);
      beep(good ? 880 : 150, 0.25, good ? "triangle" : "sawtooth", 0.09);
      if (!good) shake = Math.min(shake + 8, 14);
    } else if (g.kind === "div2") {
      squadCount = Math.max(1, Math.ceil(squadCount / 2));
      addFloatText(leaderX, SQUAD_Y - 60, `÷2… ${squadCount}人に…`, "#ff4757", 26);
      beep(150, 0.3, "sawtooth", 0.09);
      shake = Math.min(shake + 8, 14);
    } else if (g.kind === "dmg") {
      bulletDmg++;
      addFloatText(leaderX, SQUAD_Y - 60, `武器強化！ DMG ${bulletDmg}`, "#ff9ff3", 26);
      beep(1200, 0.25, "triangle", 0.09);
    }
  }

  // ---- 宝箱 ----
  function spawnCrate() {
    crates.push({
      x: 50 + Math.random() * (W - 100),
      y: -40,
      vy: 55 + Math.random() * 25,
      hp: 8 + wave, maxHp: 8 + wave,
      size: 46,
      hitFlash: 0,
      phase: Math.random() * Math.PI * 2,
    });
  }
  function openCrate(c) {
    spawnParticles(c.x, c.y, "#f0932b", 24, 1.2);
    shake = Math.min(shake + 5, 12);
    const r = Math.random();
    if (r < 0.3) {
      const n = 4 + Math.floor(Math.random() * 8);
      squadCount = Math.min(MAX_SQUAD, squadCount + n);
      addFloatText(c.x, c.y, `+${n}人！`, "#48dbfb", 24);
    } else if (r < 0.45) {
      bulletDmg++;
      addFloatText(c.x, c.y, `武器強化！ DMG ${bulletDmg}`, "#ff9ff3", 24);
    } else if (r < 0.65) {
      rapidTime = 10;
      addFloatText(c.x, c.y, "RAPID FIRE！", "#ff9ff3", 24);
    } else if (r < 0.85) {
      spreadTime = 10;
      addFloatText(c.x, c.y, "3WAYショット！", "#ffd32a", 24);
    } else {
      // ボム：画面上の敵を一掃
      flash = 0.35; shake = 16;
      addFloatText(c.x, c.y, "💣 ボム！！", "#ff6b81", 30);
      for (const e of enemies) {
        score += e.score; killCount++;
        spawnParticles(e.x, e.y, e.color, 10, 1.2);
      }
      enemies.length = 0;
      beep(60, 0.6, "sawtooth", 0.12);
      return;
    }
    beep(1100, 0.2, "triangle", 0.09);
  }

  // ---- エフェクト ----
  function spawnParticles(x, y, color, n, power = 1) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = (40 + Math.random() * 160) * power;
      particles.push({
        x, y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40,
        life: 0.4 + Math.random() * 0.4,
        maxLife: 0.8,
        size: 2 + Math.random() * 4,
        color,
      });
    }
  }
  function addFloatText(x, y, text, color = "#ffd32a", size = 22) {
    floatTexts.push({ x, y, text, color, size, life: 1.0 });
  }

  function killEnemy(e, giveScore = true) {
    if (giveScore) { score += e.score; killCount++; addFloatText(e.x, e.y, `+${e.score}`); }
    spawnParticles(e.x, e.y, e.color, e.type === "tank" ? 26 : 10, e.type === "tank" ? 1.6 : 1);
    shake = Math.min(shake + (e.type === "tank" ? 8 : 1.5), 12);
    beep(e.type === "tank" ? 90 : 160, 0.12, "sawtooth", 0.06);
  }

  function loseSoldiers(n, x, y) {
    squadCount -= n;
    addFloatText(x, y, `-${n}人`, "#ff4757", 24);
    spawnParticles(x, y, "#ff4757", 12, 1.2);
    shake = Math.min(shake + 6, 14);
    beep(110, 0.2, "sawtooth", 0.09);
    if (squadCount <= 0) { squadCount = 0; gameOver(); }
  }

  // ---- 隊列座標の再計算 ----
  function updateGunnerPos() {
    gunnerPos.length = 0;
    for (let i = 0; i < squadCount; i++) {
      const o = OFFSETS[i];
      gunnerPos.push({
        x: Math.max(14, Math.min(W - 14, leaderX + o.x)),
        y: SQUAD_Y + o.y,
      });
    }
  }

  // ---- 更新 ----
  function update(dt) {
    // 移動
    const speed = 430;
    if (keys["ArrowLeft"] || keys["a"])  targetX = leaderX - speed * dt * 1.6;
    if (keys["ArrowRight"] || keys["d"]) targetX = leaderX + speed * dt * 1.6;
    const dx = targetX - leaderX;
    const maxMove = speed * dt;
    leaderX += Math.abs(dx) <= maxMove ? dx : Math.sign(dx) * maxMove;
    leaderX = Math.max(30, Math.min(W - 30, leaderX));
    updateGunnerPos();

    // パワーアップ時間
    if (rapidTime > 0) rapidTime -= dt;
    if (spreadTime > 0) spreadTime -= dt;
    const curRate = rapidTime > 0 ? 0.22 : fireRate;

    // 自動射撃：全体で 兵士数/レート 発/秒（ストリーム上限超過分はダメージに換算）
    const streams = Math.min(squadCount, FIRE_STREAMS);
    const dmgScale = squadCount > FIRE_STREAMS ? squadCount / FIRE_STREAMS : 1;
    fireAcc += dt * streams / curRate;
    let fired = 0;
    while (fireAcc >= 1 && fired < 12) {
      fireAcc--; fired++;
      const g = gunnerPos[fireIdx % gunnerPos.length];
      fireIdx++;
      const n = spreadTime > 0 ? 3 : 1;
      for (let i = 0; i < n; i++) {
        const off = n === 1 ? 0 : (i - 1) * 0.16;
        bullets.push({
          x: g.x, y: g.y - 26,
          vx: Math.sin(off) * 760, vy: -Math.cos(off) * 760,
          r: 4, dmg: bulletDmg * dmgScale,
        });
      }
      muzzles.push({ x: g.x, y: g.y - 30, life: 0.05 });
      if (fired === 1) beep(880, 0.03, "square", 0.012);
    }
    if (bullets.length > MAX_BULLETS) bullets.splice(0, bullets.length - MAX_BULLETS);
    for (let i = muzzles.length - 1; i >= 0; i--) {
      muzzles[i].life -= dt;
      if (muzzles[i].life <= 0) muzzles.splice(i, 1);
    }

    // 弾の移動と衝突（ゲート → 宝箱 → 敵 の順に判定）
    outer:
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dt; b.y += b.vy * dt;
      if (b.y < -10 || b.x < -10 || b.x > W + 10) { bullets.splice(i, 1); continue; }
      for (const g of gates) {
        if (b.x > g.x && b.x < g.x + g.w && b.y > g.y && b.y < g.y + g.h) {
          upgradeGate(g);
          spawnParticles(b.x, g.y + g.h, "#dfe6e9", 1, 0.4);
          bullets.splice(i, 1);
          continue outer;
        }
      }
      for (let j = crates.length - 1; j >= 0; j--) {
        const c = crates[j];
        if (Math.abs(b.x - c.x) < c.size / 2 + b.r && Math.abs(b.y - c.y) < c.size / 2 + b.r) {
          c.hp -= b.dmg; c.hitFlash = 0.08;
          spawnParticles(b.x, b.y, "#f0932b", 2, 0.5);
          bullets.splice(i, 1);
          if (c.hp <= 0) { openCrate(c); crates.splice(j, 1); }
          continue outer;
        }
      }
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (Math.abs(b.x - e.x) < e.w / 2 + b.r && Math.abs(b.y - e.y) < e.h / 2 + b.r) {
          e.hp -= b.dmg; e.hitFlash = 0.08;
          spawnParticles(b.x, b.y, "#fffa65", 2, 0.5);
          bullets.splice(i, 1);
          if (e.hp <= 0) { killEnemy(e); enemies.splice(j, 1); }
          continue outer;
        }
      }
    }

    // ゲートの移動と通過判定
    for (let i = gates.length - 1; i >= 0; i--) {
      const g = gates[i];
      g.y += g.vy * dt;
      if (g.y + g.h >= SQUAD_Y - 10) {
        const pairId = g.pairId;
        // 先頭がいる側のゲートを適用して、ペアごと消す
        const hit = gates.filter(x => x.pairId === pairId)
                         .find(x => leaderX >= x.x && leaderX <= x.x + x.w) || g;
        applyGate(hit);
        for (let j = gates.length - 1; j >= 0; j--) {
          if (gates[j].pairId === pairId) gates.splice(j, 1);
        }
        if (state !== STATE.PLAYING) return;
        break;
      }
    }

    // 宝箱
    for (let i = crates.length - 1; i >= 0; i--) {
      const c = crates[i];
      c.y += c.vy * dt;
      c.phase += dt * 3;
      if (c.hitFlash > 0) c.hitFlash -= dt;
      if (c.y > H + 30) crates.splice(i, 1);
    }

    // 敵
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.y += e.speed * dt;
      e.wobblePhase += dt * (e.type === "fast" ? 9 : 5);
      e.x += Math.sin(e.wobblePhase) * e.wobbleAmp * dt;
      e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
      if (e.hitFlash > 0) e.hitFlash -= dt;

      // 隊列に接触 → 兵士が減る
      if (e.y > SQUAD_Y - 80) {
        let touched = false;
        for (const g of gunnerPos) {
          if (Math.abs(e.x - g.x) < e.w / 2 + 11 && Math.abs(e.y - g.y) < e.h / 2 + 15) {
            touched = true; break;
          }
        }
        if (touched) {
          killEnemy(e, false);
          enemies.splice(i, 1);
          loseSoldiers(e.cost, e.x, e.y);
          if (state !== STATE.PLAYING) return;
          continue;
        }
      }
      // 突破された → 1人減る
      if (e.y - e.h / 2 > H) {
        enemies.splice(i, 1);
        loseSoldiers(1, e.x, H - 40);
        if (state !== STATE.PLAYING) return;
      }
    }

    // パーティクル・テキスト
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      const t = floatTexts[i];
      t.y -= 45 * dt; t.life -= dt;
      if (t.life <= 0) floatTexts.splice(i, 1);
    }

    // スポーン
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEnemy();
      const interval = Math.max(0.13, 0.75 - wave * 0.045);
      spawnTimer = interval * (0.7 + Math.random() * 0.6);
    }
    hordeTimer -= dt;
    if (hordeTimer <= 0) {
      spawnHorde();
      hordeTimer = Math.max(4, 9 - wave * 0.35) * (0.8 + Math.random() * 0.4);
    }
    gateTimer -= dt;
    if (gateTimer <= 0 && gates.length === 0) {
      spawnGatePair();
      gateTimer = 9 + Math.random() * 5;
    }
    crateTimer -= dt;
    if (crateTimer <= 0) {
      spawnCrate();
      crateTimer = 6 + Math.random() * 6;
    }

    // ウェーブ進行
    waveTimer += dt;
    if (waveTimer >= 12) {
      waveTimer = 0; wave++;
      addFloatText(W / 2, H / 2, `WAVE ${wave}`, "#ff6b81", 30);
      beep(440, 0.3, "triangle", 0.06);
    }

    if (shake > 0) shake = Math.max(0, shake - dt * 30);
    if (flash > 0) flash = Math.max(0, flash - dt);
  }

  // ---- 描画 ----
  function drawZombie(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.hitFlash > 0) ctx.filter = "brightness(2.5)";
    const w = e.w, h = e.h;
    ctx.fillStyle = e.color;
    ctx.fillRect(-w * 0.35, -h * 0.1, w * 0.7, h * 0.5);
    ctx.fillStyle = e.type === "tank" ? "#a55eea" : "#55efc4";
    ctx.beginPath();
    ctx.arc(0, -h * 0.25, w * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ff3838";
    const eye = w * 0.07;
    ctx.fillRect(-w * 0.15, -h * 0.3, eye, eye);
    ctx.fillRect(w * 0.08, -h * 0.3, eye, eye);
    ctx.strokeStyle = e.color;
    ctx.lineWidth = Math.max(4, w * 0.12);
    ctx.lineCap = "round";
    const armY = -h * 0.02 + Math.sin(e.wobblePhase * 2) * 3;
    ctx.beginPath();
    ctx.moveTo(-w * 0.3, 0); ctx.lineTo(-w * 0.55, armY);
    ctx.moveTo(w * 0.3, 0);  ctx.lineTo(w * 0.55, armY);
    ctx.stroke();
    const step = Math.sin(e.wobblePhase * 3) * h * 0.08;
    ctx.beginPath();
    ctx.moveTo(-w * 0.15, h * 0.38); ctx.lineTo(-w * 0.15, h * 0.5 + step);
    ctx.moveTo(w * 0.15, h * 0.38);  ctx.lineTo(w * 0.15, h * 0.5 - step);
    ctx.stroke();
    ctx.filter = "none";
    if (e.hp < e.maxHp) {
      const bw = w * 0.9;
      ctx.fillStyle = "rgba(0,0,0,.5)";
      ctx.fillRect(-bw / 2, -h * 0.62, bw, 5);
      ctx.fillStyle = e.hp / e.maxHp > 0.4 ? "#2ed573" : "#ff4757";
      ctx.fillRect(-bw / 2, -h * 0.62, bw * (e.hp / e.maxHp), 5);
    }
    ctx.restore();
  }

  function drawGunner(x, y, isLeader) {
    ctx.save();
    ctx.translate(x, y);
    const s = isLeader ? 1 : 0.82;
    ctx.scale(s, s);
    // 体
    ctx.fillStyle = isLeader ? "#487eb0" : "#40739e";
    ctx.fillRect(-13, -5, 26, 22);
    // 頭
    ctx.fillStyle = "#f5cd79";
    ctx.beginPath(); ctx.arc(0, -13, 10, 0, Math.PI * 2); ctx.fill();
    // ヘルメット
    ctx.fillStyle = "#2f3640";
    ctx.beginPath(); ctx.arc(0, -14.5, 11, Math.PI, 0); ctx.fill();
    // 銃
    ctx.fillStyle = "#2f3640";
    ctx.fillRect(-2.5, -36, 5, 18);
    ctx.fillRect(-7, -22, 14, 7);
    ctx.restore();
  }

  function drawGate(g) {
    const good = gateIsGood(g);
    ctx.save();
    // パネル
    ctx.fillStyle = good ? "rgba(46,134,222,.32)" : "rgba(255,71,87,.28)";
    ctx.strokeStyle = good ? "#48dbfb" : "#ff4757";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(g.x, g.y, g.w, g.h, 10);
    ctx.fill(); ctx.stroke();
    // 柱
    ctx.fillStyle = good ? "#48dbfb" : "#ff4757";
    ctx.fillRect(g.x - 3, g.y - 6, 8, g.h + 12);
    ctx.fillRect(g.x + g.w - 5, g.y - 6, 8, g.h + 12);
    // ラベル
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 34px sans-serif";
    ctx.fillStyle = "#fff";
    ctx.shadowColor = good ? "#48dbfb" : "#ff4757";
    ctx.shadowBlur = 14;
    ctx.fillText(gateLabel(g), g.x + g.w / 2, g.y + g.h / 2);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawCrate(c) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(Math.sin(c.phase) * 0.08);
    if (c.hitFlash > 0) ctx.filter = "brightness(2)";
    const s = c.size;
    // 箱
    ctx.fillStyle = "#b3742f";
    ctx.fillRect(-s / 2, -s / 2, s, s);
    ctx.fillStyle = "#8a5a24";
    ctx.fillRect(-s / 2, -s / 2, s, 6);
    ctx.fillRect(-s / 2, s / 2 - 6, s, 6);
    // 金の帯と錠前
    ctx.fillStyle = "#f9ca24";
    ctx.fillRect(-4, -s / 2, 8, s);
    ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#8a5a24";
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
    ctx.filter = "none";
    // HPバー
    if (c.hp < c.maxHp) {
      ctx.rotate(-Math.sin(c.phase) * 0.08);
      ctx.fillStyle = "rgba(0,0,0,.5)";
      ctx.fillRect(-s / 2, -s / 2 - 12, s, 5);
      ctx.fillStyle = "#f9ca24";
      ctx.fillRect(-s / 2, -s / 2 - 12, s * Math.max(0, c.hp / c.maxHp), 5);
    }
    ctx.restore();
  }

  function draw() {
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }
    // 背景
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "#1b1b2f");
    grad.addColorStop(1, "#22223a");
    ctx.fillStyle = grad;
    ctx.fillRect(-20, -20, W + 40, H + 40);
    // 地面ライン
    ctx.strokeStyle = "rgba(255,71,87,.35)";
    ctx.setLineDash([12, 8]);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, H - 30); ctx.lineTo(W, H - 30);
    ctx.stroke();
    ctx.setLineDash([]);

    for (const g of gates) drawGate(g);
    for (const c of crates) drawCrate(c);

    // 弾
    ctx.fillStyle = "#fffa65";
    for (const b of bullets) {
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(b.x - 1.5, b.y, 3, 10);
    }

    for (const e of enemies) drawZombie(e);

    // 隊列
    if (state === STATE.PLAYING) {
      // 後列から描いて前が手前に来るように
      for (let i = gunnerPos.length - 1; i >= 1; i--) drawGunner(gunnerPos[i].x, gunnerPos[i].y, false);
      if (gunnerPos.length) drawGunner(gunnerPos[0].x, gunnerPos[0].y, true);
      // マズルフラッシュ
      ctx.fillStyle = "#fffa65";
      for (const m of muzzles) {
        ctx.beginPath(); ctx.arc(m.x, m.y, 6 + Math.random() * 3, 0, Math.PI * 2); ctx.fill();
      }
      // 人数バッジ
      ctx.textAlign = "center";
      ctx.font = "bold 20px sans-serif";
      ctx.fillStyle = "#48dbfb";
      ctx.shadowColor = "#000"; ctx.shadowBlur = 6;
      ctx.fillText(`×${squadCount}`, leaderX, SQUAD_Y + 46 + Math.min(squadCount, MAX_SQUAD) / MAX_SQUAD * 60);
      ctx.shadowBlur = 0;
    }

    // パーティクル
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // フロートテキスト
    ctx.textAlign = "center";
    for (const t of floatTexts) {
      ctx.globalAlpha = Math.min(1, t.life * 2);
      ctx.font = `bold ${t.size}px sans-serif`;
      ctx.fillStyle = t.color;
      ctx.shadowColor = "#000"; ctx.shadowBlur = 5;
      ctx.fillText(t.text, t.x, t.y);
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;

    // HUD
    ctx.textAlign = "left";
    ctx.font = "bold 22px sans-serif";
    ctx.fillStyle = "#ffd32a";
    ctx.fillText(`SCORE ${score}`, 14, 32);
    ctx.textAlign = "right";
    ctx.fillStyle = "#ff6b81";
    ctx.fillText(`WAVE ${wave}`, W - 14, 32);
    ctx.textAlign = "left";
    ctx.font = "14px sans-serif";
    ctx.fillStyle = "#888";
    ctx.fillText(`💀 ${killCount}  BEST ${best}  DMG ${bulletDmg}`, 14, 54);
    let hudY = 74;
    if (rapidTime > 0) {
      ctx.fillStyle = "#ff9ff3";
      ctx.fillText(`RAPID ${rapidTime.toFixed(1)}s`, 14, hudY); hudY += 18;
    }
    if (spreadTime > 0) {
      ctx.fillStyle = "#ffd32a";
      ctx.fillText(`3WAY ${spreadTime.toFixed(1)}s`, 14, hudY);
    }

    // ボムのフラッシュ
    if (flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flash * 1.6})`;
      ctx.fillRect(-20, -20, W + 40, H + 40);
    }

    ctx.restore();
  }

  // ---- ゲームフロー ----
  const startScreen = document.getElementById("start-screen");
  const gameoverScreen = document.getElementById("gameover-screen");

  function startGame() {
    reset();
    updateGunnerPos();
    state = STATE.PLAYING;
    startScreen.classList.add("hidden");
    gameoverScreen.classList.add("hidden");
    beep(660, 0.15, "triangle", 0.06);
  }

  function gameOver() {
    state = STATE.GAMEOVER;
    shake = 14;
    spawnParticles(leaderX, SQUAD_Y, "#ff4757", 40, 2);
    beep(120, 0.5, "sawtooth", 0.1);
    if (score > best) {
      best = score;
      localStorage.setItem("gs_best", String(best));
    }
    document.getElementById("final-score").textContent = score;
    document.getElementById("best-score-label").textContent = `ベストスコア: ${best}`;
    setTimeout(() => gameoverScreen.classList.remove("hidden"), 600);
  }

  document.getElementById("start-btn").addEventListener("click", startGame);
  document.getElementById("retry-btn").addEventListener("click", startGame);

  // ---- メインループ ----
  reset();
  updateGunnerPos();
  lastTime = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 1 / 20);
    lastTime = now;
    if (state === STATE.PLAYING) update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
