<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GATE INVADERS - よくある広告のやつ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #05050c;
    overflow: hidden;
    touch-action: none;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #game-container {
    position: relative;
    width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
  }
  canvas {
    display: block;
    background: #07070f;
    box-shadow: 0 0 40px rgba(0,0,0,.8);
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(5,5,12,.82);
    color: #fff;
    text-align: center;
    z-index: 10;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: clamp(28px, 7vw, 56px);
    letter-spacing: .1em;
    color: #2eff7b;
    text-shadow: 0 0 24px rgba(46,255,123,.6);
    margin-bottom: 12px;
  }
  .overlay p { font-size: clamp(13px, 3.4vw, 19px); color: #ccc; margin: 5px 0; }
  .overlay .score-big { font-size: clamp(24px, 6vw, 44px); color: #ffd32a; margin: 10px 0; }
  .overlay button {
    margin-top: 24px;
    padding: 14px 48px;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: bold;
    color: #fff;
    background: linear-gradient(180deg, #2eff7b, #0fae4a);
    border: none; border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 6px 0 #087031, 0 10px 20px rgba(0,0,0,.5);
    transition: transform .08s;
  }
  .overlay button:active { transform: translateY(4px); box-shadow: 0 2px 0 #087031; }
  #gameover-screen h1 { color: #ff4757; text-shadow: 0 0 24px rgba(255,71,87,.6); }
  #gameover-screen button {
    background: linear-gradient(180deg, #ff6b81, #e8304a);
    box-shadow: 0 6px 0 #a3122a, 0 10px 20px rgba(0,0,0,.5);
  }
  #gameover-screen button:active { box-shadow: 0 2px 0 #a3122a; }

  /* レベルアップ画面 */
  #levelup-screen {
    background: rgba(5,5,15,.72);
    backdrop-filter: blur(2px);
  }
  #levelup-screen h2 {
    font-size: clamp(26px, 6vw, 42px);
    color: #ffd32a;
    letter-spacing: .12em;
    text-shadow: 0 0 20px rgba(255,211,42,.8);
    margin-bottom: 18px;
    animation: pulse .8s infinite alternate;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.06); } }
  #upgrade-cards {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 480px;
  }
  .upgrade-card {
    width: 136px;
    padding: 16px 10px 14px;
    background: linear-gradient(180deg, #1c1c34, #10101f);
    border: 2px solid #3d3d6b;
    border-radius: 14px;
    cursor: pointer;
    transition: transform .1s, border-color .1s, box-shadow .1s;
    color: #fff;
  }
  .upgrade-card:hover, .upgrade-card:active {
    transform: translateY(-6px) scale(1.04);
    border-color: #ffd32a;
    box-shadow: 0 0 24px rgba(255,211,42,.45);
  }
  .upgrade-card .icon { font-size: 38px; margin-bottom: 8px; }
  .upgrade-card .name { font-size: 15px; font-weight: bold; color: #ffd32a; margin-bottom: 6px; }
  .upgrade-card .desc { font-size: 12px; color: #bbb; line-height: 1.5; }
  .upgrade-card .key { font-size: 10px; color: #666; margin-top: 8px; }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>

  <div id="start-screen" class="overlay">
    <h1>👾 GATE INVADERS</h1>
    <p>迫りくるインベーダーの大群を撃ちまくれ！</p>
    <p>🚪 <b>×2 / ×3 / +10</b> のゲートをくぐると自軍が増殖（上限なし！）</p>
    <p>🔫 マイナスゲートは撃ちまくればプラスに変わる！</p>
    <p>📦 宝箱を撃って壊すとパワーアップ！</p>
    <p>⭐ レベルアップで3つの強化から選択！</p>
    <p>👑 5ウェーブごとに巨大ボスが出現！</p>
    <p>操作：マウス / タッチ / ←→キー（射撃は自動）</p>
    <button id="start-btn">▶ ゲームスタート</button>
  </div>

  <div id="levelup-screen" class="overlay hidden">
    <h2>⭐ LEVEL UP! ⭐</h2>
    <div id="upgrade-cards"></div>
  </div>

  <div id="gameover-screen" class="overlay hidden">
    <h1>GAME OVER</h1>
    <p>全滅…！スコア</p>
    <div class="score-big" id="final-score">0</div>
    <p id="best-score-label"></p>
    <button id="retry-btn">🔄 もう一度</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // ---- 論理解像度（縦長・スマホ広告風） ----
  const W = 480, H = 800;

  function resize() {
    const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = `${W * scale}px`;
    canvas.style.height = `${H * scale}px`;
  }
  window.addEventListener("resize", resize);
  resize();

  // ============================================================
  // ピクセルアートスプライト（インベーダー風）
  // ============================================================
  const PIX = {
    crabA: [
      "..X.....X..",
      "...X...X...",
      "..XXXXXXX..",
      ".XX.XXX.XX.",
      "XXXXXXXXXXX",
      "X.XXXXXXX.X",
      "X.X.....X.X",
      "...XX.XX...",
    ],
    crabB: [
      "..X.....X..",
      "X..X...X..X",
      "X.XXXXXXX.X",
      "XXX.XXX.XXX",
      ".XXXXXXXXX.",
      "..XXXXXXX..",
      "..X.....X..",
      ".X.......X.",
    ],
    squidA: [
      "...XX...",
      "..XXXX..",
      ".XXXXXX.",
      "XX.XX.XX",
      "XXXXXXXX",
      "..X..X..",
      ".X.XX.X.",
      "X.X..X.X",
    ],
    squidB: [
      "...XX...",
      "..XXXX..",
      ".XXXXXX.",
      "XX.XX.XX",
      "XXXXXXXX",
      ".X.XX.X.",
      "X......X",
      ".X....X.",
    ],
    octoA: [
      "....XXXX....",
      ".XXXXXXXXXX.",
      "XXXXXXXXXXXX",
      "XXX..XX..XXX",
      "XXXXXXXXXXXX",
      "...XX..XX...",
      "..XX.XX.XX..",
      "XX........XX",
    ],
    octoB: [
      "....XXXX....",
      ".XXXXXXXXXX.",
      "XXXXXXXXXXXX",
      "XXX..XX..XXX",
      "XXXXXXXXXXXX",
      "..XXX..XXX..",
      ".XX..XX..XX.",
      "..XX....XX..",
    ],
    ufo: [
      ".....XXXXXX.....",
      "...XXXXXXXXXX...",
      "..XXXXXXXXXXXX..",
      ".XX.XX.XX.XX.XX.",
      "XXXXXXXXXXXXXXXX",
      "..XXX..XX..XXX..",
      "...X........X...",
    ],
    cannon1: [
      "......X......",
      ".....XXX.....",
      ".....XXX.....",
      ".XXXXXXXXXXX.",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
    ],
    cannon2: [
      "......X......",
      ".....XXX.....",
      "..X..XXX..X..",
      ".XX.XXXXX.XX.",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
      ".XXXXXXXXXXX.",
      "..XX.....XX..",
    ],
    cannon3: [
      "...X.....X...",
      "..XXX...XXX..",
      "..XXX...XXX..",
      ".XXXXXXXXXXX.",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
      ".XX.......XX.",
    ],
  };

  // パターン → オフスクリーンcanvas に事前レンダリング
  function makeSprite(pattern, color, px) {
    const rows = pattern.length, cols = pattern[0].length;
    const c = document.createElement("canvas");
    c.width = cols * px; c.height = rows * px;
    const g = c.getContext("2d");
    g.fillStyle = color;
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        if (pattern[y][x] === "X") g.fillRect(x * px, y * px, px, px);
      }
    }
    return c;
  }
  function makeGlow(color, r) {
    const c = document.createElement("canvas");
    c.width = c.height = r * 2;
    const g = c.getContext("2d");
    const grad = g.createRadialGradient(r, r, 0, r, r, r);
    grad.addColorStop(0, color);
    grad.addColorStop(0.4, color.replace(")", ",0.35)").replace("rgb", "rgba"));
    grad.addColorStop(1, "rgba(0,0,0,0)");
    g.fillStyle = grad;
    g.fillRect(0, 0, r * 2, r * 2);
    return c;
  }

  const SPR = {
    crab:  [makeSprite(PIX.crabA, "#2eff7b", 4), makeSprite(PIX.crabB, "#2eff7b", 4)],
    crabW: [makeSprite(PIX.crabA, "#ffffff", 4), makeSprite(PIX.crabB, "#ffffff", 4)],
    squid:  [makeSprite(PIX.squidA, "#ff9f43", 4), makeSprite(PIX.squidB, "#ff9f43", 4)],
    squidW: [makeSprite(PIX.squidA, "#ffffff", 4), makeSprite(PIX.squidB, "#ffffff", 4)],
    octo:  [makeSprite(PIX.octoA, "#c56cf0", 7), makeSprite(PIX.octoB, "#c56cf0", 7)],
    octoW: [makeSprite(PIX.octoA, "#ffffff", 7), makeSprite(PIX.octoB, "#ffffff", 7)],
    boss:  [makeSprite(PIX.ufo, "#e056fd", 10), makeSprite(PIX.ufo, "#a55eea", 10)],
    bossW: [makeSprite(PIX.ufo, "#ffffff", 10), makeSprite(PIX.ufo, "#ffffff", 10)],
    cannon: [
      makeSprite(PIX.cannon1, "#2eff7b", 2.4),
      makeSprite(PIX.cannon2, "#48dbfb", 2.4),
      makeSprite(PIX.cannon3, "#ffd32a", 2.4),
    ],
    cannonBig: [
      makeSprite(PIX.cannon1, "#2eff7b", 3.2),
      makeSprite(PIX.cannon2, "#48dbfb", 3.2),
      makeSprite(PIX.cannon3, "#ffd32a", 3.2),
    ],
    bulletGlow: makeGlow("rgb(120,255,180)", 12),
    missileGlow: makeGlow("rgb(255,160,80)", 14),
  };

  // ---- 定数 ----
  const FIRE_STREAMS = 22;   // 同時発射ストリーム上限（超過分はダメージに換算）
  const DRAW_SQUAD = 90;     // 描画する兵士の最大数（人数自体は無制限）
  const MAX_BULLETS = 350;
  const MAX_ENEMIES = 130;
  const MAX_TEXTS = 40;
  const SQUAD_Y = H - 150;

  // ---- 状態 ----
  const STATE = { TITLE: 0, PLAYING: 1, LEVELUP: 2, GAMEOVER: 3 };
  let state = STATE.TITLE;

  let leaderX, targetX, squadCount, bulletDmg, fireRate, spreadTime, rapidTime;
  let shotWays, pierce, critChance, missileCount, bulletSpeed, fireRateMul;
  let level, xp, xpNext;
  let bullets, missiles, enemies, gates, crates, particles, floatTexts, shockwaves, stars;
  let gunnerPos = [];
  let score, wave, killCount, combo, comboTimer, maxCombo;
  let fireAcc, fireIdx, muzzles, missileTimer;
  let spawnTimer, hordeTimer, gateTimer, crateTimer, waveTimer, shake, flash, lastTime, elapsed;
  let boss, bossMinionTimer;
  let best = Number(localStorage.getItem("gs_best") || 0);
  // デバッグ用: ?wave=4 で途中ウェーブから開始できる
  const DEBUG_WAVE = Number(new URLSearchParams(location.search).get("wave")) || 0;

  // ---- 隊列オフセット（必要な分だけ拡張していく）----
  const OFFSETS = [{ x: 0, y: 0 }];
  function ensureOffsets(n) {
    let row = 1, count = 1;
    // 既存の行数を数え直すより作り直しの方が単純（呼ばれるのは増えた時だけ）
    while (OFFSETS.length < n) {
      const idx = OFFSETS.length;
      const width = Math.min(4 + Math.floor(idx / 8), 14);
      const rowIdx = Math.floor((idx - 1) / width) + 1;
      const posInRow = (idx - 1) % width;
      const jx = Math.sin(idx * 999) * 5;
      const jy = Math.sin(idx * 777) * 4;
      OFFSETS.push({
        x: (posInRow - (width - 1) / 2) * 24 + jx,
        y: rowIdx * 25 + jy,
      });
    }
  }

  function reset() {
    leaderX = W / 2; targetX = W / 2;
    squadCount = 5;
    bulletDmg = 1;
    fireRate = 0.32; fireRateMul = 1;
    spreadTime = 0; rapidTime = 0;
    shotWays = 1; pierce = 0; critChance = 0; missileCount = 0; bulletSpeed = 760;
    level = 1; xp = 0; xpNext = 10;
    bullets = []; missiles = []; enemies = []; gates = []; crates = [];
    particles = []; floatTexts = []; shockwaves = [];
    score = 0; wave = DEBUG_WAVE || 1; killCount = 0;
    combo = 0; comboTimer = 0; maxCombo = 0;
    fireAcc = 0; fireIdx = 0; muzzles = []; missileTimer = 3;
    spawnTimer = 1.5; hordeTimer = 10; gateTimer = 3.5; crateTimer = 5; waveTimer = 0;
    shake = 0; flash = 0; elapsed = 0;
    boss = null; bossMinionTimer = 0;
    stars = [];
    for (let i = 0; i < 70; i++) {
      stars.push({
        x: Math.random() * W, y: Math.random() * H,
        speed: 20 + Math.random() * 90,
        size: Math.random() < 0.85 ? 1.5 : 2.5,
      });
    }
  }

  // ---- 入力 ----
  const keys = {};
  window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (state === STATE.LEVELUP && ["1", "2", "3"].includes(e.key)) {
      const cards = document.querySelectorAll(".upgrade-card");
      const c = cards[Number(e.key) - 1];
      if (c) c.click();
    }
  });
  window.addEventListener("keyup", e => { keys[e.key] = false; });

  function pointerX(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    return cx / rect.width * W;
  }
  canvas.addEventListener("mousemove", e => { targetX = pointerX(e); });
  canvas.addEventListener("touchstart", e => { e.preventDefault(); targetX = pointerX(e); }, { passive: false });
  canvas.addEventListener("touchmove",  e => { e.preventDefault(); targetX = pointerX(e); }, { passive: false });

  // ---- サウンド（WebAudioでピコピコ） ----
  let audioCtx = null;
  function beep(freq, dur, type = "square", vol = 0.06) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    } catch (_) { /* 音が出なくてもゲームは続行 */ }
  }
  function fanfare() {
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.18, "triangle", 0.08), i * 90));
  }

  // ============================================================
  // レベルアップ強化
  // ============================================================
  const UPGRADES = [
    { id: "troops",  icon: "👥", name: "兵士募集",       desc: "仲間が8人増える",             can: () => true,             apply: () => { squadCount += 8; } },
    { id: "dmg",     icon: "💥", name: "ダメージUP",     desc: "弾のダメージ +1",             can: () => true,             apply: () => { bulletDmg++; } },
    { id: "rate",    icon: "⚡", name: "連射UP",         desc: "発射速度 +20%",               can: () => fireRateMul < 3,  apply: () => { fireRateMul *= 1.2; } },
    { id: "multi",   icon: "🔱", name: "マルチショット", desc: "同時発射 +1WAY（永続）",      can: () => shotWays < 5,     apply: () => { shotWays++; } },
    { id: "pierce",  icon: "🎯", name: "貫通弾",         desc: "弾が敵を +1体 貫通する",      can: () => pierce < 4,       apply: () => { pierce++; } },
    { id: "crit",    icon: "✨", name: "クリティカル",   desc: "+15%の確率で 3倍ダメージ",    can: () => critChance < 0.6, apply: () => { critChance += 0.15; } },
    { id: "missile", icon: "🚀", name: "ホーミング弾",   desc: "3秒ごとに追尾ミサイル +1発",  can: () => missileCount < 6, apply: () => { missileCount++; } },
    { id: "speed",   icon: "💨", name: "高速弾",         desc: "弾速 +25%",                   can: () => bulletSpeed < 1600, apply: () => { bulletSpeed *= 1.25; } },
  ];

  const levelupScreen = document.getElementById("levelup-screen");
  const cardsBox = document.getElementById("upgrade-cards");

  function gainXP(n) {
    xp += n;
    if (xp >= xpNext && state === STATE.PLAYING) showLevelUp();
  }

  function showLevelUp() {
    state = STATE.LEVELUP;
    const pool = UPGRADES.filter(u => u.can());
    const picks = [];
    while (picks.length < 3 && pool.length) {
      picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
    }
    cardsBox.innerHTML = "";
    picks.forEach((u, i) => {
      const div = document.createElement("div");
      div.className = "upgrade-card";
      div.innerHTML = `<div class="icon">${u.icon}</div><div class="name">${u.name}</div><div class="desc">${u.desc}</div><div class="key">[${i + 1}]</div>`;
      div.addEventListener("click", () => chooseUpgrade(u));
      cardsBox.appendChild(div);
    });
    levelupScreen.classList.remove("hidden");
    fanfare();
  }

  function chooseUpgrade(u) {
    if (state !== STATE.LEVELUP) return;
    u.apply();
    xp -= xpNext;
    level++;
    xpNext = 10 + (level - 1) * 8;
    addFloatText(leaderX, SQUAD_Y - 70, `${u.icon} ${u.name}！`, "#ffd32a", 26);
    spawnShockwave(leaderX, SQUAD_Y, 120, "#ffd32a");
    spawnParticles(leaderX, SQUAD_Y - 20, "#ffd32a", 24, 1.4);
    beep(1300, 0.25, "triangle", 0.09);
    levelupScreen.classList.add("hidden");
    state = STATE.PLAYING;
    // 一気に大量XPが入っていた場合は連続レベルアップ
    if (xp >= xpNext) showLevelUp();
  }

  // 自機の見た目ティア（レベルで進化）
  function playerTier() {
    return level >= 8 ? 2 : level >= 4 ? 1 : 0;
  }

  // ---- 敵 ----
  function spawnEnemy(x, y) {
    if (enemies.length >= MAX_ENEMIES) return;
    const r = Math.random();
    let e;
    if (r < 0.06 + wave * 0.008 && wave >= 3) {
      e = { type: "tank", spr: "octo", hp: 20 + wave * 6, speed: 26 + wave * 1.5, score: 500, cost: 10, xp: 8, color: "#c56cf0" };
    } else if (r < 0.35 && wave >= 2) {
      e = { type: "fast", spr: "squid", hp: 1 + Math.floor(wave * 0.5), speed: 100 + wave * 6, score: 150, cost: 1, xp: 2, color: "#ff9f43" };
    } else {
      e = { type: "normal", spr: "crab", hp: 2 + wave, speed: 50 + wave * 4, score: 100, cost: 2, xp: 2, color: "#2eff7b" };
    }
    const spr = SPR[e.spr][0];
    e.w = spr.width; e.h = spr.height;
    e.speed *= 0.9 + Math.random() * 0.25;
    e.maxHp = e.hp;
    e.x = x !== undefined ? x : 30 + Math.random() * (W - 60);
    e.y = y !== undefined ? y : -e.h;
    e.wobblePhase = Math.random() * Math.PI * 2;
    e.wobbleAmp = e.type === "tank" ? 6 : 16;
    e.hitFlash = 0;
    enemies.push(e);
  }

  function spawnHorde() {
    const n = Math.min(4 + wave * 2, 26);
    const cx = 80 + Math.random() * (W - 160);
    for (let i = 0; i < n; i++) {
      spawnEnemy(
        Math.max(20, Math.min(W - 20, cx + (Math.random() - 0.5) * 200)),
        -50 - Math.random() * 220
      );
    }
    addFloatText(W / 2, 130, "⚠ 大群接近！", "#ff6b81", 26);
    beep(220, 0.25, "sawtooth", 0.07);
  }

  // ---- ボス（5ウェーブごと）----
  function spawnBoss() {
    const hp = 250 + wave * 50;
    const spr = SPR.boss[0];
    boss = {
      x: W / 2, y: -140, targetY: 215,
      w: spr.width, h: spr.height,
      hp, maxHp: hp,
      wobble: 0, hitFlash: 0,
    };
    bossMinionTimer = 2;
    addFloatText(W / 2, 200, "👑 ボス出現！！", "#e056fd", 30);
    spawnShockwave(W / 2, 160, 200, "#e056fd");
    shake = Math.min(shake + 10, 16);
    beep(70, 0.6, "sawtooth", 0.12);
  }
  function killBoss() {
    const bonus = 1000 + wave * 200;
    score += bonus; killCount++;
    // 派手に：多段衝撃波＋大量パーティクル＋フラッシュ
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        if (state !== STATE.PLAYING) return;
        spawnShockwave(boss ? boss.x : W / 2, boss ? boss.y : 220, 160 + i * 90, i % 2 ? "#ffd32a" : "#e056fd");
      }, i * 120);
    }
    spawnShockwave(boss.x, boss.y, 280, "#ffffff");
    spawnParticles(boss.x, boss.y, "#e056fd", 50, 2.4);
    spawnParticles(boss.x, boss.y, "#ffd32a", 40, 1.8);
    spawnParticles(boss.x, boss.y, "#ffffff", 30, 3);
    addFloatText(boss.x, boss.y, `👑 BOSS撃破！ +${bonus}`, "#e056fd", 30);
    squadCount += 8;
    addFloatText(leaderX, SQUAD_Y - 60, "+8人！", "#48dbfb", 24);
    gainXP(40);
    flash = 0.5; shake = 20;
    beep(1300, 0.4, "triangle", 0.1);
    setTimeout(() => beep(1600, 0.4, "triangle", 0.08), 120);
    boss = null;
  }

  // ---- ゲート ----
  function gateSpec(kind, value) {
    return { kind, value, hits: 0 };
  }
  function randomGoodGate(strong) {
    const r = Math.random();
    if (strong && r < 0.25) return gateSpec("mult", 3);
    if (r < 0.45) return gateSpec("mult", 2);
    if (r < 0.85) return gateSpec("plus", 5 + Math.floor(Math.random() * 10));
    return gateSpec("dmg", 1);
  }
  function randomBadGate() {
    return Math.random() < 0.5
      ? gateSpec("plus", -(10 + Math.floor(Math.random() * 20)))
      : gateSpec("div2", 2);
  }
  let gatePairSeq = 0;
  function spawnGatePair() {
    const pairId = ++gatePairSeq;
    let a, b;
    if (Math.random() < 0.7) { a = randomGoodGate(false); b = randomBadGate(); }
    else { a = randomGoodGate(true); b = randomGoodGate(false); }
    if (Math.random() < 0.5) [a, b] = [b, a];
    const h = 62, speed = 135 + wave * 3;
    const gw = W / 2 - 14;
    gates.push({ ...a, pairId, x: 8,         w: gw, y: -h, h, vy: speed });
    gates.push({ ...b, pairId, x: W / 2 + 6, w: gw, y: -h, h, vy: speed });
  }

  function gateIsGood(g) {
    if (g.kind === "div2") return false;
    if (g.kind === "plus") return g.value > 0;
    return true;
  }
  function gateLabel(g) {
    if (g.kind === "mult") return `×${g.value}`;
    if (g.kind === "plus") return g.value > 0 ? `+${g.value}` : `${g.value}`;
    if (g.kind === "div2") return "÷2";
    return "DMG +1";
  }
  function upgradeGate(g) {
    g.hits++;
    if (g.kind === "plus") {
      const step = g.value < 0 ? 2 : 4;
      if (g.hits % step === 0) {
        g.value++;
        if (g.hits % (step * 3) === 0) beep(700 + g.value * 10, 0.05, "triangle", 0.04);
      }
    } else if (g.kind === "mult" && g.value === 2 && g.hits >= 30) {
      g.value = 3; g.hits = 0;
      addFloatText(g.x + g.w / 2, g.y + g.h / 2, "×3にパワーアップ！", "#48dbfb", 20);
      beep(1000, 0.2, "triangle", 0.08);
    } else if (g.kind === "div2" && g.hits >= 26) {
      g.kind = "plus"; g.value = 3; g.hits = 0;
      addFloatText(g.x + g.w / 2, g.y + g.h / 2, "プラスに変化！", "#48dbfb", 20);
      beep(1000, 0.2, "triangle", 0.08);
    }
  }
  function applyGate(g) {
    if (g.kind === "mult") {
      const before = squadCount;
      squadCount = squadCount * g.value;
      addFloatText(leaderX, SQUAD_Y - 60, `×${g.value}！ ${before}→${squadCount}人`, "#48dbfb", 26);
      spawnShockwave(leaderX, SQUAD_Y, 140, "#48dbfb");
      beep(880, 0.25, "triangle", 0.09);
    } else if (g.kind === "plus") {
      squadCount = Math.max(1, squadCount + g.value);
      const good = g.value > 0;
      addFloatText(leaderX, SQUAD_Y - 60, `${good ? "+" : ""}${g.value}人！`, good ? "#48dbfb" : "#ff4757", 26);
      if (good) spawnShockwave(leaderX, SQUAD_Y, 100, "#48dbfb");
      beep(good ? 880 : 150, 0.25, good ? "triangle" : "sawtooth", 0.09);
      if (!good) shake = Math.min(shake + 8, 14);
    } else if (g.kind === "div2") {
      squadCount = Math.max(1, Math.ceil(squadCount / 2));
      addFloatText(leaderX, SQUAD_Y - 60, `÷2… ${squadCount}人に…`, "#ff4757", 26);
      beep(150, 0.3, "sawtooth", 0.09);
      shake = Math.min(shake + 8, 14);
    } else if (g.kind === "dmg") {
      bulletDmg++;
      addFloatText(leaderX, SQUAD_Y - 60, `武器強化！ DMG ${bulletDmg}`, "#ff9ff3", 26);
      spawnShockwave(leaderX, SQUAD_Y, 100, "#ff9ff3");
      beep(1200, 0.25, "triangle", 0.09);
    }
  }

  // ---- 宝箱 ----
  function spawnCrate() {
    crates.push({
      x: 50 + Math.random() * (W - 100),
      y: -40,
      vy: 55 + Math.random() * 25,
      hp: 8 + wave, maxHp: 8 + wave,
      size: 46,
      hitFlash: 0,
      phase: Math.random() * Math.PI * 2,
    });
  }
  function openCrate(c) {
    spawnParticles(c.x, c.y, "#f0932b", 24, 1.2);
    spawnShockwave(c.x, c.y, 90, "#f9ca24");
    shake = Math.min(shake + 5, 12);
    gainXP(4);
    const r = Math.random();
    if (r < 0.3) {
      const n = 4 + Math.floor(Math.random() * 8);
      squadCount += n;
      addFloatText(c.x, c.y, `+${n}人！`, "#48dbfb", 24);
    } else if (r < 0.45) {
      bulletDmg++;
      addFloatText(c.x, c.y, `武器強化！ DMG ${bulletDmg}`, "#ff9ff3", 24);
    } else if (r < 0.65) {
      rapidTime = 10;
      addFloatText(c.x, c.y, "RAPID FIRE！", "#ff9ff3", 24);
    } else if (r < 0.85) {
      spreadTime = 10;
      addFloatText(c.x, c.y, "3WAYショット！", "#ffd32a", 24);
    } else {
      flash = 0.4; shake = 16;
      addFloatText(c.x, c.y, "💣 ボム！！", "#ff6b81", 30);
      spawnShockwave(c.x, c.y, 300, "#ffffff");
      for (const e of enemies) {
        score += e.score; killCount++;
        gainXP(e.xp);
        spawnParticles(e.x, e.y, e.color, 8, 1.2);
      }
      enemies.length = 0;
      beep(60, 0.6, "sawtooth", 0.12);
      return;
    }
    beep(1100, 0.2, "triangle", 0.09);
  }

  // ---- エフェクト ----
  function spawnParticles(x, y, color, n, power = 1) {
    if (particles.length > 400) return;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = (40 + Math.random() * 160) * power;
      particles.push({
        x, y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40,
        life: 0.4 + Math.random() * 0.4,
        maxLife: 0.8,
        size: 2 + Math.random() * 4,
        color,
      });
    }
  }
  function spawnShockwave(x, y, maxR, color) {
    shockwaves.push({ x, y, r: 8, maxR, life: 0.45, maxLife: 0.45, color });
  }
  function addFloatText(x, y, text, color = "#ffd32a", size = 22) {
    if (floatTexts.length >= MAX_TEXTS) floatTexts.shift();
    floatTexts.push({ x, y, text, color, size, life: 1.0 });
  }

  function comboMul() {
    return 1 + Math.min(combo, 50) * 0.02;
  }

  function killEnemy(e, giveScore = true) {
    if (giveScore) {
      combo++; comboTimer = 2;
      if (combo > maxCombo) maxCombo = combo;
      const pts = Math.round(e.score * comboMul());
      score += pts; killCount++;
      gainXP(e.xp);
      addFloatText(e.x, e.y, `+${pts}`);
      if (combo >= 10 && combo % 10 === 0) {
        addFloatText(W / 2, 200, `🔥 ${combo} COMBO！`, "#ff9f43", 30);
        spawnShockwave(e.x, e.y, 100, "#ff9f43");
        beep(600 + combo * 8, 0.15, "triangle", 0.07);
      }
    }
    spawnParticles(e.x, e.y, e.color, e.type === "tank" ? 26 : 10, e.type === "tank" ? 1.6 : 1);
    if (e.type === "tank") spawnShockwave(e.x, e.y, 110, e.color);
    shake = Math.min(shake + (e.type === "tank" ? 8 : 1.5), 12);
    beep(e.type === "tank" ? 90 : 160, 0.12, "sawtooth", 0.06);
  }

  function loseSoldiers(n, x, y) {
    squadCount -= n;
    combo = 0;
    addFloatText(x, y, `-${n}人`, "#ff4757", 24);
    spawnParticles(x, y, "#ff4757", 12, 1.2);
    shake = Math.min(shake + 6, 14);
    beep(110, 0.2, "sawtooth", 0.09);
    if (squadCount <= 0) { squadCount = 0; gameOver(); }
  }

  // ---- 隊列座標の再計算 ----
  function updateGunnerPos() {
    const n = Math.min(squadCount, DRAW_SQUAD);
    ensureOffsets(n);
    gunnerPos.length = 0;
    for (let i = 0; i < n; i++) {
      const o = OFFSETS[i];
      gunnerPos.push({
        x: Math.max(14, Math.min(W - 14, leaderX + o.x)),
        y: SQUAD_Y + o.y,
      });
    }
  }

  // ---- ミサイル ----
  function fireMissiles() {
    for (let i = 0; i < missileCount; i++) {
      const a = -Math.PI / 2 + (Math.random() - 0.5) * 1.6;
      missiles.push({
        x: leaderX + (Math.random() - 0.5) * 60,
        y: SQUAD_Y - 10,
        vx: Math.cos(a) * 250, vy: Math.sin(a) * 250,
        life: 4,
        dmg: bulletDmg * 4,
      });
    }
    if (missileCount) beep(500, 0.1, "sawtooth", 0.04);
  }
  function nearestTarget(x, y) {
    let bestT = null, bestD = Infinity;
    for (const e of enemies) {
      const d = (e.x - x) ** 2 + (e.y - y) ** 2;
      if (d < bestD) { bestD = d; bestT = e; }
    }
    if (boss) {
      const d = (boss.x - x) ** 2 + (boss.y - y) ** 2;
      if (d < bestD) bestT = boss;
    }
    return bestT;
  }
  function explodeMissile(m) {
    spawnParticles(m.x, m.y, "#ff9f43", 16, 1.4);
    spawnShockwave(m.x, m.y, 80, "#ff9f43");
    shake = Math.min(shake + 3, 12);
    beep(120, 0.15, "sawtooth", 0.07);
    const R = 70;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if ((e.x - m.x) ** 2 + (e.y - m.y) ** 2 < R * R) {
        e.hp -= m.dmg; e.hitFlash = 0.08;
        if (e.hp <= 0) { killEnemy(e); enemies.splice(j, 1); }
      }
    }
    if (boss && (boss.x - m.x) ** 2 + (boss.y - m.y) ** 2 < (R + 60) ** 2) {
      boss.hp -= m.dmg; boss.hitFlash = 0.06;
      if (boss.hp <= 0) killBoss();
    }
  }

  // ---- 更新 ----
  function update(dt) {
    elapsed += dt;

    // 星背景
    for (const s of stars) {
      s.y += s.speed * dt;
      if (s.y > H) { s.y = -3; s.x = Math.random() * W; }
    }

    // 移動
    const speed = 430;
    if (keys["ArrowLeft"] || keys["a"])  targetX = leaderX - speed * dt * 1.6;
    if (keys["ArrowRight"] || keys["d"]) targetX = leaderX + speed * dt * 1.6;
    const dx = targetX - leaderX;
    const maxMove = speed * dt;
    leaderX += Math.abs(dx) <= maxMove ? dx : Math.sign(dx) * maxMove;
    leaderX = Math.max(30, Math.min(W - 30, leaderX));
    updateGunnerPos();

    // コンボタイマー
    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

    // パワーアップ時間
    if (rapidTime > 0) rapidTime -= dt;
    if (spreadTime > 0) spreadTime -= dt;
    const curRate = (rapidTime > 0 ? 0.22 : fireRate) / fireRateMul;

    // 自動射撃
    const streams = Math.min(squadCount, FIRE_STREAMS);
    const dmgScale = squadCount > FIRE_STREAMS ? squadCount / FIRE_STREAMS : 1;
    fireAcc += dt * streams / curRate;
    let fired = 0;
    while (fireAcc >= 1 && fired < 12) {
      fireAcc--; fired++;
      const g = gunnerPos[fireIdx % gunnerPos.length];
      fireIdx++;
      const ways = shotWays + (spreadTime > 0 ? 2 : 0);
      for (let i = 0; i < ways; i++) {
        const off = ways === 1 ? 0 : (i - (ways - 1) / 2) * 0.14;
        bullets.push({
          x: g.x, y: g.y - 20,
          vx: Math.sin(off) * bulletSpeed, vy: -Math.cos(off) * bulletSpeed,
          r: 4, dmg: bulletDmg * dmgScale,
          pierce: pierce, lastHit: null,
        });
      }
      muzzles.push({ x: g.x, y: g.y - 24, life: 0.05 });
      if (fired === 1) beep(880, 0.03, "square", 0.012);
    }
    if (bullets.length > MAX_BULLETS) bullets.splice(0, bullets.length - MAX_BULLETS);
    for (let i = muzzles.length - 1; i >= 0; i--) {
      muzzles[i].life -= dt;
      if (muzzles[i].life <= 0) muzzles.splice(i, 1);
    }

    // ミサイル発射
    missileTimer -= dt;
    if (missileTimer <= 0) {
      missileTimer = 3;
      fireMissiles();
    }
    // ミサイル誘導
    for (let i = missiles.length - 1; i >= 0; i--) {
      const m = missiles[i];
      m.life -= dt;
      const t = nearestTarget(m.x, m.y);
      if (t) {
        const ang = Math.atan2(t.y - m.y, t.x - m.x);
        const cur = Math.atan2(m.vy, m.vx);
        let diff = ang - cur;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const turn = Math.max(-6 * dt, Math.min(6 * dt, diff));
        const sp = 400;
        const na = cur + turn;
        m.vx = Math.cos(na) * sp; m.vy = Math.sin(na) * sp;
      }
      m.x += m.vx * dt; m.y += m.vy * dt;
      if (particles.length < 380) {
        particles.push({ x: m.x, y: m.y, vx: 0, vy: 40, life: 0.25, maxLife: 0.25, size: 3, color: "#ff9f43" });
      }
      let hit = false;
      if (t && (t.x - m.x) ** 2 + (t.y - m.y) ** 2 < 30 * 30) hit = true;
      if (hit || m.life <= 0 || m.y < -20 || m.x < -20 || m.x > W + 20) {
        if (hit) explodeMissile(m);
        missiles.splice(i, 1);
        if (state !== STATE.PLAYING) return;
      }
    }

    // 弾の移動と衝突（ゲート → 宝箱 → ボス → 敵 の順に判定）
    outer:
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dt; b.y += b.vy * dt;
      if (b.y < -10 || b.x < -10 || b.x > W + 10) { bullets.splice(i, 1); continue; }
      for (const g of gates) {
        if (b.x > g.x && b.x < g.x + g.w && b.y > g.y && b.y < g.y + g.h) {
          upgradeGate(g);
          spawnParticles(b.x, g.y + g.h, "#dfe6e9", 1, 0.4);
          bullets.splice(i, 1);
          continue outer;
        }
      }
      for (let j = crates.length - 1; j >= 0; j--) {
        const c = crates[j];
        if (Math.abs(b.x - c.x) < c.size / 2 + b.r && Math.abs(b.y - c.y) < c.size / 2 + b.r) {
          c.hp -= b.dmg; c.hitFlash = 0.08;
          spawnParticles(b.x, b.y, "#f0932b", 2, 0.5);
          bullets.splice(i, 1);
          if (c.hp <= 0) { openCrate(c); crates.splice(j, 1); }
          continue outer;
        }
      }
      if (boss && Math.abs(b.x - boss.x) < boss.w / 2 + b.r && Math.abs(b.y - boss.y) < boss.h / 2 + b.r) {
        const crit = Math.random() < critChance;
        const dmg = crit ? b.dmg * 3 : b.dmg;
        boss.hp -= dmg; boss.hitFlash = 0.06;
        spawnParticles(b.x, b.y, crit ? "#ffd32a" : "#fffa65", crit ? 6 : 2, crit ? 1 : 0.5);
        if (crit) addFloatText(b.x, b.y, `${Math.round(dmg)}!`, "#ffd32a", 20);
        bullets.splice(i, 1);
        if (boss.hp <= 0) killBoss();
        continue;
      }
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (e === b.lastHit) continue;
        if (Math.abs(b.x - e.x) < e.w / 2 + b.r && Math.abs(b.y - e.y) < e.h / 2 + b.r) {
          const crit = Math.random() < critChance;
          const dmg = crit ? b.dmg * 3 : b.dmg;
          e.hp -= dmg; e.hitFlash = 0.08;
          spawnParticles(b.x, b.y, crit ? "#ffd32a" : "#fffa65", crit ? 5 : 2, crit ? 0.9 : 0.5);
          if (crit) addFloatText(b.x, b.y, `${Math.round(dmg)}!`, "#ffd32a", 18);
          if (e.hp <= 0) { killEnemy(e); enemies.splice(j, 1); }
          if (b.pierce > 0) {
            b.pierce--; b.lastHit = e;
          } else {
            bullets.splice(i, 1);
          }
          continue outer;
        }
      }
    }

    // ボス：中段まで降りてきて、自機を追いながらミニオンを召喚する
    if (boss) {
      if (boss.y < boss.targetY) {
        boss.y = Math.min(boss.targetY, boss.y + 90 * dt);
      } else {
        const bdx = leaderX - boss.x;
        boss.x += Math.max(-45, Math.min(45, bdx)) * dt;
      }
      boss.wobble += dt * 2;
      if (boss.hitFlash > 0) boss.hitFlash -= dt;
      bossMinionTimer -= dt;
      if (bossMinionTimer <= 0 && boss.y >= boss.targetY) {
        bossMinionTimer = Math.max(1.6, 3.2 - wave * 0.05);
        const n = 2 + Math.floor(Math.random() * 2);
        for (let k = 0; k < n; k++) {
          spawnEnemy(
            Math.max(20, Math.min(W - 20, boss.x + (Math.random() - 0.5) * 180)),
            boss.y + 70
          );
        }
        beep(180, 0.1, "sawtooth", 0.05);
      }
    }

    // 宝箱
    for (let i = crates.length - 1; i >= 0; i--) {
      const c = crates[i];
      c.y += c.vy * dt;
      c.phase += dt * 3;
      if (c.hitFlash > 0) c.hitFlash -= dt;
      if (c.y > H + 30) crates.splice(i, 1);
    }

    // ゲートの移動と通過判定
    for (let i = gates.length - 1; i >= 0; i--) {
      const g = gates[i];
      g.y += g.vy * dt;
      if (g.y + g.h >= SQUAD_Y - 10) {
        const pairId = g.pairId;
        const hit = gates.filter(x => x.pairId === pairId)
                         .find(x => leaderX >= x.x && leaderX <= x.x + x.w) || g;
        applyGate(hit);
        for (let j = gates.length - 1; j >= 0; j--) {
          if (gates[j].pairId === pairId) gates.splice(j, 1);
        }
        if (state !== STATE.PLAYING) return;
        break;
      }
    }

    // 敵
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.y += e.speed * dt;
      e.wobblePhase += dt * (e.type === "fast" ? 9 : 5);
      e.x += Math.sin(e.wobblePhase) * e.wobbleAmp * dt;
      e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
      if (e.hitFlash > 0) e.hitFlash -= dt;

      if (e.y > SQUAD_Y - 80) {
        let touched = false;
        for (const g of gunnerPos) {
          if (Math.abs(e.x - g.x) < e.w / 2 + 11 && Math.abs(e.y - g.y) < e.h / 2 + 13) {
            touched = true; break;
          }
        }
        if (touched) {
          killEnemy(e, false);
          enemies.splice(i, 1);
          loseSoldiers(e.cost, e.x, e.y);
          if (state !== STATE.PLAYING) return;
          continue;
        }
      }
      if (e.y - e.h / 2 > H) {
        enemies.splice(i, 1);
        loseSoldiers(1, e.x, H - 40);
        if (state !== STATE.PLAYING) return;
      }
    }

    // パーティクル・衝撃波・テキスト
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const s = shockwaves[i];
      s.life -= dt;
      s.r = s.maxR * (1 - s.life / s.maxLife);
      if (s.life <= 0) shockwaves.splice(i, 1);
    }
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      const t = floatTexts[i];
      t.y -= 45 * dt; t.life -= dt;
      if (t.life <= 0) floatTexts.splice(i, 1);
    }

    // スポーン（ボス戦中は雑魚の流入を抑えて、ボスの召喚がメインになる）
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      if (!boss) spawnEnemy();
      const interval = Math.max(0.13, 0.95 - wave * 0.05);
      spawnTimer = interval * (0.7 + Math.random() * 0.6);
    }
    hordeTimer -= dt;
    if (hordeTimer <= 0) {
      if (!boss) spawnHorde();
      hordeTimer = Math.max(4, 9 - wave * 0.35) * (0.8 + Math.random() * 0.4);
    }
    gateTimer -= dt;
    if (gateTimer <= 0 && gates.length === 0) {
      spawnGatePair();
      gateTimer = 9 + Math.random() * 5;
    }
    crateTimer -= dt;
    if (crateTimer <= 0) {
      spawnCrate();
      crateTimer = 6 + Math.random() * 6;
    }

    // ウェーブ進行
    waveTimer += dt;
    if (waveTimer >= 12) {
      waveTimer = 0; wave++;
      addFloatText(W / 2, H / 2, `WAVE ${wave}`, "#ff6b81", 30);
      beep(440, 0.3, "triangle", 0.06);
      if (wave % 5 === 0 && !boss) spawnBoss();
    }

    if (shake > 0) shake = Math.max(0, shake - dt * 30);
    if (flash > 0) flash = Math.max(0, flash - dt);
  }

  // ---- 描画 ----
  function walkFrame() {
    return Math.floor(elapsed * 2.5) % 2;
  }

  function drawSpriteEntity(sprPair, whitePair, x, y, hitFlash) {
    const f = walkFrame();
    const spr = sprPair[f];
    ctx.drawImage(spr, x - spr.width / 2, y - spr.height / 2);
    if (hitFlash > 0) {
      ctx.globalAlpha = Math.min(1, hitFlash * 12);
      const w = whitePair[f];
      ctx.drawImage(w, x - w.width / 2, y - w.height / 2);
      ctx.globalAlpha = 1;
    }
  }

  function drawEnemy(e) {
    drawSpriteEntity(SPR[e.spr], SPR[e.spr + "W"], e.x, e.y, e.hitFlash);
    if (e.hp < e.maxHp) {
      const bw = e.w * 0.9;
      ctx.fillStyle = "rgba(0,0,0,.5)";
      ctx.fillRect(e.x - bw / 2, e.y - e.h / 2 - 10, bw, 5);
      ctx.fillStyle = e.hp / e.maxHp > 0.4 ? "#2ed573" : "#ff4757";
      ctx.fillRect(e.x - bw / 2, e.y - e.h / 2 - 10, bw * Math.max(0, e.hp / e.maxHp), 5);
    }
  }

  function drawBoss() {
    const b = boss;
    const yy = b.y + Math.sin(b.wobble) * 6;
    drawSpriteEntity(SPR.boss, SPR.bossW, b.x, yy, b.hitFlash);
    // 王冠
    ctx.fillStyle = "#f9ca24";
    const cw = 44, chh = 20, cy = yy - b.h / 2 - chh + 2;
    ctx.beginPath();
    ctx.moveTo(b.x - cw / 2, cy + chh);
    ctx.lineTo(b.x - cw / 2, cy);
    ctx.lineTo(b.x - cw / 4, cy + chh * 0.55);
    ctx.lineTo(b.x, cy - 4);
    ctx.lineTo(b.x + cw / 4, cy + chh * 0.55);
    ctx.lineTo(b.x + cw / 2, cy);
    ctx.lineTo(b.x + cw / 2, cy + chh);
    ctx.closePath(); ctx.fill();
  }

  function draw() {
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }
    // 宇宙背景
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "#0a0a1c");
    grad.addColorStop(1, "#141428");
    ctx.fillStyle = grad;
    ctx.fillRect(-20, -20, W + 40, H + 40);
    // 星
    ctx.fillStyle = "#8888aa";
    for (const s of stars) ctx.fillRect(s.x, s.y, s.size, s.size);
    // 地面ライン
    ctx.strokeStyle = "rgba(255,71,87,.35)";
    ctx.setLineDash([12, 8]);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, H - 30); ctx.lineTo(W, H - 30);
    ctx.stroke();
    ctx.setLineDash([]);

    for (const g of gates) drawGate(g);
    for (const c of crates) drawCrate(c);

    // 弾（グロー付き）
    for (const b of bullets) {
      ctx.drawImage(SPR.bulletGlow, b.x - 12, b.y - 12);
    }
    ctx.fillStyle = "#eafff2";
    for (const b of bullets) {
      ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
    }

    // ミサイル
    for (const m of missiles) {
      ctx.drawImage(SPR.missileGlow, m.x - 14, m.y - 14);
      ctx.save();
      ctx.translate(m.x, m.y);
      ctx.rotate(Math.atan2(m.vy, m.vx) + Math.PI / 2);
      ctx.fillStyle = "#ffbe76";
      ctx.fillRect(-3, -8, 6, 16);
      ctx.fillStyle = "#ff6b81";
      ctx.fillRect(-3, -8, 6, 5);
      ctx.restore();
    }

    for (const e of enemies) drawEnemy(e);
    if (boss) drawBoss();

    // 隊列
    if (state !== STATE.TITLE && state !== STATE.GAMEOVER) {
      const tier = playerTier();
      // パワーアップ中はオーラ
      if (rapidTime > 0 || spreadTime > 0) {
        ctx.fillStyle = rapidTime > 0 ? "rgba(255,159,243,.12)" : "rgba(255,211,42,.12)";
        ctx.beginPath();
        ctx.arc(leaderX, SQUAD_Y + 40, 90 + Math.sin(elapsed * 8) * 8, 0, Math.PI * 2);
        ctx.fill();
      }
      for (let i = gunnerPos.length - 1; i >= 1; i--) {
        const spr = SPR.cannon[tier];
        ctx.drawImage(spr, gunnerPos[i].x - spr.width / 2, gunnerPos[i].y - spr.height / 2);
      }
      if (gunnerPos.length) {
        const spr = SPR.cannonBig[tier];
        ctx.drawImage(spr, gunnerPos[0].x - spr.width / 2, gunnerPos[0].y - spr.height / 2);
      }
      // マズルフラッシュ
      ctx.fillStyle = "#fffa65";
      for (const m of muzzles) {
        ctx.beginPath(); ctx.arc(m.x, m.y, 5 + Math.random() * 3, 0, Math.PI * 2); ctx.fill();
      }
      // 人数バッジ
      ctx.textAlign = "center";
      ctx.font = "bold 20px sans-serif";
      ctx.fillStyle = "#48dbfb";
      ctx.shadowColor = "#000"; ctx.shadowBlur = 6;
      ctx.fillText(`×${squadCount}`, leaderX, SQUAD_Y + 46 + Math.min(squadCount, DRAW_SQUAD) / DRAW_SQUAD * 60);
      ctx.shadowBlur = 0;
    }

    // 衝撃波
    for (const s of shockwaves) {
      ctx.globalAlpha = Math.max(0, s.life / s.maxLife) * 0.8;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // パーティクル
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // フロートテキスト
    ctx.textAlign = "center";
    for (const t of floatTexts) {
      ctx.globalAlpha = Math.min(1, t.life * 2);
      ctx.font = `bold ${t.size}px sans-serif`;
      ctx.fillStyle = t.color;
      ctx.shadowColor = "#000"; ctx.shadowBlur = 5;
      ctx.fillText(t.text, t.x, t.y);
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;

    // HUD
    ctx.textAlign = "left";
    ctx.font = "bold 22px sans-serif";
    ctx.fillStyle = "#ffd32a";
    ctx.fillText(`SCORE ${score}`, 14, 32);
    ctx.textAlign = "right";
    ctx.fillStyle = "#ff6b81";
    ctx.fillText(`WAVE ${wave}`, W - 14, 32);
    ctx.textAlign = "left";
    ctx.font = "14px sans-serif";
    ctx.fillStyle = "#888";
    ctx.fillText(`💀 ${killCount}  BEST ${best}  DMG ${bulletDmg}`, 14, 54);

    // XPバー＋レベル
    ctx.fillStyle = "rgba(0,0,0,.5)";
    ctx.fillRect(14, 62, W - 28, 8);
    ctx.fillStyle = "#ffd32a";
    ctx.fillRect(14, 62, (W - 28) * Math.min(1, xp / xpNext), 8);
    ctx.font = "bold 12px sans-serif";
    ctx.fillStyle = "#ffd32a";
    ctx.fillText(`Lv.${level}`, 14, 84);

    // コンボ表示
    if (combo >= 5) {
      ctx.textAlign = "right";
      const pop = 1 + Math.max(0, comboTimer - 1.7) * 3;
      ctx.font = `bold ${Math.round(24 * pop)}px sans-serif`;
      ctx.fillStyle = combo >= 20 ? "#ff9f43" : "#ffd32a";
      ctx.shadowColor = "#000"; ctx.shadowBlur = 6;
      ctx.fillText(`${combo} COMBO`, W - 14, 92);
      ctx.shadowBlur = 0;
      ctx.textAlign = "left";
    }

    // ボスHPバー
    if (boss) {
      const bw = W - 80;
      ctx.textAlign = "center";
      ctx.font = "bold 14px sans-serif";
      ctx.fillStyle = "#e056fd";
      ctx.fillText("👑 BOSS", W / 2, 110);
      ctx.fillStyle = "rgba(0,0,0,.55)";
      ctx.fillRect(40, 116, bw, 12);
      ctx.fillStyle = "#e056fd";
      ctx.fillRect(40, 116, bw * Math.max(0, boss.hp / boss.maxHp), 12);
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
      ctx.strokeRect(40, 116, bw, 12);
      ctx.textAlign = "left";
    }
    let hudY = 100;
    ctx.font = "14px sans-serif";
    if (rapidTime > 0) {
      ctx.fillStyle = "#ff9ff3";
      ctx.fillText(`RAPID ${rapidTime.toFixed(1)}s`, 14, hudY); hudY += 18;
    }
    if (spreadTime > 0) {
      ctx.fillStyle = "#ffd32a";
      ctx.fillText(`3WAY ${spreadTime.toFixed(1)}s`, 14, hudY);
    }

    // ボムのフラッシュ
    if (flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flash * 1.6})`;
      ctx.fillRect(-20, -20, W + 40, H + 40);
    }

    ctx.restore();
  }

  function drawGate(g) {
    const good = gateIsGood(g);
    ctx.save();
    ctx.fillStyle = good ? "rgba(46,134,222,.32)" : "rgba(255,71,87,.28)";
    ctx.strokeStyle = good ? "#48dbfb" : "#ff4757";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(g.x, g.y, g.w, g.h, 10);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = good ? "#48dbfb" : "#ff4757";
    ctx.fillRect(g.x - 3, g.y - 6, 8, g.h + 12);
    ctx.fillRect(g.x + g.w - 5, g.y - 6, 8, g.h + 12);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 34px sans-serif";
    ctx.fillStyle = "#fff";
    ctx.shadowColor = good ? "#48dbfb" : "#ff4757";
    ctx.shadowBlur = 14;
    ctx.fillText(gateLabel(g), g.x + g.w / 2, g.y + g.h / 2);
    ctx.shadowBlur = 0;
    ctx.restore();
    ctx.textBaseline = "alphabetic";
  }

  function drawCrate(c) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(Math.sin(c.phase) * 0.08);
    if (c.hitFlash > 0) ctx.filter = "brightness(2)";
    const s = c.size;
    ctx.fillStyle = "#b3742f";
    ctx.fillRect(-s / 2, -s / 2, s, s);
    ctx.fillStyle = "#8a5a24";
    ctx.fillRect(-s / 2, -s / 2, s, 6);
    ctx.fillRect(-s / 2, s / 2 - 6, s, 6);
    ctx.fillStyle = "#f9ca24";
    ctx.fillRect(-4, -s / 2, 8, s);
    ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#8a5a24";
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
    ctx.filter = "none";
    if (c.hp < c.maxHp) {
      ctx.rotate(-Math.sin(c.phase) * 0.08);
      ctx.fillStyle = "rgba(0,0,0,.5)";
      ctx.fillRect(-s / 2, -s / 2 - 12, s, 5);
      ctx.fillStyle = "#f9ca24";
      ctx.fillRect(-s / 2, -s / 2 - 12, s * Math.max(0, c.hp / c.maxHp), 5);
    }
    ctx.restore();
  }

  // ---- ゲームフロー ----
  const startScreen = document.getElementById("start-screen");
  const gameoverScreen = document.getElementById("gameover-screen");

  function startGame() {
    reset();
    updateGunnerPos();
    state = STATE.PLAYING;
    startScreen.classList.add("hidden");
    gameoverScreen.classList.add("hidden");
    levelupScreen.classList.add("hidden");
    beep(660, 0.15, "triangle", 0.06);
  }

  function gameOver() {
    state = STATE.GAMEOVER;
    shake = 14;
    spawnParticles(leaderX, SQUAD_Y, "#ff4757", 40, 2);
    spawnShockwave(leaderX, SQUAD_Y, 200, "#ff4757");
    beep(120, 0.5, "sawtooth", 0.1);
    if (score > best) {
      best = score;
      localStorage.setItem("gs_best", String(best));
    }
    document.getElementById("final-score").textContent = score;
    document.getElementById("best-score-label").textContent =
      `ベストスコア: ${best} ／ 最大コンボ: ${maxCombo} ／ Lv.${level}`;
    setTimeout(() => gameoverScreen.classList.remove("hidden"), 600);
  }

  document.getElementById("start-btn").addEventListener("click", startGame);
  document.getElementById("retry-btn").addEventListener("click", startGame);

  // 開発用デバッグフック
  window.__dbg = () => ({
    state, squadCount, level, xp, xpNext, score, killCount, wave,
    bullets: bullets.length, enemies: enemies.length, gates: gates.length,
    sampleBullet: bullets[0] ? { ...bullets[0] } : null,
    sampleEnemy: enemies[0] ? { x: enemies[0].x, y: enemies[0].y, w: enemies[0].w, h: enemies[0].h, hp: enemies[0].hp } : null,
  });

  // ---- メインループ ----
  reset();
  updateGunnerPos();
  lastTime = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 1 / 20);
    lastTime = now;
    if (state === STATE.PLAYING) update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
