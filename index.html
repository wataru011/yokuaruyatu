<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZOMBIE SHOOTER - よくある広告のやつ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a12;
    overflow: hidden;
    touch-action: none;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #game-container {
    position: relative;
    width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
  }
  canvas {
    display: block;
    background: #12121e;
    box-shadow: 0 0 40px rgba(0,0,0,.8);
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(5,5,12,.82);
    color: #fff;
    text-align: center;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: clamp(28px, 7vw, 56px);
    letter-spacing: .1em;
    color: #ff4757;
    text-shadow: 0 0 24px rgba(255,71,87,.6);
    margin-bottom: 12px;
  }
  .overlay p { font-size: clamp(14px, 3.5vw, 20px); color: #ccc; margin: 6px 0; }
  .overlay .score-big { font-size: clamp(24px, 6vw, 44px); color: #ffd32a; margin: 10px 0; }
  .overlay button {
    margin-top: 24px;
    padding: 14px 48px;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: bold;
    color: #fff;
    background: linear-gradient(180deg, #ff6b81, #e8304a);
    border: none; border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 6px 0 #a3122a, 0 10px 20px rgba(0,0,0,.5);
    transition: transform .08s;
  }
  .overlay button:active { transform: translateY(4px); box-shadow: 0 2px 0 #a3122a; }
  .blink { animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: .3; } }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>

  <div id="start-screen" class="overlay">
    <h1>🧟 ZOMBIE SHOOTER</h1>
    <p>上から迫りくるゾンビを撃ちまくれ！</p>
    <p>操作：マウス / タッチ / ←→キー（射撃は自動）</p>
    <p>💊 を取るとパワーアップ</p>
    <button id="start-btn">▶ ゲームスタート</button>
  </div>

  <div id="gameover-screen" class="overlay hidden">
    <h1>GAME OVER</h1>
    <p>スコア</p>
    <div class="score-big" id="final-score">0</div>
    <p id="best-score-label"></p>
    <button id="retry-btn">🔄 もう一度</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // ---- 論理解像度（縦長・スマホ広告風） ----
  const W = 480, H = 800;

  function resize() {
    const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = `${W * scale}px`;
    canvas.style.height = `${H * scale}px`;
  }
  window.addEventListener("resize", resize);
  resize();

  // ---- 状態 ----
  const STATE = { TITLE: 0, PLAYING: 1, GAMEOVER: 2 };
  let state = STATE.TITLE;

  let player, bullets, enemies, particles, powerups, floatTexts;
  let score, wave, killCount, spawnTimer, waveTimer, shake, lastTime;
  let best = Number(localStorage.getItem("zs_best") || 0);

  function reset() {
    player = {
      x: W / 2, y: H - 80,
      w: 44, h: 52,
      speed: 420,
      fireRate: 0.16,   // 秒/発
      fireTimer: 0,
      spread: 1,        // 同時弾数
      powerTime: 0,     // パワーアップ残り秒
      targetX: W / 2,
    };
    bullets = []; enemies = []; particles = []; powerups = []; floatTexts = [];
    score = 0; wave = 1; killCount = 0;
    spawnTimer = 0.5; waveTimer = 0;
    shake = 0;
  }

  // ---- 入力 ----
  const keys = {};
  window.addEventListener("keydown", e => { keys[e.key] = true; });
  window.addEventListener("keyup",   e => { keys[e.key] = false; });

  let pointerActive = false;
  function pointerX(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    return cx / rect.width * W;
  }
  canvas.addEventListener("mousemove", e => { player && (player.targetX = pointerX(e)); pointerActive = true; });
  canvas.addEventListener("touchstart", e => { e.preventDefault(); player && (player.targetX = pointerX(e)); pointerActive = true; }, { passive: false });
  canvas.addEventListener("touchmove",  e => { e.preventDefault(); player && (player.targetX = pointerX(e)); pointerActive = true; }, { passive: false });

  // ---- サウンド（WebAudioでピコピコ） ----
  let audioCtx = null;
  function beep(freq, dur, type = "square", vol = 0.06) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    } catch (_) { /* 音が出なくてもゲームは続行 */ }
  }

  // ---- 敵 ----
  // type: normal(小ゾンビ) / fast(走るゾンビ) / tank(デカブツ)
  function spawnEnemy() {
    const r = Math.random();
    const difficulty = 1 + (wave - 1) * 0.15;
    let e;
    if (r < 0.12 + wave * 0.01 && wave >= 3) {
      e = { type: "tank", w: 76, h: 84, hp: 14 + wave * 3, speed: 26 + wave * 1.5, score: 500, color: "#8e44ad" };
    } else if (r < 0.35 && wave >= 2) {
      e = { type: "fast", w: 34, h: 42, hp: 2, speed: (95 + wave * 6), score: 150, color: "#e67e22" };
    } else {
      e = { type: "normal", w: 42, h: 50, hp: 3 + Math.floor(wave / 3), speed: (48 + wave * 4), color: "#2ecc71", score: 100 };
    }
    e.speed *= 0.9 + Math.random() * 0.25;
    e.maxHp = e.hp;
    e.x = 30 + Math.random() * (W - 60);
    e.y = -e.h;
    e.wobblePhase = Math.random() * Math.PI * 2;
    e.wobbleAmp = e.type === "tank" ? 6 : 16;
    e.hitFlash = 0;
    enemies.push(e);
  }

  function spawnParticles(x, y, color, n, power = 1) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = (40 + Math.random() * 160) * power;
      particles.push({
        x, y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40,
        life: 0.4 + Math.random() * 0.4,
        maxLife: 0.8,
        size: 2 + Math.random() * 4,
        color,
      });
    }
  }

  function addFloatText(x, y, text, color = "#ffd32a") {
    floatTexts.push({ x, y, text, color, life: 0.8 });
  }

  function killEnemy(e) {
    score += e.score;
    killCount++;
    spawnParticles(e.x, e.y, e.color, e.type === "tank" ? 30 : 14, e.type === "tank" ? 1.6 : 1);
    addFloatText(e.x, e.y, `+${e.score}`);
    shake = Math.min(shake + (e.type === "tank" ? 8 : 2), 12);
    beep(e.type === "tank" ? 90 : 160, 0.15, "sawtooth", 0.08);
    // パワーアップドロップ
    const chance = e.type === "tank" ? 0.7 : 0.06;
    if (Math.random() < chance) {
      const kind = Math.random() < 0.5 ? "spread" : "rapid";
      powerups.push({ x: e.x, y: e.y, kind, vy: 70, size: 16 });
    }
  }

  // ---- 更新 ----
  function update(dt) {
    // プレイヤー移動
    if (keys["ArrowLeft"] || keys["a"])  { player.targetX = player.x - player.speed * dt * 1.5; pointerActive = false; }
    if (keys["ArrowRight"] || keys["d"]) { player.targetX = player.x + player.speed * dt * 1.5; pointerActive = false; }
    const dx = player.targetX - player.x;
    const maxMove = player.speed * dt;
    player.x += Math.abs(dx) <= maxMove ? dx : Math.sign(dx) * maxMove;
    player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));

    // パワーアップ時間
    if (player.powerTime > 0) {
      player.powerTime -= dt;
      if (player.powerTime <= 0) { player.spread = 1; player.fireRate = 0.16; }
    }

    // 自動射撃
    player.fireTimer -= dt;
    if (player.fireTimer <= 0) {
      player.fireTimer = player.fireRate;
      const n = player.spread;
      for (let i = 0; i < n; i++) {
        const off = n === 1 ? 0 : (i - (n - 1) / 2) * 0.14;
        bullets.push({
          x: player.x, y: player.y - player.h / 2,
          vx: Math.sin(off) * 700, vy: -Math.cos(off) * 700,
          r: 4,
        });
      }
      beep(880, 0.04, "square", 0.02);
    }

    // 弾
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dt; b.y += b.vy * dt;
      if (b.y < -10 || b.x < -10 || b.x > W + 10) { bullets.splice(i, 1); continue; }
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (Math.abs(b.x - e.x) < e.w / 2 + b.r && Math.abs(b.y - e.y) < e.h / 2 + b.r) {
          e.hp--; e.hitFlash = 0.08;
          spawnParticles(b.x, b.y, "#fffa65", 3, 0.5);
          bullets.splice(i, 1);
          if (e.hp <= 0) { killEnemy(e); enemies.splice(j, 1); }
          break;
        }
      }
    }

    // 敵
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.y += e.speed * dt;
      e.wobblePhase += dt * (e.type === "fast" ? 9 : 5);
      e.x += Math.sin(e.wobblePhase) * e.wobbleAmp * dt;
      e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
      if (e.hitFlash > 0) e.hitFlash -= dt;
      // プレイヤーor画面下端に到達でゲームオーバー
      const hitPlayer = Math.abs(e.x - player.x) < (e.w + player.w) / 2 - 8 &&
                        Math.abs(e.y - player.y) < (e.h + player.h) / 2 - 8;
      if (hitPlayer || e.y - e.h / 2 > H) {
        gameOver();
        return;
      }
    }

    // パワーアップ
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.y += p.vy * dt;
      if (p.y > H + 20) { powerups.splice(i, 1); continue; }
      if (Math.abs(p.x - player.x) < 34 && Math.abs(p.y - player.y) < 44) {
        if (p.kind === "spread") {
          player.spread = Math.min(player.spread + 2, 5);
          addFloatText(player.x, player.y - 50, "3WAY!", "#48dbfb");
        } else {
          player.fireRate = 0.07;
          addFloatText(player.x, player.y - 50, "RAPID!", "#ff9ff3");
        }
        player.powerTime = 8;
        beep(1200, 0.2, "triangle", 0.08);
        powerups.splice(i, 1);
      }
    }

    // パーティクル・テキスト
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      const t = floatTexts[i];
      t.y -= 50 * dt; t.life -= dt;
      if (t.life <= 0) floatTexts.splice(i, 1);
    }

    // スポーン＆ウェーブ進行
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEnemy();
      const interval = Math.max(0.18, 1.1 - wave * 0.07);
      spawnTimer = interval * (0.7 + Math.random() * 0.6);
    }
    waveTimer += dt;
    if (waveTimer >= 15) {
      waveTimer = 0; wave++;
      addFloatText(W / 2, H / 2, `WAVE ${wave}`, "#ff6b81");
      beep(440, 0.3, "triangle", 0.06);
    }

    if (shake > 0) shake = Math.max(0, shake - dt * 30);
  }

  // ---- 描画 ----
  function drawZombie(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.hitFlash > 0) { ctx.filter = "brightness(2.5)"; }
    const w = e.w, h = e.h;
    // 体
    ctx.fillStyle = e.color;
    ctx.fillRect(-w * 0.35, -h * 0.1, w * 0.7, h * 0.5);
    // 頭
    ctx.fillStyle = e.type === "tank" ? "#a55eea" : "#55efc4";
    ctx.beginPath();
    ctx.arc(0, -h * 0.25, w * 0.28, 0, Math.PI * 2);
    ctx.fill();
    // 目（赤く光る）
    ctx.fillStyle = "#ff3838";
    const eye = w * 0.07;
    ctx.fillRect(-w * 0.15, -h * 0.3, eye, eye);
    ctx.fillRect(w * 0.08, -h * 0.3, eye, eye);
    // 腕（前ならえゾンビポーズ、ゆらゆら）
    ctx.strokeStyle = e.color;
    ctx.lineWidth = Math.max(4, w * 0.12);
    ctx.lineCap = "round";
    const armY = -h * 0.02 + Math.sin(e.wobblePhase * 2) * 3;
    ctx.beginPath();
    ctx.moveTo(-w * 0.3, 0); ctx.lineTo(-w * 0.55, armY);
    ctx.moveTo(w * 0.3, 0);  ctx.lineTo(w * 0.55, armY);
    ctx.stroke();
    // 足
    const step = Math.sin(e.wobblePhase * 3) * h * 0.08;
    ctx.beginPath();
    ctx.moveTo(-w * 0.15, h * 0.38); ctx.lineTo(-w * 0.15, h * 0.5 + step);
    ctx.moveTo(w * 0.15, h * 0.38);  ctx.lineTo(w * 0.15, h * 0.5 - step);
    ctx.stroke();
    ctx.filter = "none";
    // HPバー（ダメージを受けた敵のみ）
    if (e.hp < e.maxHp) {
      const bw = w * 0.9;
      ctx.fillStyle = "rgba(0,0,0,.5)";
      ctx.fillRect(-bw / 2, -h * 0.62, bw, 5);
      ctx.fillStyle = e.hp / e.maxHp > 0.4 ? "#2ed573" : "#ff4757";
      ctx.fillRect(-bw / 2, -h * 0.62, bw * (e.hp / e.maxHp), 5);
    }
    ctx.restore();
  }

  function drawPlayer() {
    const p = player;
    ctx.save();
    ctx.translate(p.x, p.y);
    // パワーアップ中はオーラ
    if (p.powerTime > 0) {
      ctx.fillStyle = `rgba(72,219,251,${0.15 + 0.1 * Math.sin(Date.now() / 100)})`;
      ctx.beginPath(); ctx.arc(0, 0, 42, 0, Math.PI * 2); ctx.fill();
    }
    // 体
    ctx.fillStyle = "#487eb0";
    ctx.fillRect(-p.w * 0.3, -p.h * 0.1, p.w * 0.6, p.h * 0.45);
    // 頭
    ctx.fillStyle = "#f5cd79";
    ctx.beginPath(); ctx.arc(0, -p.h * 0.25, p.w * 0.24, 0, Math.PI * 2); ctx.fill();
    // ヘルメット
    ctx.fillStyle = "#2f3640";
    ctx.beginPath(); ctx.arc(0, -p.h * 0.28, p.w * 0.26, Math.PI, 0); ctx.fill();
    // 銃
    ctx.fillStyle = "#2f3640";
    ctx.fillRect(-3, -p.h * 0.7, 6, p.h * 0.35);
    ctx.fillRect(-8, -p.h * 0.42, 16, 8);
    // マズルフラッシュ
    if (p.fireTimer > p.fireRate - 0.05) {
      ctx.fillStyle = "#fffa65";
      ctx.beginPath(); ctx.arc(0, -p.h * 0.75, 7 + Math.random() * 4, 0, Math.PI * 2); ctx.fill();
    }
    // 足
    ctx.strokeStyle = "#353b48";
    ctx.lineWidth = 6; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(-8, p.h * 0.35); ctx.lineTo(-8, p.h * 0.5);
    ctx.moveTo(8, p.h * 0.35);  ctx.lineTo(8, p.h * 0.5);
    ctx.stroke();
    ctx.restore();
  }

  function draw() {
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }
    // 背景
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "#1b1b2f");
    grad.addColorStop(1, "#22223a");
    ctx.fillStyle = grad;
    ctx.fillRect(-20, -20, W + 40, H + 40);
    // 地面ライン
    ctx.strokeStyle = "rgba(255,71,87,.35)";
    ctx.setLineDash([12, 8]);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, H - 30); ctx.lineTo(W, H - 30);
    ctx.stroke();
    ctx.setLineDash([]);

    // 弾
    ctx.fillStyle = "#fffa65";
    for (const b of bullets) {
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(b.x - 1.5, b.y, 3, 10);
    }

    // パワーアップ
    for (const p of powerups) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.sin(Date.now() / 200) * 0.3);
      ctx.font = "26px sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(p.kind === "spread" ? "🔱" : "💊", 0, 0);
      ctx.restore();
    }

    for (const e of enemies) drawZombie(e);
    if (state === STATE.PLAYING) drawPlayer();

    // パーティクル
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // フロートテキスト
    ctx.textAlign = "center";
    for (const t of floatTexts) {
      ctx.globalAlpha = Math.min(1, t.life * 2);
      ctx.font = "bold 22px sans-serif";
      ctx.fillStyle = t.color;
      ctx.fillText(t.text, t.x, t.y);
    }
    ctx.globalAlpha = 1;

    // HUD
    ctx.textAlign = "left";
    ctx.font = "bold 22px sans-serif";
    ctx.fillStyle = "#ffd32a";
    ctx.fillText(`SCORE ${score}`, 14, 32);
    ctx.textAlign = "right";
    ctx.fillStyle = "#ff6b81";
    ctx.fillText(`WAVE ${wave}`, W - 14, 32);
    ctx.textAlign = "left";
    ctx.font = "14px sans-serif";
    ctx.fillStyle = "#888";
    ctx.fillText(`💀 ${killCount}  BEST ${best}`, 14, 54);
    if (player && player.powerTime > 0) {
      ctx.fillStyle = "#48dbfb";
      ctx.fillText(`POWER UP ${player.powerTime.toFixed(1)}s`, 14, 74);
    }

    ctx.restore();
  }

  // ---- ゲームフロー ----
  const startScreen = document.getElementById("start-screen");
  const gameoverScreen = document.getElementById("gameover-screen");

  function startGame() {
    reset();
    state = STATE.PLAYING;
    startScreen.classList.add("hidden");
    gameoverScreen.classList.add("hidden");
    beep(660, 0.15, "triangle", 0.06);
  }

  function gameOver() {
    state = STATE.GAMEOVER;
    shake = 14;
    spawnParticles(player.x, player.y, "#ff4757", 40, 2);
    beep(120, 0.5, "sawtooth", 0.1);
    if (score > best) {
      best = score;
      localStorage.setItem("zs_best", String(best));
    }
    document.getElementById("final-score").textContent = score;
    document.getElementById("best-score-label").textContent = `ベストスコア: ${best}`;
    setTimeout(() => gameoverScreen.classList.remove("hidden"), 600);
  }

  document.getElementById("start-btn").addEventListener("click", startGame);
  document.getElementById("retry-btn").addEventListener("click", startGame);

  // ---- メインループ ----
  reset();
  lastTime = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 1 / 20);
    lastTime = now;
    if (state === STATE.PLAYING) update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
