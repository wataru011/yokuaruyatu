<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GATE INVADERS 3D - よくある広告のやつ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👾</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #05050c;
    overflow: hidden;
    touch-action: none;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #game-container { position: relative; width: 100%; height: 100%; }
  #game-container > canvas.webgl { position: absolute; inset: 0; }
  #hud {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 5;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(5,5,12,.82);
    color: #fff;
    text-align: center;
    z-index: 10;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: clamp(28px, 7vw, 56px);
    letter-spacing: .1em;
    color: #2eff7b;
    text-shadow: 0 0 24px rgba(46,255,123,.6);
    margin-bottom: 12px;
  }
  .overlay p { font-size: clamp(13px, 3.4vw, 19px); color: #ccc; margin: 5px 0; }
  .overlay .score-big { font-size: clamp(24px, 6vw, 44px); color: #ffd32a; margin: 10px 0; }
  .overlay button {
    margin-top: 24px;
    padding: 14px 48px;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: bold;
    color: #fff;
    background: linear-gradient(180deg, #2eff7b, #0fae4a);
    border: none; border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 6px 0 #087031, 0 10px 20px rgba(0,0,0,.5);
    transition: transform .08s;
  }
  .overlay button:active { transform: translateY(4px); box-shadow: 0 2px 0 #087031; }
  #gameover-screen h1 { color: #ff4757; text-shadow: 0 0 24px rgba(255,71,87,.6); }
  #gameover-screen button {
    background: linear-gradient(180deg, #ff6b81, #e8304a);
    box-shadow: 0 6px 0 #a3122a, 0 10px 20px rgba(0,0,0,.5);
  }
  #gameover-screen button:active { box-shadow: 0 2px 0 #a3122a; }

</style>
</head>
<body>
<div id="game-container">
  <canvas id="hud"></canvas>

  <div id="start-screen" class="overlay">
    <h1>👾 GATE INVADERS 3D</h1>
    <p>奥から迫りくるインベーダーの大群を撃ちまくれ！</p>
    <p>🚪 <b>×2 / ×3 / +10</b> のゲートをくぐると自軍が増殖（上限なし！）</p>
    <p>🔫 マイナスゲートは撃ちまくればプラスに変わる！</p>
    <p>📦 宝箱を撃って壊すとパワーアップ！</p>
    <p>⭐ レベルアップで自動パワーアップ！</p>
    <p>👑 5ウェーブごとに巨大UFOボスが出現！</p>
    <p>操作：マウス / タッチ / ←→キー（射撃は自動）</p>
    <button id="start-btn">▶ ゲームスタート</button>
  </div>

  <div id="gameover-screen" class="overlay hidden">
    <h1>GAME OVER</h1>
    <p>全滅…！スコア</p>
    <div class="score-big" id="final-score">0</div>
    <p id="best-score-label"></p>
    <button id="retry-btn">🔄 もう一度</button>
  </div>
</div>

<script src="lib/three.min.js"></script>
<script>
(() => {
  "use strict";

  // ============================================================
  // ゲーム論理座標系（2D版と同じ）：
  //   x: 0..480（横）  y: 0..800（奥行き。0=最奥、800=手前）
  // 3Dワールドへは (x-240, 高さ, y-800) で変換する
  // ============================================================
  const W = 480, H = 800;
  const SQUAD_Y = H - 150;
  const FIRE_STREAMS = 22;
  const DRAW_SQUAD = 90;
  const MAX_BULLETS = 320;
  const MAX_ENEMIES = 130;
  const MAX_TEXTS = 36;

  const container = document.getElementById("game-container");
  const hud = document.getElementById("hud");
  const hctx = hud.getContext("2d");

  // ---------- three.js セットアップ ----------
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.domElement.classList.add("webgl");
  container.insertBefore(renderer.domElement, container.firstChild);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05050f);
  scene.fog = new THREE.Fog(0x05050f, 700, 1600);

  const camera = new THREE.PerspectiveCamera(58, 1, 1, 4000);

  scene.add(new THREE.AmbientLight(0x9099cc, 1.0));
  const sun = new THREE.DirectionalLight(0xffffff, 1.1);
  sun.position.set(220, 500, 180);
  scene.add(sun);

  // 地面＋グリッド
  {
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(1400, 2600),
      new THREE.MeshLambertMaterial({ color: 0x0d0d20 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.set(0, -1, -700);
    scene.add(ground);
    const grid = new THREE.GridHelper(2600, 52, 0x1c2b4a, 0x141d33);
    grid.position.set(0, 0, -500);
    scene.add(grid);
    // フィールド端のライン
    const edgeMat = new THREE.MeshBasicMaterial({ color: 0x552233 });
    for (const sx of [-244, 244]) {
      const edge = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 1800), edgeMat);
      edge.position.set(sx, 1, -500);
      scene.add(edge);
    }
    // 手前のデッドライン
    const dead = new THREE.Mesh(new THREE.BoxGeometry(488, 2, 5), new THREE.MeshBasicMaterial({ color: 0xff4757 }));
    dead.position.set(0, 1, 30);
    scene.add(dead);
  }

  // 星空
  {
    const n = 350, pos = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
      pos[i * 3] = (Math.random() - 0.5) * 2600;
      pos[i * 3 + 1] = 80 + Math.random() * 900;
      pos[i * 3 + 2] = -1900 + Math.random() * 2200;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0x8888aa, size: 3, sizeAttenuation: true })));
  }

  // ---------- ジオメトリ合成ヘルパー ----------
  function placed(geo, x, y, z, sx = 1, sy = 1, sz = 1) {
    const g = geo.clone();
    g.scale(sx, sy, sz);
    g.translate(x, y, z);
    return g;
  }
  function mergeGeos(list) {
    const parts = list.map(g => g.toNonIndexed());
    let total = 0;
    for (const g of parts) total += g.attributes.position.count;
    const pos = new Float32Array(total * 3);
    const nor = new Float32Array(total * 3);
    let off = 0;
    for (const g of parts) {
      pos.set(g.attributes.position.array, off * 3);
      nor.set(g.attributes.normal.array, off * 3);
      off += g.attributes.position.count;
    }
    const out = new THREE.BufferGeometry();
    out.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    out.setAttribute("normal", new THREE.BufferAttribute(nor, 3));
    return out;
  }
  const BOX = new THREE.BoxGeometry(1, 1, 1);

  // ---------- ローポリキャラ（箱組み） ----------
  // カニ型（雑魚）
  const crabGeo = mergeGeos([
    placed(BOX, 0, 20, 0, 40, 16, 24),      // 胴体
    placed(BOX, 0, 33, 0, 24, 12, 18),      // 頭
    placed(BOX, -25, 22, 0, 10, 6, 14),     // 左腕
    placed(BOX, 25, 22, 0, 10, 6, 14),      // 右腕
    placed(BOX, -12, 6, 4, 6, 12, 6),       // 脚
    placed(BOX, 12, 6, 4, 6, 12, 6),
    placed(BOX, -12, 6, -8, 6, 12, 6),
    placed(BOX, 12, 6, -8, 6, 12, 6),
  ]);
  // イカ型（高速）
  const squidGeo = mergeGeos([
    placed(BOX, 0, 26, 0, 20, 24, 18),
    placed(BOX, 0, 42, 0, 12, 10, 12),
    placed(BOX, -8, 8, 0, 5, 14, 5),
    placed(BOX, 0, 8, 6, 5, 14, 5),
    placed(BOX, 8, 8, 0, 5, 14, 5),
  ]);
  // タコ型（タンク）
  const octoGeo = mergeGeos([
    placed(BOX, 0, 30, 0, 66, 34, 42),
    placed(BOX, 0, 56, 0, 40, 18, 28),
    placed(BOX, -28, 10, 12, 10, 20, 10),
    placed(BOX, 28, 10, 12, 10, 20, 10),
    placed(BOX, -28, 10, -12, 10, 20, 10),
    placed(BOX, 28, 10, -12, 10, 20, 10),
  ]);
  // 兵士（砲台）
  const soldierGeo = mergeGeos([
    placed(BOX, 0, 12, 0, 14, 14, 10),      // 胴体
    placed(BOX, 0, 24, 0, 9, 8, 9),         // 頭
    placed(BOX, 0, 20, -10, 3.4, 3.4, 16),  // 銃身（奥向き）
    placed(BOX, -5, 4, 0, 4, 8, 5),         // 脚
    placed(BOX, 5, 4, 0, 4, 8, 5),
  ]);
  // ボスUFO
  const bossBodyGeo = mergeGeos([
    placed(new THREE.CylinderGeometry(1, 1, 1, 20), 0, 16, 0, 110, 26, 110),
    placed(new THREE.SphereGeometry(1, 18, 12), 0, 30, 0, 56, 36, 56),
    placed(new THREE.CylinderGeometry(1, 1, 1, 10), 0, 4, 0, 44, 14, 44),
  ]);
  const crownGeo = mergeGeos([
    placed(BOX, -22, 0, 0, 10, 22, 10),
    placed(BOX, 0, 4, 0, 10, 30, 10),
    placed(BOX, 22, 0, 0, 10, 22, 10),
    placed(BOX, 0, -10, 0, 56, 8, 12),
  ]);

  // ---------- インスタンス化メッシュ ----------
  const dummy = new THREE.Object3D();
  const WHITE = new THREE.Color(0xffffff);
  const tmpColor = new THREE.Color();

  function makeInstanced(geo, colorHex, capacity, emissive = 0x000000) {
    const mat = new THREE.MeshLambertMaterial({ color: 0xffffff, emissive });
    const m = new THREE.InstancedMesh(geo, mat, capacity);
    m.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    m.count = 0;
    m.userData.baseColor = new THREE.Color(colorHex);
    m.userData.cap = capacity;
    // 先に全スロットへ色を書いておく（初回コンパイル時にインスタンスカラーを有効化するため）
    for (let i = 0; i < capacity; i++) m.setColorAt(i, m.userData.baseColor);
    m.instanceColor.needsUpdate = true;
    scene.add(m);
    return m;
  }
  const crabMesh = makeInstanced(crabGeo, 0x2eff7b, 140, 0x0a3318);
  const squidMesh = makeInstanced(squidGeo, 0xff9f43, 140, 0x33200a);
  const octoMesh = makeInstanced(octoGeo, 0xc56cf0, 60, 0x2a1233);
  const ENEMY_MESH = { crab: crabMesh, squid: squidMesh, octo: octoMesh };
  const soldierMesh = makeInstanced(soldierGeo, 0x2eff7b, DRAW_SQUAD, 0x0a2210);
  const TIER_COLORS = [0x2eff7b, 0x48dbfb, 0xffd32a];

  const bulletMesh = new THREE.InstancedMesh(
    new THREE.BoxGeometry(4.5, 4.5, 16),
    new THREE.MeshBasicMaterial({ color: 0xaaffcc }),
    MAX_BULLETS
  );
  bulletMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  bulletMesh.count = 0;
  scene.add(bulletMesh);

  // ボス
  const bossGroup = new THREE.Group();
  const bossBody = new THREE.Mesh(bossBodyGeo, new THREE.MeshLambertMaterial({ color: 0xc56cf0, emissive: 0x30104a }));
  const bossCrown = new THREE.Mesh(crownGeo, new THREE.MeshLambertMaterial({ color: 0xf9ca24, emissive: 0x332200 }));
  bossCrown.position.y = 74;
  bossGroup.add(bossBody, bossCrown);
  bossGroup.visible = false;
  scene.add(bossGroup);

  // 宝箱プール
  const cratePool = [];
  for (let i = 0; i < 4; i++) {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(36, 30, 30), new THREE.MeshLambertMaterial({ color: 0xb3742f }));
    body.position.y = 15;
    const band = new THREE.Mesh(new THREE.BoxGeometry(38, 10, 32), new THREE.MeshLambertMaterial({ color: 0xf9ca24, emissive: 0x332200 }));
    band.position.y = 15;
    g.add(body, band);
    g.visible = false;
    scene.add(g);
    cratePool.push(g);
  }

  // ミサイルプール
  const missilePool = [];
  for (let i = 0; i < 14; i++) {
    const m = new THREE.Mesh(new THREE.ConeGeometry(4, 16, 6), new THREE.MeshBasicMaterial({ color: 0xffbe76 }));
    m.visible = false;
    scene.add(m);
    missilePool.push(m);
  }

  // 衝撃波プール（地面のリング）
  const wavePool = [];
  for (let i = 0; i < 10; i++) {
    const m = new THREE.Mesh(
      new THREE.RingGeometry(0.86, 1, 40),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, side: THREE.DoubleSide, depthWrite: false })
    );
    m.rotation.x = -Math.PI / 2;
    m.visible = false;
    scene.add(m);
    wavePool.push(m);
  }

  // パーティクル（Points）
  const P_MAX = 600;
  const pPos = new Float32Array(P_MAX * 3);
  const pCol = new Float32Array(P_MAX * 3);
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute("position", new THREE.BufferAttribute(pPos, 3));
  pGeo.setAttribute("color", new THREE.BufferAttribute(pCol, 3));
  const pPoints = new THREE.Points(pGeo, new THREE.PointsMaterial({
    size: 7, vertexColors: true, transparent: true, opacity: 0.95,
    sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  pPoints.frustumCulled = false;
  scene.add(pPoints);

  // ゲート（2スロット再利用）
  function makeLabelTexture() {
    const c = document.createElement("canvas");
    c.width = 256; c.height = 96;
    return { canvas: c, tex: new THREE.CanvasTexture(c) };
  }
  const gateSlots = [];
  for (let i = 0; i < 2; i++) {
    const grp = new THREE.Group();
    const gw = W / 2 - 14;
    const panelMat = new THREE.MeshBasicMaterial({ color: 0x2e86de, transparent: true, opacity: 0.3, side: THREE.DoubleSide, depthWrite: false });
    const panel = new THREE.Mesh(new THREE.PlaneGeometry(gw, 56), panelMat);
    panel.position.y = 34;
    const pillarMat = new THREE.MeshBasicMaterial({ color: 0x48dbfb });
    const p1 = new THREE.Mesh(new THREE.BoxGeometry(7, 74, 7), pillarMat);
    p1.position.set(-gw / 2, 37, 0);
    const p2 = p1.clone();
    p2.position.x = gw / 2;
    const label = makeLabelTexture();
    const labelMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(120, 45),
      new THREE.MeshBasicMaterial({ map: label.tex, transparent: true, depthWrite: false, side: THREE.DoubleSide })
    );
    labelMesh.position.set(0, 36, 2);
    grp.add(panel, p1, p2, labelMesh);
    grp.visible = false;
    scene.add(grp);
    gateSlots.push({ grp, panelMat, pillarMat, label, lastText: "" });
  }

  // ---------- 座標変換 ----------
  function toWorld(x, y, h = 0, out) {
    out = out || new THREE.Vector3();
    out.set(x - W / 2, h, y - H);
    return out;
  }
  const _v = new THREE.Vector3();
  function toScreen(x, y, h) {
    toWorld(x, y, h, _v).project(camera);
    return {
      sx: (_v.x * 0.5 + 0.5) * hud.width / DPR,
      sy: (-_v.y * 0.5 + 0.5) * hud.height / DPR,
      behind: _v.z > 1,
    };
  }

  // ---------- リサイズ ----------
  let DPR = 1;
  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    hud.width = w * DPR; hud.height = h * DPR;
    hud.style.width = w + "px"; hud.style.height = h + "px";
    hctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  // ============================================================
  // ゲーム状態（ロジックは2D版から移植）
  // ============================================================
  const STATE = { TITLE: 0, PLAYING: 1, GAMEOVER: 3 };
  let state = STATE.TITLE;

  let leaderX, targetX, squadCount, bulletDmg, fireRate, spreadTime, rapidTime;
  let shotWays, pierce, critChance, missileCount, bulletSpeed, fireRateMul;
  let level, xp, xpNext;
  let bullets, missiles, enemies, gates, crates, particles, floatTexts, shockwaves;
  let gunnerPos = [];
  let score, wave, killCount, combo, comboTimer, maxCombo;
  let fireAcc, fireIdx, missileTimer;
  let spawnTimer, hordeTimer, gateTimer, crateTimer, waveTimer, shake, flash, lastTime, elapsed;
  let boss, bossMinionTimer;
  let best = Number(localStorage.getItem("gs_best") || 0);
  const DEBUG_WAVE = Number(new URLSearchParams(location.search).get("wave")) || 0;

  const OFFSETS = [{ x: 0, y: 0 }];
  function ensureOffsets(n) {
    while (OFFSETS.length < n) {
      const idx = OFFSETS.length;
      const width = Math.min(4 + Math.floor(idx / 8), 14);
      const rowIdx = Math.floor((idx - 1) / width) + 1;
      const posInRow = (idx - 1) % width;
      const jx = Math.sin(idx * 999) * 5;
      const jy = Math.sin(idx * 777) * 4;
      OFFSETS.push({
        x: (posInRow - (width - 1) / 2) * 24 + jx,
        y: rowIdx * 25 + jy,
      });
    }
  }

  function reset() {
    leaderX = W / 2; targetX = W / 2;
    squadCount = 5;
    bulletDmg = 1;
    fireRate = 0.32; fireRateMul = 1;
    spreadTime = 0; rapidTime = 0;
    shotWays = 1; pierce = 0; critChance = 0; missileCount = 0; bulletSpeed = 760;
    level = 1; xp = 0; xpNext = 10;
    bullets = []; missiles = []; enemies = []; gates = []; crates = [];
    particles = []; floatTexts = []; shockwaves = [];
    score = 0; wave = DEBUG_WAVE || 1; killCount = 0;
    combo = 0; comboTimer = 0; maxCombo = 0;
    fireAcc = 0; fireIdx = 0; missileTimer = 3;
    spawnTimer = 1.5; hordeTimer = 10; gateTimer = 3.5; crateTimer = 5; waveTimer = 0;
    shake = 0; flash = 0; elapsed = 0;
    boss = null; bossMinionTimer = 0;
  }

  // ---- 入力（レイキャストで地面上のxを取得）----
  const keys = {};
  window.addEventListener("keydown", e => { keys[e.key] = true; });
  window.addEventListener("keyup", e => { keys[e.key] = false; });

  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();
  function pointerToGameX(clientX, clientY) {
    const rect = renderer.domElement.getBoundingClientRect();
    ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(ndc, camera);
    const o = raycaster.ray.origin, d = raycaster.ray.direction;
    if (Math.abs(d.y) < 1e-6) return null;
    const t = -o.y / d.y;
    if (t < 0) return null;
    return o.x + d.x * t + W / 2;
  }
  function onPointer(e) {
    const p = e.touches ? e.touches[0] : e;
    const gx = pointerToGameX(p.clientX, p.clientY);
    if (gx !== null) targetX = gx;
  }
  renderer.domElement.addEventListener("mousemove", onPointer);
  renderer.domElement.addEventListener("touchstart", e => { e.preventDefault(); onPointer(e); }, { passive: false });
  renderer.domElement.addEventListener("touchmove",  e => { e.preventDefault(); onPointer(e); }, { passive: false });

  // ---- サウンド ----
  let audioCtx = null;
  function beep(freq, dur, type = "square", vol = 0.06) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    } catch (_) { /* 音が出なくてもゲームは続行 */ }
  }
  function fanfare() {
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.18, "triangle", 0.08), i * 90));
  }

  // ---- レベルアップ強化 ----
  const UPGRADES = [
    { id: "troops",  icon: "👥", name: "兵士募集",       desc: "仲間が8人増える",             can: () => true,             apply: () => { squadCount += 8; } },
    { id: "dmg",     icon: "💥", name: "ダメージUP",     desc: "弾のダメージ +1",             can: () => true,             apply: () => { bulletDmg++; } },
    { id: "rate",    icon: "⚡", name: "連射UP",         desc: "発射速度 +20%",               can: () => fireRateMul < 3,  apply: () => { fireRateMul *= 1.2; } },
    { id: "multi",   icon: "🔱", name: "マルチショット", desc: "同時発射 +1WAY（永続）",      can: () => shotWays < 5,     apply: () => { shotWays++; } },
    { id: "pierce",  icon: "🎯", name: "貫通弾",         desc: "弾が敵を +1体 貫通する",      can: () => pierce < 4,       apply: () => { pierce++; } },
    { id: "crit",    icon: "✨", name: "クリティカル",   desc: "+15%の確率で 3倍ダメージ",    can: () => critChance < 0.6, apply: () => { critChance += 0.15; } },
    { id: "missile", icon: "🚀", name: "ホーミング弾",   desc: "3秒ごとに追尾ミサイル +1発",  can: () => missileCount < 6, apply: () => { missileCount++; } },
    { id: "speed",   icon: "💨", name: "高速弾",         desc: "弾速 +25%",                   can: () => bulletSpeed < 1600, apply: () => { bulletSpeed *= 1.25; } },
  ];

  // レベルアップは自動付与（ポーズなし・テンポ重視）
  let banner = null;   // {title, sub, life, maxLife}
  function gainXP(n) {
    xp += n;
    while (xp >= xpNext && state === STATE.PLAYING) autoLevelUp();
  }
  function autoLevelUp() {
    const pool = UPGRADES.filter(u => u.can());
    const u = pool[Math.floor(Math.random() * pool.length)] || UPGRADES[0];
    u.apply();
    xp -= xpNext;
    level++;
    xpNext = 10 + (level - 1) * 8;
    banner = { title: `⭐ LEVEL UP! Lv.${level}`, sub: `${u.icon} ${u.name} — ${u.desc}`, life: 2.2, maxLife: 2.2 };
    spawnShockwave(leaderX, SQUAD_Y, 130, 0xffd32a);
    spawnParticles(leaderX, SQUAD_Y, "#ffd32a", 24, 1.4, 20);
    fanfare();
  }
  function playerTier() {
    return level >= 8 ? 2 : level >= 4 ? 1 : 0;
  }

  // ---- 敵 ----
  function spawnEnemy(x, y) {
    if (enemies.length >= MAX_ENEMIES) return;
    const r = Math.random();
    let e;
    if (r < 0.06 + wave * 0.008 && wave >= 3) {
      e = { type: "tank", spr: "octo", w: 70, h: 46, hp: 20 + wave * 6, speed: 26 + wave * 1.5, score: 500, cost: 10, xp: 8, color: "#c56cf0" };
    } else if (r < 0.35 && wave >= 2) {
      e = { type: "fast", spr: "squid", w: 26, h: 22, hp: 1 + Math.floor(wave * 0.5), speed: 100 + wave * 6, score: 150, cost: 1, xp: 2, color: "#ff9f43" };
    } else {
      e = { type: "normal", spr: "crab", w: 44, h: 28, hp: 2 + wave, speed: 50 + wave * 4, score: 100, cost: 2, xp: 2, color: "#2eff7b" };
    }
    e.speed *= 0.9 + Math.random() * 0.25;
    e.maxHp = e.hp;
    e.x = x !== undefined ? x : 30 + Math.random() * (W - 60);
    e.y = y !== undefined ? y : -40;
    e.wobblePhase = Math.random() * Math.PI * 2;
    e.wobbleAmp = e.type === "tank" ? 6 : 16;
    e.hitFlash = 0;
    enemies.push(e);
  }
  function spawnHorde() {
    const n = Math.min(4 + wave * 2, 26);
    const cx = 80 + Math.random() * (W - 160);
    for (let i = 0; i < n; i++) {
      spawnEnemy(
        Math.max(20, Math.min(W - 20, cx + (Math.random() - 0.5) * 200)),
        -50 - Math.random() * 220
      );
    }
    addFloatText(W / 2, 250, "⚠ 大群接近！", "#ff6b81", 26);
    beep(220, 0.25, "sawtooth", 0.07);
  }

  // ---- ボス ----
  function spawnBoss() {
    const hp = 250 + wave * 50;
    boss = {
      x: W / 2, y: -140, targetY: 235,
      w: 210, h: 130,
      hp, maxHp: hp,
      wobble: 0, hitFlash: 0,
    };
    bossMinionTimer = 2;
    addFloatText(W / 2, 300, "👑 ボス出現！！", "#e056fd", 30);
    spawnShockwave(W / 2, 300, 220, 0xe056fd);
    shake = Math.min(shake + 10, 16);
    beep(70, 0.6, "sawtooth", 0.12);
  }
  function killBoss() {
    const bonus = 1000 + wave * 200;
    score += bonus; killCount++;
    const bx = boss.x, by = boss.y;
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        if (state !== STATE.PLAYING) return;
        spawnShockwave(bx, by, 170 + i * 90, i % 2 ? 0xffd32a : 0xe056fd);
      }, i * 120);
    }
    spawnShockwave(bx, by, 300, 0xffffff);
    spawnParticles(bx, by, "#e056fd", 60, 2.4, 90);
    spawnParticles(bx, by, "#ffd32a", 45, 1.8, 90);
    spawnParticles(bx, by, "#ffffff", 30, 3, 90);
    addFloatText(bx, by, `👑 BOSS撃破！ +${bonus}`, "#e056fd", 30);
    squadCount += 8;
    addFloatText(leaderX, SQUAD_Y - 60, "+8人！", "#48dbfb", 24);
    gainXP(40);
    flash = 0.5; shake = 20;
    beep(1300, 0.4, "triangle", 0.1);
    setTimeout(() => beep(1600, 0.4, "triangle", 0.08), 120);
    boss = null;
  }

  // ---- ゲート ----
  function gateSpec(kind, value) { return { kind, value, hits: 0 }; }
  function randomGoodGate(strong) {
    const r = Math.random();
    if (strong && r < 0.25) return gateSpec("mult", 3);
    if (r < 0.45) return gateSpec("mult", 2);
    if (r < 0.85) return gateSpec("plus", 5 + Math.floor(Math.random() * 10));
    return gateSpec("dmg", 1);
  }
  function randomBadGate() {
    return Math.random() < 0.5
      ? gateSpec("plus", -(10 + Math.floor(Math.random() * 20)))
      : gateSpec("div2", 2);
  }
  let gatePairSeq = 0;
  function spawnGatePair() {
    const pairId = ++gatePairSeq;
    let a, b;
    if (Math.random() < 0.7) { a = randomGoodGate(false); b = randomBadGate(); }
    else { a = randomGoodGate(true); b = randomGoodGate(false); }
    if (Math.random() < 0.5) [a, b] = [b, a];
    const h = 62, speed = 135 + wave * 3;
    const gw = W / 2 - 14;
    gates.push({ ...a, pairId, x: 8,         w: gw, y: -h, h, vy: speed });
    gates.push({ ...b, pairId, x: W / 2 + 6, w: gw, y: -h, h, vy: speed });
  }
  function gateIsGood(g) {
    if (g.kind === "div2") return false;
    if (g.kind === "plus") return g.value > 0;
    return true;
  }
  function gateLabel(g) {
    if (g.kind === "mult") return `×${g.value}`;
    if (g.kind === "plus") return g.value > 0 ? `+${g.value}` : `${g.value}`;
    if (g.kind === "div2") return "÷2";
    return "DMG+1";
  }
  function upgradeGate(g) {
    g.hits++;
    if (g.kind === "plus") {
      const step = g.value < 0 ? 2 : 4;
      if (g.hits % step === 0) {
        g.value++;
        if (g.hits % (step * 3) === 0) beep(700 + g.value * 10, 0.05, "triangle", 0.04);
      }
    } else if (g.kind === "mult" && g.value === 2 && g.hits >= 30) {
      g.value = 3; g.hits = 0;
      addFloatText(g.x + g.w / 2, g.y + g.h, "×3にパワーアップ！", "#48dbfb", 20);
      beep(1000, 0.2, "triangle", 0.08);
    } else if (g.kind === "div2" && g.hits >= 26) {
      g.kind = "plus"; g.value = 3; g.hits = 0;
      addFloatText(g.x + g.w / 2, g.y + g.h, "プラスに変化！", "#48dbfb", 20);
      beep(1000, 0.2, "triangle", 0.08);
    }
  }
  function applyGate(g) {
    if (g.kind === "mult") {
      const before = squadCount;
      squadCount = squadCount * g.value;
      addFloatText(leaderX, SQUAD_Y - 60, `×${g.value}！ ${before}→${squadCount}人`, "#48dbfb", 26);
      spawnShockwave(leaderX, SQUAD_Y, 150, 0x48dbfb);
      beep(880, 0.25, "triangle", 0.09);
    } else if (g.kind === "plus") {
      squadCount = Math.max(1, squadCount + g.value);
      const good = g.value > 0;
      addFloatText(leaderX, SQUAD_Y - 60, `${good ? "+" : ""}${g.value}人！`, good ? "#48dbfb" : "#ff4757", 26);
      if (good) spawnShockwave(leaderX, SQUAD_Y, 110, 0x48dbfb);
      beep(good ? 880 : 150, 0.25, good ? "triangle" : "sawtooth", 0.09);
      if (!good) shake = Math.min(shake + 8, 14);
    } else if (g.kind === "div2") {
      squadCount = Math.max(1, Math.ceil(squadCount / 2));
      addFloatText(leaderX, SQUAD_Y - 60, `÷2… ${squadCount}人に…`, "#ff4757", 26);
      beep(150, 0.3, "sawtooth", 0.09);
      shake = Math.min(shake + 8, 14);
    } else if (g.kind === "dmg") {
      bulletDmg++;
      addFloatText(leaderX, SQUAD_Y - 60, `武器強化！ DMG ${bulletDmg}`, "#ff9ff3", 26);
      spawnShockwave(leaderX, SQUAD_Y, 110, 0xff9ff3);
      beep(1200, 0.25, "triangle", 0.09);
    }
  }

  // ---- 宝箱 ----
  function spawnCrate() {
    crates.push({
      x: 50 + Math.random() * (W - 100),
      y: -40,
      vy: 55 + Math.random() * 25,
      hp: 8 + wave, maxHp: 8 + wave,
      size: 40,
      hitFlash: 0,
      phase: Math.random() * Math.PI * 2,
    });
  }
  function openCrate(c) {
    spawnParticles(c.x, c.y, "#f0932b", 24, 1.2, 20);
    spawnShockwave(c.x, c.y, 100, 0xf9ca24);
    shake = Math.min(shake + 5, 12);
    gainXP(4);
    const r = Math.random();
    if (r < 0.3) {
      const n = 4 + Math.floor(Math.random() * 8);
      squadCount += n;
      addFloatText(c.x, c.y, `+${n}人！`, "#48dbfb", 24);
    } else if (r < 0.45) {
      bulletDmg++;
      addFloatText(c.x, c.y, `武器強化！ DMG ${bulletDmg}`, "#ff9ff3", 24);
    } else if (r < 0.65) {
      rapidTime = 10;
      addFloatText(c.x, c.y, "RAPID FIRE！", "#ff9ff3", 24);
    } else if (r < 0.85) {
      spreadTime = 10;
      addFloatText(c.x, c.y, "3WAYショット！", "#ffd32a", 24);
    } else {
      flash = 0.4; shake = 16;
      addFloatText(c.x, c.y, "💣 ボム！！", "#ff6b81", 30);
      spawnShockwave(c.x, c.y, 320, 0xffffff);
      for (const e of enemies) {
        score += e.score; killCount++;
        gainXP(e.xp);
        spawnParticles(e.x, e.y, e.color, 8, 1.2, 20);
      }
      enemies.length = 0;
      beep(60, 0.6, "sawtooth", 0.12);
      return;
    }
    beep(1100, 0.2, "triangle", 0.09);
  }

  // ---- エフェクト ----
  function spawnParticles(x, y, cssColor, n, power = 1, baseH = 20) {
    if (particles.length > P_MAX - 20) return;
    const col = new THREE.Color(cssColor);
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = (40 + Math.random() * 160) * power;
      particles.push({
        x, y, h: baseH + Math.random() * 14,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        vh: 60 + Math.random() * 120 * power,
        life: 0.4 + Math.random() * 0.4,
        r: col.r, g: col.g, b: col.b,
      });
    }
  }
  function spawnShockwave(x, y, maxR, colorHex) {
    shockwaves.push({ x, y, r: 8, maxR, life: 0.45, maxLife: 0.45, color: colorHex });
  }
  function addFloatText(x, y, text, color = "#ffd32a", size = 22) {
    if (floatTexts.length >= MAX_TEXTS) floatTexts.shift();
    floatTexts.push({ x, y, h: 40, text, color, size, life: 1.0 });
  }
  function comboMul() { return 1 + Math.min(combo, 50) * 0.02; }

  function killEnemy(e, giveScore = true) {
    if (giveScore) {
      combo++; comboTimer = 2;
      if (combo > maxCombo) maxCombo = combo;
      const pts = Math.round(e.score * comboMul());
      score += pts; killCount++;
      gainXP(e.xp);
      addFloatText(e.x, e.y, `+${pts}`);
      if (combo >= 10 && combo % 10 === 0) {
        addFloatText(W / 2, 300, `🔥 ${combo} COMBO！`, "#ff9f43", 30);
        spawnShockwave(e.x, e.y, 110, 0xff9f43);
        beep(600 + combo * 8, 0.15, "triangle", 0.07);
      }
    }
    spawnParticles(e.x, e.y, e.color, e.type === "tank" ? 26 : 10, e.type === "tank" ? 1.6 : 1, 24);
    if (e.type === "tank") spawnShockwave(e.x, e.y, 120, 0xc56cf0);
    shake = Math.min(shake + (e.type === "tank" ? 8 : 1.5), 12);
    beep(e.type === "tank" ? 90 : 160, 0.12, "sawtooth", 0.06);
  }
  function loseSoldiers(n, x, y) {
    squadCount -= n;
    combo = 0;
    addFloatText(x, y, `-${n}人`, "#ff4757", 24);
    spawnParticles(x, y, "#ff4757", 12, 1.2, 16);
    shake = Math.min(shake + 6, 14);
    beep(110, 0.2, "sawtooth", 0.09);
    if (squadCount <= 0) { squadCount = 0; gameOver(); }
  }

  function updateGunnerPos() {
    const n = Math.min(squadCount, DRAW_SQUAD);
    ensureOffsets(n);
    gunnerPos.length = 0;
    for (let i = 0; i < n; i++) {
      const o = OFFSETS[i];
      gunnerPos.push({
        x: Math.max(14, Math.min(W - 14, leaderX + o.x)),
        y: SQUAD_Y + o.y,
      });
    }
  }

  // ---- ミサイル ----
  function fireMissiles() {
    for (let i = 0; i < missileCount && missiles.length < 14; i++) {
      const a = -Math.PI / 2 + (Math.random() - 0.5) * 1.6;
      missiles.push({
        x: leaderX + (Math.random() - 0.5) * 60,
        y: SQUAD_Y - 10,
        vx: Math.cos(a) * 250, vy: Math.sin(a) * 250,
        life: 4,
        dmg: bulletDmg * 4,
      });
    }
    if (missileCount) beep(500, 0.1, "sawtooth", 0.04);
  }
  function nearestTarget(x, y) {
    let bestT = null, bestD = Infinity;
    for (const e of enemies) {
      const d = (e.x - x) ** 2 + (e.y - y) ** 2;
      if (d < bestD) { bestD = d; bestT = e; }
    }
    if (boss) {
      const d = (boss.x - x) ** 2 + (boss.y - y) ** 2;
      if (d < bestD) bestT = boss;
    }
    return bestT;
  }
  function explodeMissile(m) {
    spawnParticles(m.x, m.y, "#ff9f43", 16, 1.4, 24);
    spawnShockwave(m.x, m.y, 90, 0xff9f43);
    shake = Math.min(shake + 3, 12);
    beep(120, 0.15, "sawtooth", 0.07);
    const R = 70;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if ((e.x - m.x) ** 2 + (e.y - m.y) ** 2 < R * R) {
        e.hp -= m.dmg; e.hitFlash = 0.08;
        if (e.hp <= 0) { killEnemy(e); enemies.splice(j, 1); }
      }
    }
    if (boss && (boss.x - m.x) ** 2 + (boss.y - m.y) ** 2 < (R + 80) ** 2) {
      boss.hp -= m.dmg; boss.hitFlash = 0.06;
      if (boss.hp <= 0) killBoss();
    }
  }

  // ---- 更新（ロジックは2D版と同一） ----
  function update(dt) {
    elapsed += dt;

    const speed = 430;
    if (keys["ArrowLeft"] || keys["a"])  targetX = leaderX - speed * dt * 1.6;
    if (keys["ArrowRight"] || keys["d"]) targetX = leaderX + speed * dt * 1.6;
    const dx = targetX - leaderX;
    const maxMove = speed * dt;
    leaderX += Math.abs(dx) <= maxMove ? dx : Math.sign(dx) * maxMove;
    leaderX = Math.max(30, Math.min(W - 30, leaderX));
    updateGunnerPos();

    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }
    if (rapidTime > 0) rapidTime -= dt;
    if (spreadTime > 0) spreadTime -= dt;
    const curRate = (rapidTime > 0 ? 0.22 : fireRate) / fireRateMul;

    const streams = Math.min(squadCount, FIRE_STREAMS);
    const dmgScale = squadCount > FIRE_STREAMS ? squadCount / FIRE_STREAMS : 1;
    fireAcc += dt * streams / curRate;
    let fired = 0;
    while (fireAcc >= 1 && fired < 12) {
      fireAcc--; fired++;
      const g = gunnerPos[fireIdx % gunnerPos.length];
      fireIdx++;
      const ways = shotWays + (spreadTime > 0 ? 2 : 0);
      for (let i = 0; i < ways; i++) {
        const off = ways === 1 ? 0 : (i - (ways - 1) / 2) * 0.14;
        bullets.push({
          x: g.x, y: g.y - 20,
          vx: Math.sin(off) * bulletSpeed, vy: -Math.cos(off) * bulletSpeed,
          r: 4, dmg: bulletDmg * dmgScale,
          pierce: pierce, lastHit: null,
        });
      }
      if (fired === 1) beep(880, 0.03, "square", 0.012);
    }
    if (bullets.length > MAX_BULLETS) bullets.splice(0, bullets.length - MAX_BULLETS);

    missileTimer -= dt;
    if (missileTimer <= 0) { missileTimer = 3; fireMissiles(); }
    for (let i = missiles.length - 1; i >= 0; i--) {
      const m = missiles[i];
      m.life -= dt;
      const t = nearestTarget(m.x, m.y);
      if (t) {
        const ang = Math.atan2(t.y - m.y, t.x - m.x);
        const cur = Math.atan2(m.vy, m.vx);
        let diff = ang - cur;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const turn = Math.max(-6 * dt, Math.min(6 * dt, diff));
        const sp = 400;
        const na = cur + turn;
        m.vx = Math.cos(na) * sp; m.vy = Math.sin(na) * sp;
      }
      m.x += m.vx * dt; m.y += m.vy * dt;
      if (particles.length < P_MAX - 10) {
        particles.push({ x: m.x, y: m.y, h: 22, vx: 0, vy: 40, vh: 0, life: 0.25, r: 1, g: 0.62, b: 0.26 });
      }
      let hit = false;
      if (t && (t.x - m.x) ** 2 + (t.y - m.y) ** 2 < 30 * 30) hit = true;
      if (hit || m.life <= 0 || m.y < -20 || m.x < -20 || m.x > W + 20) {
        if (hit) explodeMissile(m);
        missiles.splice(i, 1);
        if (state !== STATE.PLAYING) return;
      }
    }

    outer:
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dt; b.y += b.vy * dt;
      if (b.y < -10 || b.x < -10 || b.x > W + 10) { bullets.splice(i, 1); continue; }
      for (const g of gates) {
        if (b.x > g.x && b.x < g.x + g.w && b.y > g.y && b.y < g.y + g.h) {
          upgradeGate(g);
          spawnParticles(b.x, g.y + g.h, "#dfe6e9", 1, 0.4, 36);
          bullets.splice(i, 1);
          continue outer;
        }
      }
      for (let j = crates.length - 1; j >= 0; j--) {
        const c = crates[j];
        if (Math.abs(b.x - c.x) < c.size / 2 + b.r && Math.abs(b.y - c.y) < c.size / 2 + b.r) {
          c.hp -= b.dmg; c.hitFlash = 0.08;
          spawnParticles(b.x, b.y, "#f0932b", 2, 0.5, 20);
          bullets.splice(i, 1);
          if (c.hp <= 0) { openCrate(c); crates.splice(j, 1); }
          continue outer;
        }
      }
      if (boss && Math.abs(b.x - boss.x) < boss.w / 2 + b.r && Math.abs(b.y - boss.y) < boss.h / 2 + b.r) {
        const crit = Math.random() < critChance;
        const dmg = crit ? b.dmg * 3 : b.dmg;
        boss.hp -= dmg; boss.hitFlash = 0.06;
        spawnParticles(b.x, b.y, crit ? "#ffd32a" : "#fffa65", crit ? 6 : 2, crit ? 1 : 0.5, 60);
        if (crit) addFloatText(b.x, b.y, `${Math.round(dmg)}!`, "#ffd32a", 20);
        bullets.splice(i, 1);
        if (boss.hp <= 0) killBoss();
        continue;
      }
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (e === b.lastHit) continue;
        if (Math.abs(b.x - e.x) < e.w / 2 + b.r && Math.abs(b.y - e.y) < e.h / 2 + b.r) {
          const crit = Math.random() < critChance;
          const dmg = crit ? b.dmg * 3 : b.dmg;
          e.hp -= dmg; e.hitFlash = 0.08;
          spawnParticles(b.x, b.y, crit ? "#ffd32a" : "#fffa65", crit ? 5 : 2, crit ? 0.9 : 0.5, 26);
          if (crit) addFloatText(b.x, b.y, `${Math.round(dmg)}!`, "#ffd32a", 18);
          if (e.hp <= 0) { killEnemy(e); enemies.splice(j, 1); }
          if (b.pierce > 0) {
            b.pierce--; b.lastHit = e;
          } else {
            bullets.splice(i, 1);
          }
          continue outer;
        }
      }
    }

    if (boss) {
      if (boss.y < boss.targetY) {
        boss.y = Math.min(boss.targetY, boss.y + 90 * dt);
      } else {
        const bdx = leaderX - boss.x;
        boss.x += Math.max(-45, Math.min(45, bdx)) * dt;
      }
      boss.wobble += dt * 2;
      if (boss.hitFlash > 0) boss.hitFlash -= dt;
      bossMinionTimer -= dt;
      if (bossMinionTimer <= 0 && boss.y >= boss.targetY) {
        bossMinionTimer = Math.max(1.6, 3.2 - wave * 0.05);
        const n = 2 + Math.floor(Math.random() * 2);
        for (let k = 0; k < n; k++) {
          spawnEnemy(
            Math.max(20, Math.min(W - 20, boss.x + (Math.random() - 0.5) * 180)),
            boss.y + 70
          );
        }
        beep(180, 0.1, "sawtooth", 0.05);
      }
    }

    for (let i = crates.length - 1; i >= 0; i--) {
      const c = crates[i];
      c.y += c.vy * dt;
      c.phase += dt * 3;
      if (c.hitFlash > 0) c.hitFlash -= dt;
      if (c.y > H + 30) crates.splice(i, 1);
    }

    for (let i = gates.length - 1; i >= 0; i--) {
      const g = gates[i];
      g.y += g.vy * dt;
      if (g.y + g.h >= SQUAD_Y - 10) {
        const pairId = g.pairId;
        const hit = gates.filter(x => x.pairId === pairId)
                         .find(x => leaderX >= x.x && leaderX <= x.x + x.w) || g;
        applyGate(hit);
        for (let j = gates.length - 1; j >= 0; j--) {
          if (gates[j].pairId === pairId) gates.splice(j, 1);
        }
        if (state !== STATE.PLAYING) return;
        break;
      }
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.y += e.speed * dt;
      e.wobblePhase += dt * (e.type === "fast" ? 9 : 5);
      e.x += Math.sin(e.wobblePhase) * e.wobbleAmp * dt;
      e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
      if (e.hitFlash > 0) e.hitFlash -= dt;

      if (e.y > SQUAD_Y - 80) {
        let touched = false;
        for (const g of gunnerPos) {
          if (Math.abs(e.x - g.x) < e.w / 2 + 11 && Math.abs(e.y - g.y) < e.h / 2 + 13) {
            touched = true; break;
          }
        }
        if (touched) {
          killEnemy(e, false);
          enemies.splice(i, 1);
          loseSoldiers(e.cost, e.x, e.y);
          if (state !== STATE.PLAYING) return;
          continue;
        }
      }
      if (e.y - e.h / 2 > H) {
        enemies.splice(i, 1);
        loseSoldiers(1, e.x, H - 40);
        if (state !== STATE.PLAYING) return;
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.h += p.vh * dt;
      p.vh -= 300 * dt;
      if (p.h < 0) p.h = 0;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const s = shockwaves[i];
      s.life -= dt;
      s.r = s.maxR * (1 - s.life / s.maxLife);
      if (s.life <= 0) shockwaves.splice(i, 1);
    }
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      const t = floatTexts[i];
      t.h += 45 * dt; t.life -= dt;
      if (t.life <= 0) floatTexts.splice(i, 1);
    }

    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      if (!boss) spawnEnemy();
      const interval = Math.max(0.13, 0.95 - wave * 0.05);
      spawnTimer = interval * (0.7 + Math.random() * 0.6);
    }
    hordeTimer -= dt;
    if (hordeTimer <= 0) {
      if (!boss) spawnHorde();
      hordeTimer = Math.max(4, 9 - wave * 0.35) * (0.8 + Math.random() * 0.4);
    }
    gateTimer -= dt;
    if (gateTimer <= 0 && gates.length === 0) {
      spawnGatePair();
      gateTimer = 9 + Math.random() * 5;
    }
    crateTimer -= dt;
    if (crateTimer <= 0) {
      spawnCrate();
      crateTimer = 6 + Math.random() * 6;
    }

    waveTimer += dt;
    if (waveTimer >= 12) {
      waveTimer = 0; wave++;
      addFloatText(W / 2, 400, `WAVE ${wave}`, "#ff6b81", 30);
      beep(440, 0.3, "triangle", 0.06);
      if (wave % 5 === 0 && !boss) spawnBoss();
    }

    if (shake > 0) shake = Math.max(0, shake - dt * 30);
    if (flash > 0) flash = Math.max(0, flash - dt);
  }

  // ============================================================
  // 3D同期＋HUD描画
  // ============================================================
  function syncEnemies() {
    const counts = { crab: 0, squid: 0, octo: 0 };
    for (const e of enemies) {
      const mesh = ENEMY_MESH[e.spr];
      if (counts[e.spr] >= mesh.userData.cap) continue;
      const i = counts[e.spr]++;
      const bob = Math.abs(Math.sin(e.wobblePhase * 1.5)) * (e.type === "fast" ? 10 : 5);
      toWorld(e.x, e.y, bob, dummy.position);
      dummy.rotation.set(0, Math.sin(e.wobblePhase) * 0.25, 0);
      const hpSq = e.hp / e.maxHp;
      dummy.scale.setScalar(1);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
      tmpColor.copy(mesh.userData.baseColor);
      if (e.hitFlash > 0) tmpColor.lerp(WHITE, Math.min(1, e.hitFlash * 12));
      else if (hpSq < 0.4) tmpColor.lerp(new THREE.Color(0xff4757), 0.3);
      mesh.setColorAt(i, tmpColor);
    }
    for (const key of ["crab", "squid", "octo"]) {
      const mesh = ENEMY_MESH[key];
      mesh.count = counts[key];
      mesh.instanceMatrix.needsUpdate = true;
      if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
    }
  }

  function syncSoldiers() {
    const tier = playerTier();
    tmpColor.set(TIER_COLORS[tier]);
    let i = 0;
    for (const g of gunnerPos) {
      const bob = Math.abs(Math.sin(elapsed * 10 + i)) * 2;
      toWorld(g.x, g.y, bob, dummy.position);
      dummy.rotation.set(0, 0, 0);
      dummy.scale.setScalar(i === 0 ? 1.45 : 1);
      dummy.updateMatrix();
      soldierMesh.setMatrixAt(i, dummy.matrix);
      soldierMesh.setColorAt(i, tmpColor);
      i++;
    }
    soldierMesh.count = state === STATE.TITLE || state === STATE.GAMEOVER ? 0 : i;
    soldierMesh.instanceMatrix.needsUpdate = true;
    if (soldierMesh.instanceColor) soldierMesh.instanceColor.needsUpdate = true;
  }

  function syncBullets() {
    let i = 0;
    for (const b of bullets) {
      toWorld(b.x, b.y, 22, dummy.position);
      dummy.rotation.set(0, Math.atan2(-b.vx, -b.vy), 0);
      dummy.scale.setScalar(1);
      dummy.updateMatrix();
      bulletMesh.setMatrixAt(i++, dummy.matrix);
      if (i >= MAX_BULLETS) break;
    }
    bulletMesh.count = i;
    bulletMesh.instanceMatrix.needsUpdate = true;
  }

  function syncBoss() {
    if (!boss) { bossGroup.visible = false; return; }
    bossGroup.visible = true;
    const hover = 60 + Math.sin(boss.wobble) * 10;
    toWorld(boss.x, boss.y, hover, bossGroup.position);
    bossGroup.rotation.y += 0.01;
    const mat = bossBody.material;
    mat.color.set(0xc56cf0);
    if (boss.hitFlash > 0) mat.color.lerp(WHITE, Math.min(1, boss.hitFlash * 12));
  }

  function syncCrates() {
    for (let i = 0; i < cratePool.length; i++) {
      const g = cratePool[i];
      const c = crates[i];
      if (!c) { g.visible = false; continue; }
      g.visible = true;
      toWorld(c.x, c.y, Math.abs(Math.sin(c.phase)) * 6, g.position);
      g.rotation.y = c.phase * 0.5;
      const body = g.children[0];
      body.material.emissive = body.material.emissive || new THREE.Color(0);
      body.material.emissive.setScalar(c.hitFlash > 0 ? 0.6 : 0);
    }
  }

  function syncMissiles() {
    for (let i = 0; i < missilePool.length; i++) {
      const mesh = missilePool[i];
      const m = missiles[i];
      if (!m) { mesh.visible = false; continue; }
      mesh.visible = true;
      toWorld(m.x, m.y, 26, mesh.position);
      mesh.rotation.set(Math.PI / 2, 0, -Math.atan2(m.vy, m.vx) - Math.PI / 2, "ZYX");
    }
  }

  function syncWaves() {
    for (let i = 0; i < wavePool.length; i++) {
      const mesh = wavePool[i];
      const s = shockwaves[i];
      if (!s) { mesh.visible = false; continue; }
      mesh.visible = true;
      toWorld(s.x, s.y, 2, mesh.position);
      mesh.scale.setScalar(Math.max(1, s.r));
      mesh.material.color.set(s.color);
      mesh.material.opacity = Math.max(0, s.life / s.maxLife) * 0.8;
    }
  }

  function syncParticles() {
    let i = 0;
    for (const p of particles) {
      toWorld(p.x, p.y, p.h, _v);
      pPos[i * 3] = _v.x; pPos[i * 3 + 1] = _v.y; pPos[i * 3 + 2] = _v.z;
      const a = Math.max(0, Math.min(1, p.life * 2.2));
      pCol[i * 3] = p.r * a; pCol[i * 3 + 1] = p.g * a; pCol[i * 3 + 2] = p.b * a;
      i++;
      if (i >= P_MAX) break;
    }
    for (let j = i; j < P_MAX; j++) {
      pPos[j * 3] = 0; pPos[j * 3 + 1] = -9999; pPos[j * 3 + 2] = 0;
    }
    pGeo.attributes.position.needsUpdate = true;
    pGeo.attributes.color.needsUpdate = true;
  }

  function syncGates() {
    for (let i = 0; i < 2; i++) {
      const slot = gateSlots[i];
      const g = gates[i];
      if (!g) { slot.grp.visible = false; continue; }
      slot.grp.visible = true;
      toWorld(g.x + g.w / 2, g.y + g.h / 2, 0, slot.grp.position);
      const good = gateIsGood(g);
      slot.panelMat.color.set(good ? 0x2e86de : 0xff4757);
      slot.pillarMat.color.set(good ? 0x48dbfb : 0xff4757);
      const text = gateLabel(g);
      if (text !== slot.lastText) {
        slot.lastText = text;
        const c = slot.label.canvas, g2 = c.getContext("2d");
        g2.clearRect(0, 0, c.width, c.height);
        g2.font = "bold 64px sans-serif";
        g2.textAlign = "center"; g2.textBaseline = "middle";
        g2.shadowColor = good ? "#48dbfb" : "#ff4757";
        g2.shadowBlur = 18;
        g2.fillStyle = "#ffffff";
        g2.fillText(text, c.width / 2, c.height / 2);
        slot.label.tex.needsUpdate = true;
      }
    }
  }

  function updateCamera() {
    const cx = (leaderX - W / 2) * 0.35;
    const sx = shake > 0 ? (Math.random() - 0.5) * shake * 0.8 : 0;
    const sy = shake > 0 ? (Math.random() - 0.5) * shake * 0.8 : 0;
    camera.position.set(cx + sx, 330 + sy, 275);
    camera.lookAt(cx * 0.6, 0, -430);
  }

  // ---- HUD（2Dオーバーレイ）----
  function drawHUD() {
    const w = hud.width / DPR, h = hud.height / DPR;
    hctx.clearRect(0, 0, w, h);

    // フロートテキスト（3D位置を投影）
    hctx.textAlign = "center";
    for (const t of floatTexts) {
      const s = toScreen(t.x, t.y, t.h);
      if (s.behind) continue;
      hctx.globalAlpha = Math.min(1, t.life * 2);
      hctx.font = `bold ${t.size}px sans-serif`;
      hctx.fillStyle = t.color;
      hctx.shadowColor = "#000"; hctx.shadowBlur = 5;
      hctx.fillText(t.text, s.sx, s.sy);
      hctx.shadowBlur = 0;
    }
    hctx.globalAlpha = 1;

    // レベルアップバナー（ポーズせず上部にドンと出す）
    if (banner) {
      banner.life -= 1 / 60;
      if (banner.life <= 0) banner = null;
      else {
        const p = banner.life / banner.maxLife;
        const pop = 1 + Math.max(0, p - 0.88) * 6;          // 出現時にポンと拡大
        hctx.globalAlpha = Math.min(1, p * 4);
        hctx.textAlign = "center";
        hctx.font = `bold ${Math.round(34 * pop)}px sans-serif`;
        hctx.fillStyle = "#ffd32a";
        hctx.shadowColor = "#ffd32a"; hctx.shadowBlur = 18;
        hctx.fillText(banner.title, w / 2, h * 0.3);
        hctx.shadowBlur = 0;
        hctx.font = "bold 18px sans-serif";
        hctx.fillStyle = "#fff";
        hctx.shadowColor = "#000"; hctx.shadowBlur = 6;
        hctx.fillText(banner.sub, w / 2, h * 0.3 + 34);
        hctx.shadowBlur = 0;
        hctx.globalAlpha = 1;
      }
    }

    // 人数バッジ（先頭の下）
    if (state === STATE.PLAYING) {
      const s = toScreen(leaderX, SQUAD_Y + 40, 0);
      if (!s.behind) {
        hctx.font = "bold 22px sans-serif";
        hctx.fillStyle = "#48dbfb";
        hctx.shadowColor = "#000"; hctx.shadowBlur = 6;
        hctx.fillText(`×${squadCount}`, s.sx, s.sy + 30);
        hctx.shadowBlur = 0;
      }
    }

    // スコア類
    hctx.textAlign = "left";
    hctx.font = "bold 22px sans-serif";
    hctx.fillStyle = "#ffd32a";
    hctx.fillText(`SCORE ${score}`, 14, 32);
    hctx.textAlign = "right";
    hctx.fillStyle = "#ff6b81";
    hctx.fillText(`WAVE ${wave}`, w - 14, 32);
    hctx.textAlign = "left";
    hctx.font = "14px sans-serif";
    hctx.fillStyle = "#999";
    hctx.fillText(`💀 ${killCount}  BEST ${best}  DMG ${bulletDmg}`, 14, 54);

    // XPバー
    hctx.fillStyle = "rgba(0,0,0,.5)";
    hctx.fillRect(14, 62, w - 28, 8);
    hctx.fillStyle = "#ffd32a";
    hctx.fillRect(14, 62, (w - 28) * Math.min(1, xp / xpNext), 8);
    hctx.font = "bold 12px sans-serif";
    hctx.fillText(`Lv.${level}`, 14, 84);

    // コンボ
    if (combo >= 5) {
      hctx.textAlign = "right";
      const pop = 1 + Math.max(0, comboTimer - 1.7) * 3;
      hctx.font = `bold ${Math.round(24 * pop)}px sans-serif`;
      hctx.fillStyle = combo >= 20 ? "#ff9f43" : "#ffd32a";
      hctx.shadowColor = "#000"; hctx.shadowBlur = 6;
      hctx.fillText(`${combo} COMBO`, w - 14, 92);
      hctx.shadowBlur = 0;
      hctx.textAlign = "left";
    }

    // ボスHPバー
    if (boss) {
      const bw = Math.min(w - 80, 420);
      hctx.textAlign = "center";
      hctx.font = "bold 14px sans-serif";
      hctx.fillStyle = "#e056fd";
      hctx.fillText("👑 BOSS", w / 2, 110);
      hctx.fillStyle = "rgba(0,0,0,.55)";
      hctx.fillRect(w / 2 - bw / 2, 116, bw, 12);
      hctx.fillStyle = "#e056fd";
      hctx.fillRect(w / 2 - bw / 2, 116, bw * Math.max(0, boss.hp / boss.maxHp), 12);
      hctx.strokeStyle = "#fff"; hctx.lineWidth = 2;
      hctx.strokeRect(w / 2 - bw / 2, 116, bw, 12);
      hctx.textAlign = "left";
    }

    let hudY = 104;
    hctx.font = "14px sans-serif";
    if (rapidTime > 0) {
      hctx.fillStyle = "#ff9ff3";
      hctx.fillText(`RAPID ${rapidTime.toFixed(1)}s`, 14, hudY); hudY += 18;
    }
    if (spreadTime > 0) {
      hctx.fillStyle = "#ffd32a";
      hctx.fillText(`3WAY ${spreadTime.toFixed(1)}s`, 14, hudY);
    }

    if (flash > 0) {
      hctx.fillStyle = `rgba(255,255,255,${flash * 1.6})`;
      hctx.fillRect(0, 0, w, h);
    }
  }

  // ---- ゲームフロー ----
  const startScreen = document.getElementById("start-screen");
  const gameoverScreen = document.getElementById("gameover-screen");

  function startGame() {
    reset();
    banner = null;
    updateGunnerPos();
    state = STATE.PLAYING;
    startScreen.classList.add("hidden");
    gameoverScreen.classList.add("hidden");
    beep(660, 0.15, "triangle", 0.06);
  }
  function gameOver() {
    state = STATE.GAMEOVER;
    shake = 14;
    spawnParticles(leaderX, SQUAD_Y, "#ff4757", 40, 2, 20);
    spawnShockwave(leaderX, SQUAD_Y, 220, 0xff4757);
    beep(120, 0.5, "sawtooth", 0.1);
    if (score > best) {
      best = score;
      localStorage.setItem("gs_best", String(best));
    }
    document.getElementById("final-score").textContent = score;
    document.getElementById("best-score-label").textContent =
      `ベストスコア: ${best} ／ 最大コンボ: ${maxCombo} ／ Lv.${level}`;
    setTimeout(() => gameoverScreen.classList.remove("hidden"), 600);
  }
  document.getElementById("start-btn").addEventListener("click", startGame);
  document.getElementById("retry-btn").addEventListener("click", startGame);

  // 開発用デバッグフック
  window.__dbg = () => ({
    state, squadCount, level, xp, xpNext, score, killCount, wave,
    bullets: bullets.length, enemies: enemies.length, gates: gates.length,
  });

  // ---- メインループ ----
  reset();
  updateGunnerPos();
  lastTime = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 1 / 20);
    lastTime = now;
    if (state === STATE.PLAYING) update(dt);
    else elapsed += dt;
    syncEnemies();
    syncSoldiers();
    syncBullets();
    syncBoss();
    syncCrates();
    syncMissiles();
    syncWaves();
    syncParticles();
    syncGates();
    updateCamera();
    renderer.render(scene, camera);
    drawHUD();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
