<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GATE INVADERS 2.5D - よくある広告のやつ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👾</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #05050c;
    overflow: hidden;
    touch-action: none;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #game-container { position: relative; width: 100%; height: 100%; }
  #game-container > canvas.webgl { position: absolute; inset: 0; }
  #hud {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 5;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(5,5,12,.82);
    color: #fff;
    text-align: center;
    z-index: 10;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: clamp(28px, 7vw, 56px);
    letter-spacing: .1em;
    color: #2eff7b;
    text-shadow: 0 0 24px rgba(46,255,123,.6);
    margin-bottom: 12px;
  }
  .overlay p { font-size: clamp(13px, 3.4vw, 19px); color: #ccc; margin: 5px 0; }
  .overlay .score-big { font-size: clamp(24px, 6vw, 44px); color: #ffd32a; margin: 10px 0; }
  .overlay button {
    margin-top: 24px;
    padding: 14px 48px;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: bold;
    color: #fff;
    background: linear-gradient(180deg, #2eff7b, #0fae4a);
    border: none; border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 6px 0 #087031, 0 10px 20px rgba(0,0,0,.5);
    transition: transform .08s;
  }
  .overlay button:active { transform: translateY(4px); box-shadow: 0 2px 0 #087031; }
  #gameover-screen h1 { color: #ff4757; text-shadow: 0 0 24px rgba(255,71,87,.6); }
  #gameover-screen button {
    background: linear-gradient(180deg, #ff6b81, #e8304a);
    box-shadow: 0 6px 0 #a3122a, 0 10px 20px rgba(0,0,0,.5);
  }
  #gameover-screen button:active { box-shadow: 0 2px 0 #a3122a; }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="hud"></canvas>

  <div id="start-screen" class="overlay">
    <h1>👾 GATE INVADERS</h1>
    <p>奥から迫りくるインベーダーの大群を撃ちまくれ！</p>
    <p>🚪 <b>×2 / ×3 / +10</b> のゲートをくぐると自軍が増殖（上限なし！）</p>
    <p>🔫 マイナスゲートは撃ちまくればプラスに変わる！</p>
    <p>📦 宝箱を撃って壊すとパワーアップ！</p>
    <p>⭐ レベルアップで自動パワーアップ！</p>
    <p>👑 5ウェーブごとに巨大UFOボスが出現！</p>
    <p>操作：マウス / タッチ / ←→キー（射撃は自動）</p>
    <button id="start-btn">▶ ゲームスタート</button>
  </div>

  <div id="gameover-screen" class="overlay hidden">
    <h1>GAME OVER</h1>
    <p>全滅…！スコア</p>
    <div class="score-big" id="final-score">0</div>
    <p id="best-score-label"></p>
    <button id="retry-btn">🔄 もう一度</button>
  </div>
</div>

<script src="lib/three.min.js"></script>
<script>
(() => {
  "use strict";

  // ============================================================
  // ゲーム論理座標系（2D版と同じ）：
  //   x: 0..480（横）  y: 0..800（奥行き。0=最奥、800=手前）
  // 3Dワールドへは (x-240, 高さ, y-800) で変換する
  // 描画は 2.5D：真上寄りの固定オーソグラフィックカメラ＋
  // ドット絵ビルボードスプライト（遠近で小さくならず見やすい）
  // ============================================================
  const W = 480, H = 800;
  const SQUAD_Y = H - 150;
  const FIRE_STREAMS = 22;
  const DRAW_SQUAD = 90;
  const MAX_BULLETS = 320;
  const MAX_ENEMIES = 130;
  const MAX_TEXTS = 36;

  const container = document.getElementById("game-container");
  const hud = document.getElementById("hud");
  const hctx = hud.getContext("2d");

  // ---------- three.js セットアップ ----------
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.domElement.classList.add("webgl");
  container.insertBefore(renderer.domElement, container.firstChild);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x090914);

  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 1, 4000);

  scene.add(new THREE.AmbientLight(0xaab3dd, 1.1));
  const sun = new THREE.DirectionalLight(0xffffff, 0.9);
  sun.position.set(220, 500, 180);
  scene.add(sun);

  // 地面＋グリッド
  {
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(1600, 2800),
      new THREE.MeshLambertMaterial({ color: 0x101226 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.set(0, -1, -700);
    scene.add(ground);
    const grid = new THREE.GridHelper(2800, 56, 0x27395f, 0x1a2440);
    grid.position.set(0, 0, -500);
    scene.add(grid);
    const edgeMat = new THREE.MeshBasicMaterial({ color: 0x63304a });
    for (const sx of [-246, 246]) {
      const edge = new THREE.Mesh(new THREE.BoxGeometry(5, 2, 1800), edgeMat);
      edge.position.set(sx, 1, -500);
      scene.add(edge);
    }
    const dead = new THREE.Mesh(new THREE.BoxGeometry(492, 2, 6), new THREE.MeshBasicMaterial({ color: 0xff4757 }));
    dead.position.set(0, 1, 30);
    scene.add(dead);
  }

  // 星空
  {
    const n = 300, pos = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
      pos[i * 3] = (Math.random() - 0.5) * 2600;
      pos[i * 3 + 1] = 60 + Math.random() * 900;
      pos[i * 3 + 2] = -2000 + Math.random() * 2300;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0x777799, size: 3, sizeAttenuation: false })));
  }

  // ============================================================
  // ドット絵スプライト（2D版のパターンをテクスチャ化）
  // ============================================================
  const PIX = {
    crabA: [
      "..X.....X..",
      "...X...X...",
      "..XXXXXXX..",
      ".XX.XXX.XX.",
      "XXXXXXXXXXX",
      "X.XXXXXXX.X",
      "X.X.....X.X",
      "...XX.XX...",
    ],
    crabB: [
      "..X.....X..",
      "X..X...X..X",
      "X.XXXXXXX.X",
      "XXX.XXX.XXX",
      ".XXXXXXXXX.",
      "..XXXXXXX..",
      "..X.....X..",
      ".X.......X.",
    ],
    squidA: [
      "...XX...",
      "..XXXX..",
      ".XXXXXX.",
      "XX.XX.XX",
      "XXXXXXXX",
      "..X..X..",
      ".X.XX.X.",
      "X.X..X.X",
    ],
    squidB: [
      "...XX...",
      "..XXXX..",
      ".XXXXXX.",
      "XX.XX.XX",
      "XXXXXXXX",
      ".X.XX.X.",
      "X......X",
      ".X....X.",
    ],
    octoA: [
      "....XXXX....",
      ".XXXXXXXXXX.",
      "XXXXXXXXXXXX",
      "XXX..XX..XXX",
      "XXXXXXXXXXXX",
      "...XX..XX...",
      "..XX.XX.XX..",
      "XX........XX",
    ],
    octoB: [
      "....XXXX....",
      ".XXXXXXXXXX.",
      "XXXXXXXXXXXX",
      "XXX..XX..XXX",
      "XXXXXXXXXXXX",
      "..XXX..XXX..",
      ".XX..XX..XX.",
      "..XX....XX..",
    ],
    ufo: [
      ".....XXXXXX.....",
      "...XXXXXXXXXX...",
      "..XXXXXXXXXXXX..",
      ".XX.XX.XX.XX.XX.",
      "XXXXXXXXXXXXXXXX",
      "..XXX..XX..XXX..",
      "...X........X...",
    ],
    cannon1: [
      "......X......",
      ".....XXX.....",
      ".....XXX.....",
      ".XXXXXXXXXXX.",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
    ],
    cannon2: [
      "......X......",
      ".....XXX.....",
      "..X..XXX..X..",
      ".XX.XXXXX.XX.",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
      ".XXXXXXXXXXX.",
      "..XX.....XX..",
    ],
    cannon3: [
      "...X.....X...",
      "..XXX...XXX..",
      "..XXX...XXX..",
      ".XXXXXXXXXXX.",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
      "XXXXXXXXXXXXX",
      ".XX.......XX.",
    ],
  };

  function makeTex(pattern, color, opts = {}) {
    const px = 8;
    const rows = pattern.length, cols = pattern[0].length;
    const c = document.createElement("canvas");
    c.width = cols * px; c.height = rows * px;
    const g = c.getContext("2d");
    g.fillStyle = color;
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        if (pattern[y][x] === "X") g.fillRect(x * px, y * px, px, px);
      }
    }
    if (opts.eyes) {
      g.fillStyle = "#ff2a2a";
      const ex = Math.floor(cols * 0.3), ex2 = Math.floor(cols * 0.62), ey = Math.floor(rows * 0.36);
      g.fillRect(ex * px, ey * px, px, px);
      g.fillRect(ex2 * px, ey * px, px, px);
    }
    if (opts.crown) {
      g.fillStyle = "#f9ca24";
      const cw = Math.floor(cols * 0.4), cx0 = Math.floor(cols * 0.3);
      for (let i = 0; i < cw; i++) {
        const hgt = i % 2 === 0 ? 2 : 1;
        g.fillRect((cx0 + i) * px, (0 - 0) * px, px, hgt * px);
      }
    }
    const tex = new THREE.CanvasTexture(c);
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.NearestFilter;
    return tex;
  }

  const TEX = {
    crab:  [makeTex(PIX.crabA, "#2eff7b", { eyes: true }), makeTex(PIX.crabB, "#2eff7b", { eyes: true })],
    squid: [makeTex(PIX.squidA, "#ff9f43", { eyes: true }), makeTex(PIX.squidB, "#ff9f43", { eyes: true })],
    octo:  [makeTex(PIX.octoA, "#c56cf0", { eyes: true }), makeTex(PIX.octoB, "#c56cf0", { eyes: true })],
    cannon: [makeTex(PIX.cannon1, "#2eff7b"), makeTex(PIX.cannon2, "#48dbfb"), makeTex(PIX.cannon3, "#ffd32a")],
    boss: makeTex(PIX.ufo, "#e056fd", { eyes: true }),
  };

  // 弾のグローテクスチャ
  function makeGlowTex() {
    const c = document.createElement("canvas");
    c.width = 32; c.height = 64;
    const g = c.getContext("2d");
    const grad = g.createRadialGradient(16, 32, 2, 16, 32, 30);
    grad.addColorStop(0, "rgba(230,255,240,1)");
    grad.addColorStop(0.35, "rgba(120,255,180,.85)");
    grad.addColorStop(1, "rgba(120,255,180,0)");
    g.fillStyle = grad;
    g.fillRect(0, 0, 32, 64);
    g.fillStyle = "rgba(255,255,255,.95)";
    g.fillRect(13, 10, 6, 44);
    return new THREE.CanvasTexture(c);
  }

  // ---------- ビルボード（インスタンス化した板ポリ） ----------
  const dummy = new THREE.Object3D();
  const PLANE = new THREE.PlaneGeometry(1, 1);
  const billboardQuat = new THREE.Quaternion();

  function makeBillboard(tex, capacity, blending) {
    const mat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, alphaTest: blending ? 0 : 0.1,
      depthWrite: !blending,
      blending: blending ? THREE.AdditiveBlending : THREE.NormalBlending,
      side: THREE.DoubleSide,
    });
    const m = new THREE.InstancedMesh(PLANE, mat, capacity);
    m.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    m.count = 0;
    m.userData.cap = capacity;
    m.frustumCulled = false;
    // 初回コンパイル時にインスタンスカラーを有効化しておく
    const white = new THREE.Color(0xffffff);
    for (let i = 0; i < capacity; i++) m.setColorAt(i, white);
    m.instanceColor.needsUpdate = true;
    scene.add(m);
    return m;
  }

  // 敵：タイプ×歩行2フレーム分のメッシュ（全員同時にコマが切り替わる＝本家の行進）
  const ENEMY_MESH = {
    crab:  [makeBillboard(TEX.crab[0], 140), makeBillboard(TEX.crab[1], 140)],
    squid: [makeBillboard(TEX.squid[0], 140), makeBillboard(TEX.squid[1], 140)],
    octo:  [makeBillboard(TEX.octo[0], 60), makeBillboard(TEX.octo[1], 60)],
  };
  const ENEMY_SIZE = { crab: [50, 36], squid: [36, 36], octo: [88, 58] };

  const soldierMesh = makeBillboard(TEX.cannon[0], DRAW_SQUAD);
  const SOLDIER_SIZE = [27, 17], LEADER_SIZE = [40, 25];

  const bulletMesh = makeBillboard(makeGlowTex(), MAX_BULLETS, true);
  const BULLET_SIZE = [11, 26];

  // ボス（単体スプライト＋王冠）
  const bossMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(1, 1),
    new THREE.MeshBasicMaterial({ map: TEX.boss, transparent: true, alphaTest: 0.1, side: THREE.DoubleSide })
  );
  bossMesh.visible = false;
  bossMesh.frustumCulled = false;
  scene.add(bossMesh);

  // 宝箱プール
  const cratePool = [];
  for (let i = 0; i < 4; i++) {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(38, 32, 32), new THREE.MeshLambertMaterial({ color: 0xb3742f }));
    body.position.y = 16;
    const band = new THREE.Mesh(new THREE.BoxGeometry(40, 10, 34), new THREE.MeshLambertMaterial({ color: 0xf9ca24, emissive: 0x332200 }));
    band.position.y = 16;
    g.add(body, band);
    g.visible = false;
    scene.add(g);
    cratePool.push(g);
  }

  // ミサイルプール
  const missilePool = [];
  for (let i = 0; i < 14; i++) {
    const m = new THREE.Mesh(new THREE.ConeGeometry(5, 18, 6), new THREE.MeshBasicMaterial({ color: 0xffbe76 }));
    m.visible = false;
    scene.add(m);
    missilePool.push(m);
  }

  // 衝撃波プール
  const wavePool = [];
  for (let i = 0; i < 10; i++) {
    const m = new THREE.Mesh(
      new THREE.RingGeometry(0.86, 1, 40),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, side: THREE.DoubleSide, depthWrite: false })
    );
    m.rotation.x = -Math.PI / 2;
    m.visible = false;
    scene.add(m);
    wavePool.push(m);
  }

  // パーティクル
  const P_MAX = 600;
  const pPos = new Float32Array(P_MAX * 3);
  const pCol = new Float32Array(P_MAX * 3);
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute("position", new THREE.BufferAttribute(pPos, 3));
  pGeo.setAttribute("color", new THREE.BufferAttribute(pCol, 3));
  const pPoints = new THREE.Points(pGeo, new THREE.PointsMaterial({
    size: 6, vertexColors: true, transparent: true, opacity: 0.95,
    sizeAttenuation: false, depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  pPoints.frustumCulled = false;
  scene.add(pPoints);

  // ゲート（2スロット再利用）
  function makeLabelTexture() {
    const c = document.createElement("canvas");
    c.width = 256; c.height = 96;
    return { canvas: c, tex: new THREE.CanvasTexture(c) };
  }
  const gateSlots = [];
  for (let i = 0; i < 2; i++) {
    const grp = new THREE.Group();
    const gw = W / 2 - 14;
    const panelMat = new THREE.MeshBasicMaterial({ color: 0x2e86de, transparent: true, opacity: 0.32, side: THREE.DoubleSide, depthWrite: false });
    const panel = new THREE.Mesh(new THREE.PlaneGeometry(gw, 58), panelMat);
    panel.position.y = 34;
    const pillarMat = new THREE.MeshBasicMaterial({ color: 0x48dbfb });
    const p1 = new THREE.Mesh(new THREE.BoxGeometry(8, 78, 8), pillarMat);
    p1.position.set(-gw / 2, 39, 0);
    const p2 = p1.clone();
    p2.position.x = gw / 2;
    const label = makeLabelTexture();
    const labelMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(130, 49),
      new THREE.MeshBasicMaterial({ map: label.tex, transparent: true, depthWrite: false, side: THREE.DoubleSide })
    );
    labelMesh.position.set(0, 38, 3);
    grp.add(panel, p1, p2, labelMesh);
    grp.visible = false;
    scene.add(grp);
    gateSlots.push({ grp, panelMat, pillarMat, label, lastText: "" });
  }

  // ---------- 座標変換 ----------
  function toWorld(x, y, h = 0, out) {
    out = out || new THREE.Vector3();
    out.set(x - W / 2, h, y - H);
    return out;
  }
  const _v = new THREE.Vector3();
  function toScreen(x, y, h) {
    toWorld(x, y, h, _v).project(camera);
    return {
      sx: (_v.x * 0.5 + 0.5) * hud.width / DPR,
      sy: (-_v.y * 0.5 + 0.5) * hud.height / DPR,
      behind: _v.z > 1,
    };
  }

  // ---------- リサイズ（オーソ投影：遠くの敵も同じ大きさで見やすい） ----------
  let DPR = 1;
  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    const aspect = w / h;
    const halfH = Math.max(345, 285 / aspect);
    const halfW = halfH * aspect;
    camera.left = -halfW; camera.right = halfW;
    camera.top = halfH; camera.bottom = -halfH;
    camera.updateProjectionMatrix();
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    hud.width = w * DPR; hud.height = h * DPR;
    hud.style.width = w + "px"; hud.style.height = h + "px";
    hctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  // ============================================================
  // ゲーム状態（ロジックは前バージョンと同一）
  // ============================================================
  const STATE = { TITLE: 0, PLAYING: 1, GAMEOVER: 3 };
  let state = STATE.TITLE;

  let leaderX, targetX, squadCount, bulletDmg, fireRate, spreadTime, rapidTime;
  let shotWays, pierce, critChance, missileCount, bulletSpeed, fireRateMul;
  let level, xp, xpNext;
  let bullets, missiles, enemies, gates, crates, particles, floatTexts, shockwaves;
  let gunnerPos = [];
  let score, wave, killCount, combo, comboTimer, maxCombo;
  let fireAcc, fireIdx, missileTimer;
  let spawnTimer, hordeTimer, gateTimer, crateTimer, waveTimer, shake, flash, lastTime, elapsed;
  let boss, bossMinionTimer;
  let best = Number(localStorage.getItem("gs_best") || 0);
  const DEBUG_WAVE = Number(new URLSearchParams(location.search).get("wave")) || 0;

  const OFFSETS = [{ x: 0, y: 0 }];
  function ensureOffsets(n) {
    while (OFFSETS.length < n) {
      const idx = OFFSETS.length;
      const width = Math.min(4 + Math.floor(idx / 8), 14);
      const rowIdx = Math.floor((idx - 1) / width) + 1;
      const posInRow = (idx - 1) % width;
      const jx = Math.sin(idx * 999) * 5;
      const jy = Math.sin(idx * 777) * 4;
      OFFSETS.push({
        x: (posInRow - (width - 1) / 2) * 24 + jx,
        y: rowIdx * 25 + jy,
      });
    }
  }

  function reset() {
    leaderX = W / 2; targetX = W / 2;
    squadCount = 5;
    bulletDmg = 1;
    fireRate = 0.32; fireRateMul = 1;
    spreadTime = 0; rapidTime = 0;
    shotWays = 1; pierce = 0; critChance = 0; missileCount = 0; bulletSpeed = 760;
    level = 1; xp = 0; xpNext = 10;
    bullets = []; missiles = []; enemies = []; gates = []; crates = [];
    particles = []; floatTexts = []; shockwaves = [];
    score = 0; wave = DEBUG_WAVE || 1; killCount = 0;
    combo = 0; comboTimer = 0; maxCombo = 0;
    fireAcc = 0; fireIdx = 0; missileTimer = 3;
    spawnTimer = 1.5; hordeTimer = 10; gateTimer = 3.5; crateTimer = 5; waveTimer = 0;
    shake = 0; flash = 0; elapsed = 0;
    boss = null; bossMinionTimer = 0;
  }

  // ---- 入力 ----
  const keys = {};
  window.addEventListener("keydown", e => { keys[e.key] = true; });
  window.addEventListener("keyup", e => { keys[e.key] = false; });

  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();
  function pointerToGameX(clientX, clientY) {
    const rect = renderer.domElement.getBoundingClientRect();
    ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(ndc, camera);
    const o = raycaster.ray.origin, d = raycaster.ray.direction;
    if (Math.abs(d.y) < 1e-6) return null;
    const t = -o.y / d.y;
    if (t < 0) return null;
    return o.x + d.x * t + W / 2;
  }
  function onPointer(e) {
    const p = e.touches ? e.touches[0] : e;
    const gx = pointerToGameX(p.clientX, p.clientY);
    if (gx !== null) targetX = gx;
  }
  renderer.domElement.addEventListener("mousemove", onPointer);
  renderer.domElement.addEventListener("touchstart", e => { e.preventDefault(); onPointer(e); }, { passive: false });
  renderer.domElement.addEventListener("touchmove",  e => { e.preventDefault(); onPointer(e); }, { passive: false });

  // ---- サウンド ----
  let audioCtx = null;
  function beep(freq, dur, type = "square", vol = 0.06) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);

  let gatePairSeq = 0;

  function gateIsGood(g) {

  // ---- ミサイル ----

      missiles.push({

  function nearestTarget(x, y) {
    let bestT = null, bestD = Infinity;
    for (const e of enemies) {
      const d = (e.x - x) ** 2 + (e.y - y) ** 2;
      if (d < bestD) { bestD = d; bestT = e; }
    }
    if (boss) {
      const d = (boss.x - x) ** 2 + (boss.y - y) ** 2;
      if (d < bestD) bestT = boss;

  function explodeMissile(m) {
    spawnParticles(m.x, m.y, "#ff9f43", 16, 1.4, 24);
    spawnShockwave(m.x, m.y, 90, 0xff9f43);
    shake = Math.min(shake + 3, 12);
    beep(120, 0.15, "sawtooth", 0.07);
    const R = 70;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if ((e.x - m.x) ** 2 + (e.y - m.y) ** 2 < R * R) {
        e.hp -= m.dmg; e.hitFlash = 0.08;
        if (e.hp <= 0) { killEnemy(e); enemies.splice(j, 1); }
      }
    }
    if (boss && (boss.x - m.x) ** 2 + (boss.y - m.y) ** 2 < (R + 80) ** 2) {
      boss.hp -= m.dmg; boss.hitFlash = 0.06;
      if (boss.hp <= 0) killBoss();

  // ---- 更新 ----
  function update(dt) {
    elapsed += dt;

    const speed = 430;
    if (keys["ArrowLeft"] || keys["a"])  targetX = leaderX - speed * dt * 1.6;
    if (keys["ArrowRight"] || keys["d"]) targetX = leaderX + speed * dt * 1.6;
    const dx = targetX - leaderX;
    const maxMove = speed * dt;
    leaderX += Math.abs(dx) <= maxMove ? dx : Math.sign(dx) * maxMove;
    leaderX = Math.max(30, Math.min(W - 30, leaderX));
    updateGunnerPos();

    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }
    if (rapidTime > 0) rapidTime -= dt;
    if (spreadTime > 0) spreadTime -= dt;
    const curRate = (rapidTime > 0 ? 0.22 : fireRate) / fireRateMul;

    const streams = Math.min(squadCount, FIRE_STREAMS);
    const dmgScale = squadCount > FIRE_STREAMS ? squadCount / FIRE_STREAMS : 1;
    fireAcc += dt * streams / curRate;
    let fired = 0;
    while (fireAcc >= 1 && fired < 12) {
      fireAcc--; fired++;
      const g = gunnerPos[fireIdx % gunnerPos.length];
      fireIdx++;
      const ways = shotWays + (spreadTime > 0 ? 2 : 0);
      for (let i = 0; i < ways; i++) {
        const off = ways === 1 ? 0 : (i - (ways - 1) / 2) * 0.14;
        bullets.push({
          x: g.x, y: g.y - 20,
          vx: Math.sin(off) * bulletSpeed, vy: -Math.cos(off) * bulletSpeed,
          r: 4, dmg: bulletDmg * dmgScale,
          pierce: pierce, lastHit: null,
        });
      }
      if (fired === 1) beep(880, 0.03, "square", 0.012);
    }
    if (bullets.length > MAX_BULLETS) bullets.splice(0, bullets.length - MAX_BULLETS);

    missileTimer -= dt;
    if (missileTimer <= 0) { missileTimer = 3; fireMissiles(); }
    for (let i = missiles.length - 1; i >= 0; i--) {
      const m = missiles[i];
      m.life -= dt;
      const t = nearestTarget(m.x, m.y);
      if (t) {
        const ang = Math.atan2(t.y - m.y, t.x - m.x);
        const cur = Math.atan2(m.vy, m.vx);
        let diff = ang - cur;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const turn = Math.max(-6 * dt, Math.min(6 * dt, diff));
        const sp = 400;
        const na = cur + turn;
        m.vx = Math.cos(na) * sp; m.vy = Math.sin(na) * sp;
      }
      m.x += m.vx * dt; m.y += m.vy * dt;
      if (particles.length < P_MAX - 10) {
        particles.push({ x: m.x, y: m.y, h: 22, vx: 0, vy: 40, vh: 0, life: 0.25, r: 1, g: 0.62, b: 0.26 });
      }
      let hit = false;
      if (t && (t.x - m.x) ** 2 + (t.y - m.y) ** 2 < 30 * 30) hit = true;
      if (hit || m.life <= 0 || m.y < -20 || m.x < -20 || m.x > W + 20) {
        if (hit) explodeMissile(m);
        missiles.splice(i, 1);
        if (state !== STATE.PLAYING) return;
      }
    }

    outer:
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dt; b.y += b.vy * dt;
      if (b.y < -10 || b.x < -10 || b.x > W + 10) { bullets.splice(i, 1); continue; }
      for (const g of gates) {
        if (b.x > g.x && b.x < g.x + g.w && b.y > g.y && b.y < g.y + g.h) {
          upgradeGate(g);
          spawnParticles(b.x, g.y + g.h, "#dfe6e9", 1, 0.4, 36);
          bullets.splice(i, 1);
          continue outer;
        }
      }
      for (let j = crates.length - 1; j >= 0; j--) {
        const c = crates[j];
        if (Math.abs(b.x - c.x) < c.size / 2 + b.r && Math.abs(b.y - c.y) < c.size / 2 + b.r) {
          c.hp -= b.dmg; c.hitFlash = 0.08;
          spawnParticles(b.x, b.y, "#f0932b", 2, 0.5, 20);
          bullets.splice(i, 1);
          if (c.hp <= 0) { openCrate(c); crates.splice(j, 1); }
          continue outer;
        }
      }
      if (boss && Math.abs(b.x - boss.x) < boss.w / 2 + b.r && Math.abs(b.y - boss.y) < boss.h / 2 + b.r) {
        const crit = Math.random() < critChance;
        const dmg = crit ? b.dmg * 3 : b.dmg;
        boss.hp -= dmg; boss.hitFlash = 0.06;
        spawnParticles(b.x, b.y, crit ? "#ffd32a" : "#fffa65", crit ? 6 : 2, crit ? 1 : 0.5, 60);
        if (crit) addFloatText(b.x, b.y, `${Math.round(dmg)}!`, "#ffd32a", 20);
        bullets.splice(i, 1);
        if (boss.hp <= 0) killBoss();
        continue;
      }
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (e === b.lastHit) continue;
        if (Math.abs(b.x - e.x) < e.w / 2 + b.r && Math.abs(b.y - e.y) < e.h / 2 + b.r) {
          const crit = Math.random() < critChance;
          const dmg = crit ? b.dmg * 3 : b.dmg;
          e.hp -= dmg; e.hitFlash = 0.08;
          spawnParticles(b.x, b.y, crit ? "#ffd32a" : "#fffa65", crit ? 5 : 2, crit ? 0.9 : 0.5, 26);
          if (crit) addFloatText(b.x, b.y, `${Math.round(dmg)}!`, "#ffd32a", 18);
          if (e.hp <= 0) { killEnemy(e); enemies.splice(j, 1); }
          if (b.pierce > 0) {
            b.pierce--; b.lastHit = e;
          } else {
            bullets.splice(i, 1);
          }
          continue outer;
        }
      }
    }

    if (boss) {
      if (boss.y < boss.targetY) {
        boss.y = Math.min(boss.targetY, boss.y + 90 * dt);
      } else {
        const bdx = leaderX - boss.x;
        boss.x += Math.max(-45, Math.min(45, bdx)) * dt;
      }
      boss.wobble += dt * 2;
      if (boss.hitFlash > 0) boss.hitFlash -= dt;
      bossMinionTimer -= dt;
      if (bossMinionTimer <= 0 && boss.y >= boss.targetY) {
        bossMinionTimer = Math.max(1.6, 3.2 - wave * 0.05);
        const n = 2 + Math.floor(Math.random() * 2);
        for (let k = 0; k < n; k++) {
          spawnEnemy(
            Math.max(20, Math.min(W - 20, boss.x + (Math.random() - 0.5) * 180)),
            boss.y + 70
          );
        }
        beep(180, 0.1, "sawtooth", 0.05);
      }
    }

    for (let i = crates.length - 1; i >= 0; i--) {
      const c = crates[i];
      c.y += c.vy * dt;
      c.phase += dt * 3;
      if (c.hitFlash > 0) c.hitFlash -= dt;
      if (c.y > H + 30) crates.splice(i, 1);
    }

    for (let i = gates.length - 1; i >= 0; i--) {
      const g = gates[i];
      g.y += g.vy * dt;
      if (g.y + g.h >= SQUAD_Y - 10) {
        const pairId = g.pairId;
        const hit = gates.filter(x => x.pairId === pairId)
                         .find(x => leaderX >= x.x && leaderX <= x.x + x.w) || g;
        applyGate(hit);
        for (let j = gates.length - 1; j >= 0; j--) {
          if (gates[j].pairId === pairId) gates.splice(j, 1);
        }
        if (state !== STATE.PLAYING) return;
        break;
      }
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.y += e.speed * dt;
      e.wobblePhase += dt * (e.type === "fast" ? 9 : 5);
      e.x += Math.sin(e.wobblePhase) * e.wobbleAmp * dt;
      e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
      if (e.hitFlash > 0) e.hitFlash -= dt;

      if (e.y > SQUAD_Y - 80) {
        let touched = false;
        for (const g of gunnerPos) {
          if (Math.abs(e.x - g.x) < e.w / 2 + 11 && Math.abs(e.y - g.y) < e.h / 2 + 13) {
            touched = true; break;
          }
        }
        if (touched) {
          killEnemy(e, false);
          enemies.splice(i, 1);
          loseSoldiers(e.cost, e.x, e.y);
          if (state !== STATE.PLAYING) return;
          continue;
        }
      }
      if (e.y - e.h / 2 > H) {
        enemies.splice(i, 1);
        loseSoldiers(1, e.x, H - 40);
        if (state !== STATE.PLAYING) return;
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.h += p.vh * dt;
      p.vh -= 300 * dt;
      if (p.h < 0) p.h = 0;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const s = shockwaves[i];
      s.life -= dt;
      s.r = s.maxR * (1 - s.life / s.maxLife);
      if (s.life <= 0) shockwaves.splice(i, 1);
    }
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      const t = floatTexts[i];
      t.h += 45 * dt; t.life -= dt;
      if (t.life <= 0) floatTexts.splice(i, 1);
    }

    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      if (!boss) spawnEnemy();
      const interval = Math.max(0.13, 0.95 - wave * 0.05);
      spawnTimer = interval * (0.7 + Math.random() * 0.6);
    }
    hordeTimer -= dt;
    if (hordeTimer <= 0) {
      if (!boss) spawnHorde();
      hordeTimer = Math.max(4, 9 - wave * 0.35) * (0.8 + Math.random() * 0.4);
    }
    gateTimer -= dt;
    if (gateTimer <= 0 && gates.length === 0) {
      spawnGatePair();
      gateTimer = 9 + Math.random() * 5;
    }
    crateTimer -= dt;
    if (crateTimer <= 0) {
      spawnCrate();
      crateTimer = 6 + Math.random() * 6;
    }

    waveTimer += dt;
    if (waveTimer >= 12) {
      waveTimer = 0; wave++;
      addFloatText(W / 2, 400, `WAVE ${wave}`, "#ff6b81", 30);
      beep(440, 0.3, "triangle", 0.06);
      if (wave % 5 === 0 && !boss) spawnBoss();
    }

    if (shake > 0) shake = Math.max(0, shake - dt * 30);
    if (flash > 0) flash = Math.max(0, flash - dt);
  }

  // ============================================================
  // 3D同期（ビルボードスプライト）＋HUD描画
  // ============================================================
  function walkFrame() {
    return Math.floor(elapsed * 2.5) % 2;
  }

  function syncEnemies() {
    const frame = walkFrame();
    const counts = { crab: 0, squid: 0, octo: 0 };
    for (const e of enemies) {
      const mesh = ENEMY_MESH[e.spr][frame];
      if (counts[e.spr] >= mesh.userData.cap) continue;
      const i = counts[e.spr]++;
      const [sw, sh] = ENEMY_SIZE[e.spr];
      const bob = Math.abs(Math.sin(e.wobblePhase * 1.5)) * (e.type === "fast" ? 8 : 4);
      const pop = e.hitFlash > 0 ? 1.18 : 1;
      toWorld(e.x, e.y, sh * 0.42 + bob, dummy.position);
      dummy.quaternion.copy(billboardQuat);
      dummy.scale.set(sw * pop, sh * pop, 1);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
      const hpq = e.hp / e.maxHp;
      if (e.hitFlash > 0) tmpColor.setRGB(1, 1, 1);
      else if (hpq < 0.4) tmpColor.setRGB(1, 0.62, 0.62);
      else tmpColor.setRGB(1, 1, 1);
      mesh.setColorAt(i, tmpColor);
    }
    for (const key of ["crab", "squid", "octo"]) {
      for (let f = 0; f < 2; f++) {
        const mesh = ENEMY_MESH[key][f];
        mesh.count = f === frame ? counts[key] : 0;
        mesh.instanceMatrix.needsUpdate = true;
        if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
      }
    }
  }
  const tmpColor = new THREE.Color();

  function syncSoldiers() {
    const tier = playerTier();
    if (soldierMesh.material.map !== TEX.cannon[tier]) {
      soldierMesh.material.map = TEX.cannon[tier];
      soldierMesh.material.needsUpdate = true;
    }
    let i = 0;
    for (const g of gunnerPos) {
      const [sw, sh] = i === 0 ? LEADER_SIZE : SOLDIER_SIZE;
      const bob = Math.abs(Math.sin(elapsed * 10 + i)) * 2;
      toWorld(g.x, g.y, sh * 0.5 + bob, dummy.position);
      dummy.quaternion.copy(billboardQuat);
      dummy.scale.set(sw, sh, 1);
      dummy.updateMatrix();
      soldierMesh.setMatrixAt(i, dummy.matrix);
      i++;
    }
    soldierMesh.count = state === STATE.TITLE || state === STATE.GAMEOVER ? 0 : i;
    soldierMesh.instanceMatrix.needsUpdate = true;
  }

  function syncBullets() {
    let i = 0;
    for (const b of bullets) {
      toWorld(b.x, b.y, 24, dummy.position);
      dummy.quaternion.copy(billboardQuat);
      dummy.scale.set(BULLET_SIZE[0], BULLET_SIZE[1], 1);
      dummy.updateMatrix();
      bulletMesh.setMatrixAt(i++, dummy.matrix);
      if (i >= MAX_BULLETS) break;
    }
    bulletMesh.count = i;
    bulletMesh.instanceMatrix.needsUpdate = true;
  }

  function syncBoss() {
    if (!boss) { bossMesh.visible = false; return; }
    bossMesh.visible = true;
    const hover = 60 + Math.sin(boss.wobble) * 10;
    toWorld(boss.x, boss.y, hover, bossMesh.position);
    bossMesh.quaternion.copy(billboardQuat);
    const pop = boss.hitFlash > 0 ? 1.06 : 1;
    bossMesh.scale.set(boss.w * pop, boss.h * pop, 1);
    bossMesh.material.color.setRGB(1, 1, 1);
    if (boss.hitFlash > 0) bossMesh.material.color.setRGB(2, 2, 2);
  }

  function syncCrates() {
    for (let i = 0; i < cratePool.length; i++) {
      const g = cratePool[i];
      const c = crates[i];
      if (!c) { g.visible = false; continue; }
      g.visible = true;
      toWorld(c.x, c.y, Math.abs(Math.sin(c.phase)) * 6, g.position);
      g.rotation.y = c.phase * 0.5;
      const body = g.children[0];
      body.material.emissive.setScalar(c.hitFlash > 0 ? 0.6 : 0);
    }
  }

  function syncMissiles() {
    for (let i = 0; i < missilePool.length; i++) {
      const mesh = missilePool[i];
      const m = missiles[i];
      if (!m) { mesh.visible = false; continue; }
      mesh.visible = true;
      toWorld(m.x, m.y, 26, mesh.position);
      mesh.rotation.set(Math.PI / 2, 0, -Math.atan2(m.vy, m.vx) - Math.PI / 2, "ZYX");
    }
  }

  function syncWaves() {
    for (let i = 0; i < wavePool.length; i++) {
      const mesh = wavePool[i];
      const s = shockwaves[i];
      if (!s) { mesh.visible = false; continue; }
      mesh.visible = true;
      toWorld(s.x, s.y, 2, mesh.position);
      mesh.scale.setScalar(Math.max(1, s.r));
      mesh.material.color.set(s.color);
      mesh.material.opacity = Math.max(0, s.life / s.maxLife) * 0.8;
    }
  }

  function syncParticles() {
    let i = 0;
    for (const p of particles) {
      toWorld(p.x, p.y, p.h, _v);
      pPos[i * 3] = _v.x; pPos[i * 3 + 1] = _v.y; pPos[i * 3 + 2] = _v.z;
      const a = Math.max(0, Math.min(1, p.life * 2.2));
      pCol[i * 3] = p.r * a; pCol[i * 3 + 1] = p.g * a; pCol[i * 3 + 2] = p.b * a;
      i++;
      if (i >= P_MAX) break;
    }
    for (let j = i; j < P_MAX; j++) {
      pPos[j * 3] = 0; pPos[j * 3 + 1] = -9999; pPos[j * 3 + 2] = 0;
    }
    pGeo.attributes.position.needsUpdate = true;
    pGeo.attributes.color.needsUpdate = true;
  }

  function syncGates() {
    for (let i = 0; i < 2; i++) {
      const slot = gateSlots[i];
      const g = gates[i];
      if (!g) { slot.grp.visible = false; continue; }
      slot.grp.visible = true;
      toWorld(g.x + g.w / 2, g.y + g.h / 2, 0, slot.grp.position);
      const good = gateIsGood(g);
      slot.panelMat.color.set(good ? 0x2e86de : 0xff4757);
      slot.pillarMat.color.set(good ? 0x48dbfb : 0xff4757);
      const text = gateLabel(g);
      if (text !== slot.lastText) {
        slot.lastText = text;
        const c = slot.label.canvas, g2 = c.getContext("2d");
        g2.clearRect(0, 0, c.width, c.height);
        g2.font = "bold 64px sans-serif";
        g2.textAlign = "center"; g2.textBaseline = "middle";
        g2.shadowColor = good ? "#48dbfb" : "#ff4757";
        g2.shadowBlur = 18;
        g2.fillStyle = "#ffffff";
        g2.fillText(text, c.width / 2, c.height / 2);
        slot.label.tex.needsUpdate = true;
      }
    }
  }

  function updateCamera() {
    const cx = (leaderX - W / 2) * 0.25;
    const sx = shake > 0 ? (Math.random() - 0.5) * shake * 0.9 : 0;
    const sy = shake > 0 ? (Math.random() - 0.5) * shake * 0.9 : 0;
    camera.position.set(cx + sx, 660 + sy, 430);
    camera.lookAt(cx, 0, -335);
    camera.updateMatrixWorld();
    billboardQuat.copy(camera.quaternion);
  }

  // ---- HUD ----
  function drawHUD() {
    const w = hud.width / DPR, h = hud.height / DPR;
    hctx.clearRect(0, 0, w, h);

    hctx.textAlign = "center";
    for (const t of floatTexts) {
      const s = toScreen(t.x, t.y, t.h);
      if (s.behind) continue;
      hctx.globalAlpha = Math.min(1, t.life * 2);
      hctx.font = `bold ${t.size}px sans-serif`;
      hctx.fillStyle = t.color;
      hctx.shadowColor = "#000"; hctx.shadowBlur = 5;
      hctx.fillText(t.text, s.sx, s.sy);
      hctx.shadowBlur = 0;
    }
    hctx.globalAlpha = 1;

    // レベルアップバナー
    if (banner) {
      banner.life -= 1 / 60;
      if (banner.life <= 0) banner = null;
      else {
        const p = banner.life / banner.maxLife;
        const pop = 1 + Math.max(0, p - 0.88) * 6;
        hctx.globalAlpha = Math.min(1, p * 4);
        hctx.textAlign = "center";
        hctx.font = `bold ${Math.round(34 * pop)}px sans-serif`;
        hctx.fillStyle = "#ffd32a";
        hctx.shadowColor = "#ffd32a"; hctx.shadowBlur = 18;
        hctx.fillText(banner.title, w / 2, h * 0.3);
        hctx.shadowBlur = 0;
        hctx.font = "bold 18px sans-serif";
        hctx.fillStyle = "#fff";
        hctx.shadowColor = "#000"; hctx.shadowBlur = 6;
        hctx.fillText(banner.sub, w / 2, h * 0.3 + 34);
        hctx.shadowBlur = 0;
        hctx.globalAlpha = 1;
      }
    }

    // 人数バッジ
    if (state === STATE.PLAYING) {
      const s = toScreen(leaderX, SQUAD_Y + 40, 0);
      if (!s.behind) {
        hctx.font = "bold 22px sans-serif";
        hctx.fillStyle = "#48dbfb";
        hctx.shadowColor = "#000"; hctx.shadowBlur = 6;
        hctx.fillText(`×${squadCount}`, s.sx, s.sy + 30);
        hctx.shadowBlur = 0;
      }
    }

    hctx.textAlign = "left";
    hctx.font = "bold 22px sans-serif";
    hctx.fillStyle = "#ffd32a";
    hctx.fillText(`SCORE ${score}`, 14, 32);
    hctx.textAlign = "right";
    hctx.fillStyle = "#ff6b81";
    hctx.fillText(`WAVE ${wave}`, w - 14, 32);
    hctx.textAlign = "left";
    hctx.font = "14px sans-serif";
    hctx.fillStyle = "#999";
    hctx.fillText(`💀 ${killCount}  BEST ${best}  DMG ${bulletDmg}`, 14, 54);

    hctx.fillStyle = "rgba(0,0,0,.5)";
    hctx.fillRect(14, 62, w - 28, 8);
    hctx.fillStyle = "#ffd32a";
    hctx.fillRect(14, 62, (w - 28) * Math.min(1, xp / xpNext), 8);
    hctx.font = "bold 12px sans-serif";
    hctx.fillText(`Lv.${level}`, 14, 84);

    if (combo >= 5) {
      hctx.textAlign = "right";
      const pop = 1 + Math.max(0, comboTimer - 1.7) * 3;
      hctx.font = `bold ${Math.round(24 * pop)}px sans-serif`;
      hctx.fillStyle = combo >= 20 ? "#ff9f43" : "#ffd32a";
      hctx.shadowColor = "#000"; hctx.shadowBlur = 6;
      hctx.fillText(`${combo} COMBO`, w - 14, 92);
      hctx.shadowBlur = 0;
      hctx.textAlign = "left";
    }

    if (boss) {
      const bw = Math.min(w - 80, 420);
      hctx.textAlign = "center";
      hctx.font = "bold 14px sans-serif";
      hctx.fillStyle = "#e056fd";
      hctx.fillText("👑 BOSS", w / 2, 110);
      hctx.fillStyle = "rgba(0,0,0,.55)";
      hctx.fillRect(w / 2 - bw / 2, 116, bw, 12);
      hctx.fillStyle = "#e056fd";
      hctx.fillRect(w / 2 - bw / 2, 116, bw * Math.max(0, boss.hp / boss.maxHp), 12);
      hctx.strokeStyle = "#fff"; hctx.lineWidth = 2;
      hctx.strokeRect(w / 2 - bw / 2, 116, bw, 12);
      hctx.textAlign = "left";
    }

    let hudY = 104;
    hctx.font = "14px sans-serif";
    if (rapidTime > 0) {
      hctx.fillStyle = "#ff9ff3";
      hctx.fillText(`RAPID ${rapidTime.toFixed(1)}s`, 14, hudY); hudY += 18;
    }
    if (spreadTime > 0) {
      hctx.fillStyle = "#ffd32a";
      hctx.fillText(`3WAY ${spreadTime.toFixed(1)}s`, 14, hudY);
    }

    if (flash > 0) {
      hctx.fillStyle = `rgba(255,255,255,${flash * 1.6})`;
      hctx.fillRect(0, 0, w, h);
    }
  }

  // ---- ゲームフロー ----
  const startScreen = document.getElementById("start-screen");
  const gameoverScreen = document.getElementById("gameover-screen");

  function startGame() {
    reset();
    banner = null;
    updateGunnerPos();
    state = STATE.PLAYING;
    startScreen.classList.add("hidden");
    gameoverScreen.classList.add("hidden");
    beep(660, 0.15, "triangle", 0.06);
  }
  function gameOver() {
    state = STATE.GAMEOVER;
    shake = 14;
    spawnParticles(leaderX, SQUAD_Y, "#ff4757", 40, 2, 20);
    spawnShockwave(leaderX, SQUAD_Y, 220, 0xff4757);
    beep(120, 0.5, "sawtooth", 0.1);
    if (score > best) {
      best = score;
      localStorage.setItem("gs_best", String(best));
    }
    document.getElementById("final-score").textContent = score;
    document.getElementById("best-score-label").textContent =
      `ベストスコア: ${best} ／ 最大コンボ: ${maxCombo} ／ Lv.${level}`;
    setTimeout(() => gameoverScreen.classList.remove("hidden"), 600);
  }
  document.getElementById("start-btn").addEventListener("click", startGame);
  document.getElementById("retry-btn").addEventListener("click", startGame);

  // 開発用デバッグフック
  window.__dbg = () => ({
    state, squadCount, level, xp, xpNext, score, killCount, wave,
    bullets: bullets.length, enemies: enemies.length, gates: gates.length,
  });

  // ---- メインループ ----
  reset();
  updateGunnerPos();
  lastTime = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 1 / 20);
    lastTime = now;
    if (state === STATE.PLAYING) update(dt);
    else elapsed += dt;
    updateCamera();
    syncEnemies();
    syncSoldiers();
    syncBullets();
    syncBoss();
    syncCrates();
    syncMissiles();
    syncWaves();
    syncParticles();
    syncGates();
    renderer.render(scene, camera);
    drawHUD();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
